<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #F1F4F8;
  }
  @supports (padding: max(0px)) {
    body { padding-bottom: env(safe-area-inset-bottom); }
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  #splash {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #FAFBFC; z-index: 9999; flex-direction: column; gap: 12px;
    font-family: 'Manrope', sans-serif;
  }
  #splash .ring {
    width: 32px; height: 32px;
    border: 3px solid #E2E8F0; border-top-color: #0D9488;
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  #splash .label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: #64748B;
  }
  @keyframes spin { to { transform: rotate(360deg); } }


  /* APML B2C Tracker visual redesign */
  :root{
    --apml-red:#C0272D; --apml-red-dark:#7A1E25; --apml-maroon:#5B151B;
    --apml-ink:#220F11; --apml-muted:#7B5B5E; --apml-soft:#FFF5F6;
    --apml-glass:rgba(255,255,255,.50); --apml-border:rgba(255,255,255,.64);
    --apml-shadow:0 18px 55px rgba(144,29,35,.13),0 6px 18px rgba(0,0,0,.05);
    --apml-grad:linear-gradient(135deg,#ff6b74 0%,#d6383e 42%,#8b1a1e 100%);
  }
  body{
    color:var(--apml-ink);
    background:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.96) 0%, rgba(255,255,255,.70) 25%, transparent 56%),
      radial-gradient(circle at 90% 16%, rgba(255,102,114,.20) 0%, transparent 28%),
      radial-gradient(circle at 78% 78%, rgba(192,39,45,.15) 0%, transparent 30%),
      linear-gradient(135deg,#fff7f7 0%,#fde9ea 38%,#f8d7da 100%) !important;
    background-attachment:fixed;
  }
  body::before, body::after{content:'';position:fixed;pointer-events:none;border-radius:50%;z-index:0}
  body::before{width:700px;height:700px;background:radial-gradient(circle,rgba(255,255,255,.72) 0%,transparent 70%);top:-240px;right:-180px}
  body::after{width:520px;height:520px;background:radial-gradient(circle,rgba(255,110,120,.18) 0%,transparent 70%);bottom:-120px;left:40px}
  .apml-shell{min-height:100vh;position:relative;z-index:1;font-family:'Manrope',system-ui,-apple-system,sans-serif}
  .apml-sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:linear-gradient(180deg,rgba(78,17,24,.96) 0%,rgba(113,23,31,.93) 48%,rgba(176,39,48,.88) 100%);border-right:1px solid rgba(255,255,255,.16);box-shadow:8px 0 30px rgba(0,0,0,.10);z-index:40;display:flex;flex-direction:column}
  .apml-logo{padding:22px 22px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
  .apml-logo-mark{display:flex;align-items:center;gap:10px;color:#fff}
  .apml-logo-ap{font-size:34px;line-height:1;font-weight:900;letter-spacing:-.12em;font-family:'Manrope',sans-serif}
  .apml-logo-text{display:flex;flex-direction:column;line-height:1.05;letter-spacing:.05em;text-transform:uppercase;font-size:12px;font-weight:800}
  .apml-logo-sub{font-size:8px;font-weight:700;letter-spacing:.22em;opacity:.75;margin-top:3px}
  .apml-nav-section{padding:20px 18px 6px;font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.58);text-transform:uppercase;font-weight:800}
  .apml-nav-btn{display:flex;align-items:center;gap:10px;margin:4px 10px;padding:12px 14px;border-radius:12px;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.82);font-size:14px;font-weight:700;text-align:left;cursor:pointer;transition:all .16s;width:calc(100% - 20px)}
  .apml-nav-btn:hover,.apml-nav-btn.active{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.17);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 10px 24px rgba(0,0,0,.10)}
  .apml-nav-btn.active{position:relative}.apml-nav-btn.active:before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:4px;height:24px;background:#fff;border-radius:0 6px 6px 0}
  .apml-nav-badge{margin-left:auto;min-width:20px;height:20px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:#fff;color:var(--apml-red-dark)}
  .apml-sidebar-foot{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:rgba(255,255,255,.65)}
  .apml-main{margin-left:260px;min-height:100vh;padding:26px 34px 34px;position:relative;z-index:1}
  .apml-topbar{height:62px;margin:-26px -34px 26px;padding:0 34px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(255,255,255,.40);backdrop-filter:saturate(170%) blur(22px);-webkit-backdrop-filter:saturate(170%) blur(22px);border-bottom:1px solid rgba(255,255,255,.62);box-shadow:0 8px 26px rgba(146,36,42,.08);position:sticky;top:0;z-index:30}
  .apml-crumb{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#A58688;font-weight:800}.apml-page-title{font-size:17px;font-weight:900;color:var(--apml-ink);letter-spacing:-.02em;margin-top:1px}.apml-status{display:flex;align-items:center;gap:10px;font-size:12px;font-weight:800;color:var(--apml-muted)}
  .apml-dot{width:8px;height:8px;border-radius:50%;background:#059669;box-shadow:0 0 0 3px rgba(5,150,105,.12)}
  .apml-content{max-width:1180px;margin:0 auto}.apml-filter-card{background:rgba(255,255,255,.48);backdrop-filter:saturate(170%) blur(22px);-webkit-backdrop-filter:saturate(170%) blur(22px);border:1px solid rgba(255,255,255,.64);border-radius:28px;padding:14px 18px;margin-bottom:22px;box-shadow:0 8px 26px rgba(146,36,42,.08)}
  .apml-role-toggle{display:flex;gap:8px;flex-wrap:wrap}.apml-role-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:999px;border:1px solid rgba(139,26,30,.14);background:rgba(255,255,255,.72);color:var(--apml-muted);font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 6px 14px rgba(146,36,42,.05);transition:all .16s}.apml-role-btn.active{background:var(--apml-grad);color:#fff;border-color:transparent;box-shadow:0 12px 26px rgba(192,39,45,.28)}
  .apml-date-input{background:rgba(255,255,255,.78)!important;border:1.5px solid rgba(139,26,30,.18)!important;box-shadow:0 8px 18px rgba(146,36,42,.06),inset 0 1px 0 rgba(255,255,255,.45);border-radius:999px!important;padding:10px 14px!important;color:var(--apml-ink)!important}

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// ============================================================
// LUCIDE ICON WRAPPER
// ============================================================
function Icon({ name, size = 20, color, className, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = '';
    const node = lucide[name];
    if (!node) return;
    const svg = lucide.createElement(node);
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    if (color) svg.setAttribute('stroke', color);
    ref.current.appendChild(svg);
  }, [name, size, color]);
  return <span ref={ref} className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color, ...(style || {}) }} />;
}

// ============================================================
// BRAND
// ============================================================
const BRAND = {
  navy: "#7A1E25", navyDark: "#4E1118",
  teal: "#C0272D", tealDark: "#8B1A1E",
  gold: "#F6C7CB", goldDark: "#8B1A1E",
  navyLight: "#FBE6E8", tealLight: "#FDECEE", goldLight: "#FFF1F2",
  surface: "rgba(255,255,255,0.54)", surfaceAlt: "#F9E3E5", border: "rgba(255,255,255,0.62)",
  text: "#220F11", textMuted: "#7B5B5E",
  danger: "#B91C1C", dangerLight: "#FEE2E2",
  success: "#059669", successLight: "#DCFCE7",
};
const FD = "'Cormorant Garamond', Georgia, serif";
const FU = "'Manrope', system-ui, -apple-system, sans-serif";

// ============================================================
// CONSTANTS
// ============================================================
const SOURCES = ["Google Search", "Google Maps", "WhatsApp", "Friend / Family Referral", "Doctor Referral", "Insurance Company", "Social Media (Instagram)", "Social Media (Facebook)", "Social Media (TikTok)", "Social Media (LinkedIn)", "Marketing Staff Visit", "Walk-in / Saw Branch", "Repeat Patient", "Other"];
const SATIS = ["Satisfied", "Partially Satisfied", "Not Satisfied"];
const SERVICES = ["Walk-in Lab Test", "Home Collection", "NIPT / Genetic Test", "Health Package", "Insurance Test", "Corporate Test", "Other"];
const NON_DELIVERY = ["Patient contact unreachable", "Pending payment", "Sample re-test required", "Lab processing delay", "Doctor verification pending", "Wrong contact details", "Patient requested collection in person", "Other"];
const OWNERS = ["Patient Coordinator", "Front Office", "Both"];
const PRIORITIES = ["High", "Medium", "Low"];
const DEFAULT_TARGETS = {
  pc_revenue: 0, pc_patient_count: 0, pc_conversion: 0,
  pc_review_count: 0, pc_review_rating: 0, pc_active_plans: 0,
  pc_sm_posts: 0, pc_sm_leads: 0, pc_sm_spend: 0,
  fo_reg_count: 0, fo_call_answer: 0, fo_followup_count: 0,
  fo_tat_routine: 0, fo_delivery_ontime: 0,
};

// Source labels for the daily B2C card (configurable in Settings).
// Default labels reflect APML's actual operating sources.
const DEFAULT_B2C_LABELS = {
  src_core: "Core Lab",
  src_hc:   "Home Collection",
  src_main: "Covid",
  src_co:   "Business Development",
};
// Old defaults from earlier versions — used for transparent migration so that
// users who never customised their labels see the new names automatically.
const LEGACY_B2C_LABELS = {
  src_core: "APML Core",
  src_hc:   "APML HC",
  src_main: "APML Main",
  src_co:   "C/O Afzel",
};
const LS_B2C_LABELS = "apml-b2c-labels";
const labelsEqual = (a, b) => a && b && a.src_core===b.src_core && a.src_hc===b.src_hc && a.src_main===b.src_main && a.src_co===b.src_co;
const getB2CLabels = () => {
  try {
    const stored = JSON.parse(localStorage.getItem(LS_B2C_LABELS) || "null");
    if (stored && labelsEqual(stored, LEGACY_B2C_LABELS)) {
      // User never customised; upgrade silently to the new defaults.
      localStorage.setItem(LS_B2C_LABELS, JSON.stringify(DEFAULT_B2C_LABELS));
      return { ...DEFAULT_B2C_LABELS };
    }
    return { ...DEFAULT_B2C_LABELS, ...(stored || {}) };
  } catch { return DEFAULT_B2C_LABELS; }
};
const setB2CLabels = (l) => localStorage.setItem(LS_B2C_LABELS, JSON.stringify(l));

// ============================================================
// HELPERS
// ============================================================
const todayISO = () => { const d = new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); };
const yesterdayISO = () => { const d = new Date(); d.setDate(d.getDate()-1); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); };
// v9 — get an ISO date N days from today (negative = past, positive = future)
const dateOffsetISO = (offset) => {
  const d = new Date(); d.setDate(d.getDate() + offset); d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
};
const fmtDate = (iso) => iso ? new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const fmtDateShort = (iso) => iso ? new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short"}) : "—";
const fmtAED = (n) => "AED " + (Number(n)||0).toLocaleString("en-AE",{maximumFractionDigits:0});
const fmtNum = (n) => (Number(n)||0).toLocaleString("en-AE",{maximumFractionDigits:0});
const fmtPct = (n) => (Number(n)||0).toFixed(1) + "%";
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
const safeNum = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

// ============================================================
// ANALYTICS HELPERS — for GM Briefing & alerts
// ============================================================
const monthKey = (iso) => iso ? iso.slice(0,7) : "";
const daysInMonth = (iso) => { const d = new Date(iso+"T00:00:00"); return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate(); };
const dayOfMonth = (iso) => Number(iso.slice(8,10));

// Sum a single entry across PC + FO into a normalised "row" used for trend & MTD math.
const rowFromEntry = (e) => {
  if (!e) return null;
  const pc = e.pc || {}; const fo = e.fo || {};
  const totRev = safeNum(pc.revenue_walkin) + safeNum(pc.revenue_home) + safeNum(pc.revenue_marketing) + safeNum(pc.revenue_apml_main);
  const totSamples = safeNum(pc.samples_walkin) + safeNum(pc.samples_home) + safeNum(pc.samples_marketing) + safeNum(pc.samples_apml_main);
  const totDel = safeNum(fo.reports_delivered_email) + safeNum(fo.reports_delivered_whatsapp) + safeNum(fo.reports_delivered_inperson);
  const ansRate = safeNum(fo.calls_received) > 0 ? (safeNum(fo.calls_answered)/safeNum(fo.calls_received))*100 : 0;
  const delRate = safeNum(fo.reports_due) > 0 ? (totDel/safeNum(fo.reports_due))*100 : 0;
  const conv = safeNum(pc.enquiries_received) > 0 ? (safeNum(pc.enquiries_converted)/safeNum(pc.enquiries_received))*100 : 0;
  // v7: same-day conversion = conversions / answered calls
  const sameDayConv = safeNum(fo.calls_answered) > 0 ? (safeNum(fo.call_conversions)/safeNum(fo.calls_answered))*100 : 0;
  // v7: feedback-based satisfaction & report-delivery quality from PC's calls
  const fb = pc.call_feedback || [];
  const fbCalled = fb.length;
  const fbAnswered = fb.filter(f => f.call_answered === "Yes").length;
  const fbSatisfied = fb.filter(f => f.satisfied === "Yes").length;
  const fbReportOk = fb.filter(f => f.report_delivered === "Yes").length;
  return {
    date: e.date,
    revenue: totRev,
    samples: totSamples,
    revBySource: {
      core: safeNum(pc.revenue_walkin),
      hc:   safeNum(pc.revenue_home),
      main: safeNum(pc.revenue_apml_main),
      co:   safeNum(pc.revenue_marketing),
    },
    samplesBySource: {
      core: safeNum(pc.samples_walkin),
      hc:   safeNum(pc.samples_home),
      main: safeNum(pc.samples_apml_main),
      co:   safeNum(pc.samples_marketing),
    },
    patients: safeNum(pc.patients_total),
    patientsNew: safeNum(pc.patients_new),
    enquiries: safeNum(pc.enquiries_received),
    converted: safeNum(pc.enquiries_converted),
    conversion: conv,
    registrations: safeNum(fo.reg_total),
    regBySource: {
      walkin:    safeNum(fo.reg_walkin),
      insurance: safeNum(fo.reg_insurance),
      daman:     safeNum(fo.reg_daman),
      selfpay:   safeNum(fo.reg_self_pay) || safeNum(fo.reg_cash),  // back-compat
    },
    regByStaff: (fo.reg_by_staff || []).filter(s => s.name && safeNum(s.count) > 0),
    callsRcv: safeNum(fo.calls_received),
    callsAns: safeNum(fo.calls_answered),
    callsMissed: safeNum(fo.calls_missed),
    answerRate: ansRate,
    callConversions: safeNum(fo.call_conversions),
    sameDayConv,
    reportsDue: safeNum(fo.reports_due),
    reportsDelivered: totDel,
    deliveryRate: delRate,
    undelivered: (fo.reports_not_delivered || []).length,
    complaints: safeNum(pc.complaints_received),
    complaintsResolved: safeNum(pc.complaints_resolved),
    smLeads: safeNum(pc.sm_leads),
    smPosts: safeNum(pc.sm_posts),
    feedback: fb,
    fbCalled, fbAnswered, fbSatisfied, fbReportOk,
    undeliveredItems: fo.reports_not_delivered || [],
    sources: fb.map(f => f.source).filter(Boolean),
    // v8 — marketing spend (daily). Meta is a list, summed.
    googleAdsSpend: safeNum(pc.google_ads_spend),
    metaAdsSpend:   (pc.meta_ads_campaigns || []).reduce((a, c) => a + safeNum(c.spend), 0),
    metaAdsCampaigns: pc.meta_ads_campaigns || [],
    seoSpend:       safeNum(pc.seo_spend),
    totalAdsSpend:  safeNum(pc.google_ads_spend)
                  + (pc.meta_ads_campaigns || []).reduce((a, c) => a + safeNum(c.spend), 0)
                  + safeNum(pc.seo_spend),
    // v8 — follower snapshot. Uses null for empty/missing so the briefing
    // can find the most-recent non-null value across entries.
    // Old v7 entries don't have these fields → undefined → treated as null.
    followers: {
      instagram:    (pc.followers_instagram === "" || pc.followers_instagram == null) ? null : safeNum(pc.followers_instagram),
      facebook:     (pc.followers_facebook === ""  || pc.followers_facebook == null)  ? null : safeNum(pc.followers_facebook),
      linkedin:     (pc.followers_linkedin === ""  || pc.followers_linkedin == null)  ? null : safeNum(pc.followers_linkedin),
      googleReviews:(pc.followers_google_reviews === "" || pc.followers_google_reviews == null) ? null : safeNum(pc.followers_google_reviews),
    },
    // v8 — FO conversions by staff (incl. previous-day follow-ups)
    foConvByStaff: (fo.fo_conversions_by_staff || []).filter(s => s.staff_name && safeNum(s.conversions) > 0),
    pcRemarks: pc.remarks || "",
    foRemarks: fo.remarks || "",
    statusNotes: fo.reg_status_notes || "",
  };
};

// Aggregate all entries within a given month (YYYY-MM) into MTD totals.
const mtdAggregate = (entries, mKey) => {
  const monthEntries = (entries || []).filter(e => (e?.date || "").startsWith(mKey));
  const rows = monthEntries.map(rowFromEntry).filter(Boolean);
  const sum = (k) => rows.reduce((a, r) => a + (r[k] || 0), 0);
  const sumSrc = (which, key) => rows.reduce((a, r) => a + ((r[which] && r[which][key]) || 0), 0);
  const sourceCounts = {};
  const reasonCounts = {};
  const staffTotals = {};
  // v8 — FO conversions by staff: sum conversions and billing
  const foConvTotals = {};   // staff -> { conversions, billing }
  rows.forEach(r => {
    r.feedback.forEach(f => {
      if (f.source) sourceCounts[f.source] = (sourceCounts[f.source] || 0) + 1;
    });
    r.undeliveredItems.forEach(u => {
      if (u.reason) reasonCounts[u.reason] = (reasonCounts[u.reason] || 0) + 1;
    });
    (r.regByStaff || []).forEach(s => {
      const name = (s.name || "").trim();
      const cnt = safeNum(s.count);
      if (name && cnt > 0) staffTotals[name] = (staffTotals[name] || 0) + cnt;
    });
    (r.foConvByStaff || []).forEach(s => {
      const name = (s.staff_name || "").trim();
      if (!name) return;
      const cnt = safeNum(s.conversions);
      const bil = safeNum(s.billing_amount);
      if (cnt > 0 || bil > 0) {
        const cur = foConvTotals[name] || { conversions: 0, billing: 0 };
        foConvTotals[name] = { conversions: cur.conversions + cnt, billing: cur.billing + bil };
      }
    });
  });
  const topSources = Object.entries(sourceCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topReasons = Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topStaff   = Object.entries(staffTotals).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topFOConv  = Object.entries(foConvTotals)
    .map(([name, v]) => ({ name, conversions: v.conversions, billing: v.billing }))
    .sort((a,b) => (b.conversions - a.conversions) || (b.billing - a.billing))
    .slice(0, 8);
  // v8 — latest non-null followers across the month (most recent date wins)
  const sortedNewest = rows.slice().sort((a,b) => b.date.localeCompare(a.date));
  const latestFollowers = { instagram: null, facebook: null, linkedin: null, googleReviews: null };
  ["instagram","facebook","linkedin","googleReviews"].forEach(k => {
    for (const r of sortedNewest) {
      if (r.followers && r.followers[k] != null) { latestFollowers[k] = r.followers[k]; break; }
    }
  });
  const totRcv = sum("callsRcv");
  const totalRevenue = sum("revenue");
  const totalSamples = sum("samples");
  const daysReported = rows.length;
  const fbCalled = sum("fbCalled");
  const fbAnswered = sum("fbAnswered");
  const fbSatisfied = sum("fbSatisfied");
  const fbReportOk = sum("fbReportOk");
  return {
    daysReported,
    revenue: totalRevenue,
    samples: totalSamples,
    revBySource: {
      core: sumSrc("revBySource","core"),
      hc:   sumSrc("revBySource","hc"),
      main: sumSrc("revBySource","main"),
      co:   sumSrc("revBySource","co"),
    },
    samplesBySource: {
      core: sumSrc("samplesBySource","core"),
      hc:   sumSrc("samplesBySource","hc"),
      main: sumSrc("samplesBySource","main"),
      co:   sumSrc("samplesBySource","co"),
    },
    avgDailyRevenue: daysReported > 0 ? totalRevenue / daysReported : 0,
    avgDailySamples: daysReported > 0 ? totalSamples / daysReported : 0,
    arpa: totalSamples > 0 ? totalRevenue / totalSamples : 0,
    patients: sum("patients"),
    enquiries: sum("enquiries"),
    converted: sum("converted"),
    registrations: sum("registrations"),
    regBySource: {
      walkin:    sumSrc("regBySource","walkin"),
      insurance: sumSrc("regBySource","insurance"),
      daman:     sumSrc("regBySource","daman"),
      selfpay:   sumSrc("regBySource","selfpay"),
    },
    reportsDue: sum("reportsDue"),
    reportsDelivered: sum("reportsDelivered"),
    callsRcv: totRcv,
    callsAns: sum("callsAns"),
    callConversions: sum("callConversions"),
    answerRate: totRcv > 0 ? (sum("callsAns")/totRcv)*100 : 0,
    sameDayConv: sum("callsAns") > 0 ? (sum("callConversions")/sum("callsAns"))*100 : 0,
    deliveryRate: sum("reportsDue") > 0 ? (sum("reportsDelivered")/sum("reportsDue"))*100 : 0,
    conversionRate: sum("enquiries") > 0 ? (sum("converted")/sum("enquiries"))*100 : 0,
    smLeads: sum("smLeads"),
    smPosts: sum("smPosts"),
    complaints: sum("complaints"),
    fbCalled, fbAnswered, fbSatisfied, fbReportOk,
    fbAnswerRate:    fbCalled > 0   ? (fbAnswered/fbCalled)*100   : 0,
    fbSatisfaction:  fbAnswered > 0 ? (fbSatisfied/fbAnswered)*100 : 0,
    fbReportOkRate:  fbAnswered > 0 ? (fbReportOk/fbAnswered)*100  : 0,
    topSources,
    topReasons,
    topStaff,
    // v8 additions
    googleAdsSpend: sum("googleAdsSpend"),
    metaAdsSpend:   sum("metaAdsSpend"),
    seoSpend:       sum("seoSpend"),
    totalAdsSpend:  sum("totalAdsSpend"),
    cpa:            totalSamples > 0 ? sum("totalAdsSpend") / totalSamples : 0,
    topFOConv,
    latestFollowers,
  };
};

// Expected month-end "landing": linear projection from average daily run-rate.
const expectedLanding = (avgDaily, iso) => avgDaily * daysInMonth(iso);

// v7: detect dates in [startISO..endISO] that have NO saved entry.
// Returns array of YYYY-MM-DD strings.
const findMissingDays = (entries, startISO, endISO) => {
  if (!startISO || !endISO || startISO > endISO) return [];
  const have = new Set((entries || []).map(e => e.date));
  const out = [];
  const cur = new Date(startISO + "T00:00:00");
  const end = new Date(endISO + "T00:00:00");
  let safety = 400;  // hard cap
  while (cur <= end && safety-- > 0) {
    const iso = cur.toISOString().slice(0, 10);
    if (!have.has(iso)) out.push(iso);
    cur.setDate(cur.getDate() + 1);
  }
  return out;
};

// Find the entry from the prior calendar day in the saved list.
const priorEntry = (entries, iso) => {
  if (!entries || !iso) return null;
  const d = new Date(iso+"T00:00:00"); d.setDate(d.getDate()-1);
  const prev = d.toISOString().slice(0,10);
  return entries.find(e => e.date === prev) || null;
};

// Δ helper. Returns {abs, pct, dir: 'up'|'down'|'flat'}.
const delta = (cur, prev) => {
  const c = safeNum(cur), p = safeNum(prev);
  const abs = c - p;
  const pct = p !== 0 ? (abs/p)*100 : (c > 0 ? 100 : 0);
  return { abs, pct, dir: abs > 0 ? "up" : abs < 0 ? "down" : "flat" };
};

// MTD pace: how much of the month is gone vs how much of the target is hit.
const pace = (achieved, target, iso) => {
  const t = safeNum(target);
  if (t <= 0) return null;
  const dim = daysInMonth(iso);
  const dom = dayOfMonth(iso);
  const expected = (dom/dim)*t;
  const onPace = safeNum(achieved) >= expected * 0.95;
  return {
    pctAchieved: (safeNum(achieved)/t)*100,
    pctMonth: (dom/dim)*100,
    expected,
    onPace,
    gap: expected - safeNum(achieved),
  };
};

// Build alerts from today's entry, MTD aggregate, targets, and tasks.
const buildAlerts = (todayEntry, mtd, targets, tasks, iso) => {
  const alerts = [];
  const r = rowFromEntry(todayEntry);
  if (!r) return alerts;

  // Call answer rate below target
  if (r.callsRcv > 0 && safeNum(targets.fo_call_answer) > 0 && r.answerRate < safeNum(targets.fo_call_answer)) {
    alerts.push({ level: "high", icon: "PhoneOff", title: "Call answer rate below target",
      detail: `${r.answerRate.toFixed(1)}% today vs ${targets.fo_call_answer}% target. ${r.callsMissed} missed calls.` });
  }
  // Report delivery rate below 90%
  if (r.reportsDue > 0 && r.deliveryRate < 90) {
    alerts.push({ level: r.deliveryRate < 75 ? "high" : "medium", icon: "FileWarning", title: "Report delivery shortfall",
      detail: `${r.deliveryRate.toFixed(1)}% delivered (${r.reportsDelivered} of ${r.reportsDue}). ${r.undelivered} flagged with reasons.` });
  }
  // Many undelivered reports
  if (r.undelivered >= 5) {
    alerts.push({ level: "medium", icon: "AlertTriangle", title: `${r.undelivered} undelivered reports today`,
      detail: "Review reasons and assign follow-up actions." });
  }
  // Registration errors
  // (v7) reg_errors removed in v7 — no alert for it any more.
  // Unresolved complaints
  if (r.complaints > r.complaintsResolved) {
    alerts.push({ level: "medium", icon: "MessageSquare", title: "Unresolved complaints",
      detail: `${r.complaints} received, ${r.complaintsResolved} resolved.` });
  }
  // MTD revenue pace check
  if (safeNum(targets.pc_revenue) > 0) {
    const p = pace(mtd.revenue, targets.pc_revenue, iso);
    if (p && !p.onPace && p.gap > 0) {
      alerts.push({ level: "high", icon: "TrendingDown", title: "MTD revenue behind pace",
        detail: `${fmtAED(mtd.revenue)} achieved (${p.pctAchieved.toFixed(1)}%) vs ${p.pctMonth.toFixed(0)}% of month elapsed. Gap to expected: ${fmtAED(Math.max(0,p.gap))}.` });
    }
  }
  // Overdue high-priority tasks
  const overdueHigh = (tasks || []).filter(t => t.status !== "Closed" && t.priority === "High" && t.dueDate && t.dueDate < iso);
  if (overdueHigh.length > 0) {
    alerts.push({ level: "high", icon: "ClipboardX", title: `${overdueHigh.length} overdue High-priority task${overdueHigh.length>1?"s":""}`,
      detail: overdueHigh.slice(0,3).map(t => `• ${t.title}`).join("\n") });
  }
  return alerts;
};

// Field-completeness for forms (for the meter at the top).
const PC_REQUIRED_FIELDS = ["revenue_walkin","revenue_home","revenue_marketing","patients_total","patients_new","patients_repeat","enquiries_received","enquiries_converted","sm_posts","sm_engagement","sm_leads","new_reviews","avg_rating"];
const FO_REQUIRED_FIELDS = ["reg_total","reg_walkin","reg_insurance","reg_daman","reg_self_pay","calls_received","calls_answered","calls_missed","reports_due","reports_delivered_email","reports_delivered_whatsapp"];
const completeness = (obj, fields) => {
  const filled = fields.filter(f => String(obj[f] ?? "").trim() !== "").length;
  return { filled, total: fields.length, pct: Math.round((filled/fields.length)*100) };
};

const ToastContext = React.createContext({ push: () => {} });

// ============================================================
// MISSING DAYS BANNER — flags any day in May+ without a saved entry
// ============================================================
function MissingDaysBanner({ entries, endISO, anchorISO }) {
  // anchorISO defaults to "2026-05-01" — start of tracking
  const start = anchorISO || "2026-05-01";
  const missing = useMemo(() => findMissingDays(entries, start, endISO), [entries, start, endISO]);
  if (missing.length === 0) return null;
  // Group missing dates into compact ranges for readability
  const groups = [];
  let cur = null;
  missing.forEach(iso => {
    if (!cur) { cur = { start: iso, end: iso }; return; }
    const next = new Date(cur.end + "T00:00:00"); next.setDate(next.getDate() + 1);
    if (next.toISOString().slice(0,10) === iso) { cur.end = iso; }
    else { groups.push(cur); cur = { start: iso, end: iso }; }
  });
  if (cur) groups.push(cur);
  return <div className="rounded-xl border-2 mb-4 p-4" style={{ borderColor: BRAND.danger, background: BRAND.dangerLight }}>
    <div className="flex items-start gap-3 mb-2">
      <Icon name="CalendarOff" size={20} color={BRAND.danger} />
      <div className="flex-1">
        <div className="text-sm font-bold" style={{ color: BRAND.danger, fontFamily: FU }}>
          Data missing for {missing.length} day{missing.length > 1 ? "s" : ""}
        </div>
        <div className="text-[11px]" style={{ color: BRAND.danger, fontFamily: FU, marginTop: 2 }}>
          From {fmtDateShort(start)} to {fmtDateShort(endISO)} · MTD figures will under-report until back-filled.
        </div>
      </div>
    </div>
    <div className="flex flex-wrap gap-1.5 mt-2">
      {groups.map((g, i) => (
        <span key={i} className="px-2 py-1 rounded-md text-[11px] font-bold" style={{ background: "white", color: BRAND.danger, border: `1px solid ${BRAND.danger}`, fontFamily: FU }}>
          {g.start === g.end ? fmtDateShort(g.start) : `${fmtDateShort(g.start)} → ${fmtDateShort(g.end)}`}
        </span>
      ))}
    </div>
  </div>;
}

// MONTHLY SUMMARY — single-month totals + MoM comparison

function MonthlySummaryView({ allEntries, targets, setView, setSelectedDate }) {
  const todayMonth = todayISO().slice(0, 7);
  const [month, setMonth] = useState(todayMonth);
  const monthsWithData = useMemo(() => {
    const set = new Set();
    (allEntries || []).forEach(e => { if (e?.date) set.add(e.date.slice(0,7)); });
    set.add(todayMonth);  // ensure current month is selectable even with no data
    return Array.from(set).sort().reverse();
  }, [allEntries]);

  const cur  = useMemo(() => mtdAggregate(allEntries, month), [allEntries, month]);
  // For MoM, treat "previous month" as the calendar month before the selected one
  const prev = useMemo(() => {
    const [y, m] = month.split("-").map(Number);
    const d = new Date(y, m - 2, 1);
    return mtdAggregate(allEntries, d.toISOString().slice(0, 7));
  }, [allEntries, month]);
  const prev2 = useMemo(() => {
    const [y, m] = month.split("-").map(Number);
    const d = new Date(y, m - 3, 1);
    return mtdAggregate(allEntries, d.toISOString().slice(0, 7));
  }, [allEntries, month]);

  const monthLabel = (mk) => {
    const [y, m] = mk.split("-").map(Number);
    return new Date(y, m - 1, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" });
  };
  const prevMonthKey = (() => {
    const [y, m] = month.split("-").map(Number);
    const d = new Date(y, m - 2, 1);
    return d.toISOString().slice(0, 7);
  })();

  // MoM delta helper
  const mom = (curV, prvV) => {
    const c = safeNum(curV), p = safeNum(prvV);
    const diff = c - p;
    const pct = p !== 0 ? (diff / p) * 100 : (c > 0 ? 100 : 0);
    return { diff, pct, dir: diff > 0 ? "up" : diff < 0 ? "down" : "flat" };
  };

  const Row = ({ label, format, getVal, betterIs = "up" }) => {
    const c = getVal(cur), p = getVal(prev), p2 = getVal(prev2);
    const d = mom(c, p);
    const fmt = format === "aed" ? fmtAED : format === "pct" ? fmtPct : fmtNum;
    const isGood = (d.dir === "up" && betterIs === "up") || (d.dir === "down" && betterIs === "down");
    const isBad  = (d.dir === "up" && betterIs === "down") || (d.dir === "down" && betterIs === "up");
    const dColor = d.dir === "flat" ? BRAND.textMuted : isGood ? BRAND.success : isBad ? BRAND.danger : BRAND.textMuted;
    const arrow = d.dir === "up" ? "▲" : d.dir === "down" ? "▼" : "—";
    return <tr style={{ borderBottom: `1px solid ${BRAND.border}` }}>
      <td style={{ padding: "9px 12px", fontWeight: 700, color: BRAND.text }}>{label}</td>
      <td style={{ padding: "9px 12px", textAlign: "right", fontWeight: 700, color: BRAND.navy }}>{fmt(c)}</td>
      <td style={{ padding: "9px 12px", textAlign: "right", color: BRAND.text }}>{fmt(p)}</td>
      <td style={{ padding: "9px 12px", textAlign: "right", color: BRAND.textMuted }}>{fmt(p2)}</td>
      <td style={{ padding: "9px 12px", textAlign: "right", fontWeight: 800, color: dColor }}>
        {arrow} {format === "aed" ? fmtAED(Math.abs(d.diff)) : format === "pct" ? Math.abs(d.diff).toFixed(1) + "%" : fmtNum(Math.abs(d.diff))}
        {p !== 0 && <span style={{ fontWeight: 600, opacity: .8, marginLeft: 4 }}>({Math.abs(d.pct).toFixed(1)}%)</span>}
      </td>
    </tr>;
  };

  return <div>
    <div className="apml-filter-card">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="flex items-center gap-3 flex-wrap">
          <span className="text-xs font-bold uppercase tracking-wider" style={{ color: BRAND.textMuted, fontFamily: FU }}>Month</span>
          <select value={month} onChange={(e) => setMonth(e.target.value)} className="apml-date-input text-xs sm:text-sm" style={{ fontFamily: FU }}>
            {monthsWithData.map(m => <option key={m} value={m}>{monthLabel(m)}</option>)}
          </select>
          <span className="text-[11px]" style={{ color: BRAND.textMuted, fontFamily: FU }}>
            {cur.daysReported} day{cur.daysReported === 1 ? "" : "s"} reported
          </span>
        </div>
      </div>
    </div>

    {cur.daysReported === 0 ? (
      <div className="text-center py-12 px-4 rounded-xl border-2 border-dashed" style={{ borderColor: BRAND.border, background: "white" }}>
        <Icon name="CalendarRange" size={32} color={BRAND.textMuted} style={{ margin: "0 auto 12px" }} />
        <p className="text-sm font-semibold mb-2" style={{ color: BRAND.textMuted, fontFamily: FU }}>No saved entries for {monthLabel(month)}.</p>
        <Button onClick={() => { setSelectedDate(yesterdayISO()); setView("today"); }} variant="primary" icon="Edit3">Open Daily Update</Button>
      </div>
    ) : <>
      {/* Headline summary cards */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <div className="rounded-xl p-4 border" style={{ background: "white", borderColor: BRAND.border }}>
          <div className="text-[10px] font-bold uppercase tracking-wider" style={{ color: BRAND.textMuted, fontFamily: FU }}>Total Revenue</div>
          <div className="text-2xl font-bold" style={{ color: BRAND.gold, fontFamily: FD }}>{fmtAED(cur.revenue)}</div>
          <div className="text-[10px] mt-1" style={{ color: BRAND.textMuted, fontFamily: FU }}>{cur.samples} samples · ARPA {fmtAED(cur.arpa)}</div>

// Updated weekly. The panel displays the most recent non-empty value for each
// channel, plus the delta vs the latest value from at least 7 days earlier.
function FollowersPanel({ allEntries, iso, mtdLatest }) {
  const channels = [
    { key: "instagram",     label: "Instagram",      icon: "Instagram",     color: "#C13584", field: "followers_instagram" },
    { key: "facebook",      label: "Facebook",       icon: "Facebook",      color: "#1877F2", field: "followers_facebook" },
    { key: "linkedin",      label: "LinkedIn",       icon: "Linkedin",      color: "#0A66C2", field: "followers_linkedin" },
    { key: "googleReviews", label: "Google reviews", icon: "Star",          color: "#F4B400", field: "followers_google_reviews" },
  ];
  // Find latest non-empty across ALL entries (not just current month) per channel,
  // and a prior value from 7+ days earlier for the delta.
  const sorted = (allEntries || []).slice().sort((a,b) => b.date.localeCompare(a.date));
  const latestForField = (field) => {
    for (const e of sorted) {
      const v = e?.pc?.[field];
      if (v !== "" && v != null) return { value: safeNum(v), date: e.date };
    }
    return null;
  };
  const priorForField = (field, latestDate) => {
    if (!latestDate) return null;
    const cutoff = new Date(latestDate + "T00:00:00"); cutoff.setDate(cutoff.getDate() - 7);
    const cutoffISO = cutoff.toISOString().slice(0, 10);
    for (const e of sorted) {
      if (e.date > cutoffISO) continue;
      const v = e?.pc?.[field];
      if (v !== "" && v != null) return { value: safeNum(v), date: e.date };
    }
    return null;
  };  // Render only if we have at least one non-empty value
  const items = channels.map(c => ({ ...c, latest: latestForField(c.field) }));
  if (!items.some(i => i.latest)) return null;

  return <SectionCard title="Followers — Latest" icon="Users" accent="teal">
    <p className="text-xs mb-3" style={{ color: BRAND.textMuted, fontFamily: FU }}>
      Most recent value per channel. Δ shows the change versus the closest reading from 7 or more days earlier.
    </p>
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
      {items.map(it => {
        if (!it.latest) {
          return <div key={it.key} className="rounded-lg p-3 border" style={{ background: "white", borderColor: BRAND.border }}>
            <div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{ color: BRAND.textMuted, fontFamily: FU }}>{it.label}</div>
            <div className="text-sm" style={{ color: BRAND.textMuted, fontStyle: "italic", fontFamily: FU }}>No data</div>
          </div>;
        }
        const prior = priorForField(it.field, it.latest.date);
        const delta = prior ? it.latest.value - prior.value : null;
        const dPct  = prior && prior.value > 0 ? ((it.latest.value - prior.value) / prior.value) * 100 : null;
        const dColor = delta == null ? BRAND.textMuted : delta > 0 ? BRAND.success : delta < 0 ? BRAND.danger : BRAND.textMuted;
        return <div key={it.key} className="rounded-lg p-3 border" style={{ background: "white", borderColor: BRAND.border }}>
          <div className="text-[10px] font-bold uppercase tracking-wider" style={{ color: it.color, fontFamily: FU }}>{it.label}</div>
          <div className="text-xl font-bold mt-1" style={{ color: BRAND.text, fontFamily: FD }}>{fmtNum(it.latest.value)}</div>
          <div className="text-[10px] mt-1" style={{ color: BRAND.textMuted, fontFamily: FU }}>
            as of {fmtDateShort(it.latest.date)}
          </div>
          {delta != null && delta !== 0 && (
            <div className="text-[11px] mt-1.5 font-bold" style={{ color: dColor, fontFamily: FU }}>
              {delta > 0 ? "▲" : "▼"} {fmtNum(Math.abs(delta))}
              {dPct != null && <span style={{ fontWeight: 600, opacity: .8, marginLeft: 4 }}>({Math.abs(dPct).toFixed(1)}%)</span>}
              <span style={{ color: BRAND.textMuted, fontWeight: 600, marginLeft: 6 }}>vs {fmtDateShort(prior.date)}</span>
            </div>
          )}
        </div>;
      })}
    </div>
  </SectionCard>;
}

// MY TASKS PANEL — tasks owned by the signed-in user
// ============================================================
function MyTasksPanel({ tasks, user, role, onOpen }) {
  // Resolve "me": match owner against role label or signed-in name/email.
  const myName = user?.name || "";
  const roleLabel = role === "pc" ? "Patient Coordinator" : role === "fo" ? "Front Office" : "Manager";
  const today = todayISO();
  const isMine = (t) => {
    const o = (t.owner || "").toLowerCase();
    return o.includes(roleLabel.toLowerCase())
        || (myName && o.includes(myName.toLowerCase()))
        || (myName && (t.assignedTo || "").toLowerCase().includes(myName.toLowerCase()));
  };
  const mine = (tasks || []).filter(t => t.status !== "Closed" && isMine(t));
  if (mine.length === 0) return null;
  const overdue = mine.filter(t => t.dueDate && t.dueDate < today);
  return <SectionCard title={`My open tasks (${mine.length})`} icon="UserCheck" accent="navy"
    badge={overdue.length > 0 && <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background: BRAND.dangerLight, color: BRAND.danger, fontFamily: FU }}>{overdue.length} overdue</span>}>
    {mine.slice(0, 8).map(t => (
      <div key={t.id} className="rounded-lg border p-2.5 mb-2 flex items-start gap-2" style={{ background: "white", borderColor: BRAND.border, borderLeft: `3px solid ${t.priority === "High" ? BRAND.danger : t.priority === "Medium" ? BRAND.gold : BRAND.textMuted}` }}>
        <div className="flex-1 min-w-0">
          <div className="text-xs font-bold mb-0.5" style={{ color: BRAND.text, fontFamily: FU }}>{t.title}</div>
          <div className="text-[10px]" style={{ color: BRAND.textMuted, fontFamily: FU }}>
            {t.dueDate ? <>Due <span style={{ color: t.dueDate < today ? BRAND.danger : BRAND.textMuted, fontWeight: 700 }}>{fmtDateShort(t.dueDate)}</span></> : "No due date"}
            {t.statusNote && <> · {t.statusNote.slice(0, 60)}{t.statusNote.length > 60 ? "…" : ""}</>}

        </div>

    {mine.length <= 8 && <Button onClick={onOpen} variant="ghost" size="sm" icon="ChevronRight">Open Tasks</Button>}
  </SectionCard>;
}

// Used inside SectionCards on the data-entry forms. Calls the same
// conflict-aware saveEntry() pipeline as the page-level Save button,
// but prompts the user with "Save changes to <section name>?" first.
function SectionSaveBar({ sectionName, fieldsTouched, onConfirmSave, savingThisSection }) {
  const [open, setOpen] = useState(false);
  const handleClick = () => {
    if (fieldsTouched > 0) setOpen(true);
    else onConfirmSave();
  };
  return <>
    <div className="rounded-lg p-3 mt-3 flex items-center justify-between gap-3 flex-wrap"
      style={{ background: fieldsTouched > 0 ? BRAND.goldLight : BRAND.surface, border: `1px dashed ${fieldsTouched > 0 ? BRAND.gold : BRAND.border}` }}>
      <div className="text-[11px]" style={{ color: BRAND.textMuted, fontFamily: FU }}>
        {fieldsTouched > 0
          ? <span><strong style={{ color: BRAND.goldDark }}>{fieldsTouched}</strong> field{fieldsTouched > 1 ? "s" : ""} edited in this section since last save</span>
          : <span>This section is up to date.</span>}
      </div>
      <Button onClick={handleClick} variant={fieldsTouched > 0 ? "primary" : "ghost"} size="sm" icon="Save" disabled={savingThisSection}>
        {savingThisSection ? "Saving…" : `Save ${sectionName}`}
      </Button>
    </div>
    <ConfirmModal
      open={open}
      title={`Save changes to ${sectionName}?`}
      body={<>
        <p style={{ marginBottom: 6 }}>
          You have <strong>{fieldsTouched}</strong> unsaved field{fieldsTouched > 1 ? "s" : ""} in this section.
        </p>
        <p style={{ marginBottom: 0, fontSize: 12, color: BRAND.textMuted }}>
          Saving will write the entire daily entry to Google Sheets and add an audit log entry attributed to you.
        </p>
      </>}
      confirmLabel="Yes, save now"
      cancelLabel="Keep editing"
      confirmVariant="primary"
      onConfirm={() => { setOpen(false); onConfirmSave(); }}
      onCancel={() => setOpen(false)}
    />
  </>;
}

// Helper: count the number of fields in `keys` that differ between
// `current` (live form state) and `loaded` (last-saved snapshot).
const countSectionDiffs = (current, loaded, keys) => {
  if (!loaded) return 0;
  let n = 0;
  keys.forEach(k => {
    const a = current?.[k], b = loaded?.[k];
    if (Array.isArray(a) || Array.isArray(b)) {
      if (JSON.stringify(a || []) !== JSON.stringify(b || [])) n++;
    } else if ((a ?? "") !== (b ?? "")) {
      n++;
    }
  });
  return n;
};

function SaveFAB({ isDirty, saveStatus, onSave }) {
  // v9: re-implemented as SaveDock — uses .apml-save-dock CSS so it
  // automatically reshapes between mobile (full-width bottom bar above
  // the bottom-nav) and desktop (round FAB bottom-right). The CSS
  // handles status colours and a 'clean' state hiding the dock.
  const status =
    saveStatus === "saving"          ? "saving" :
    saveStatus === "saved"           ? "saved" :
    saveStatus === "error"           ? "error" :
    isDirty                          ? "dirty" :
                                       "clean";
  const label =
    status === "saving" ? "Saving…" :
    status === "saved"  ? "Saved" :
    status === "error"  ? "Retry save" :
                          "Save changes";
  return <button
    className="apml-save-dock"
    data-status={status}
    onClick={onSave}
    disabled={status === "saving"}
    aria-label={label}
    title={label + " (Ctrl/Cmd+S)"}
  >
    <Icon name={status === "saved" ? "Check" : status === "error" ? "AlertCircle" : "Save"} size={18} />
    <span>{label}</span>
    <span className="apml-save-dock-shortcut" style={{ fontSize: 10, opacity: .8, marginLeft: 4, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase" }}>Cmd+S</span>
  </button>;
}

function ChangeLog({ log }) {
  const items = (log || []).slice().reverse(); // newest first
  if (items.length === 0) {
    return <p className="text-xs italic" style={{ color: BRAND.textMuted, fontFamily: FU }}>No changes recorded yet for this entry.</p>;

  return <div>

// Every saved entry / task carries:
//   lastSavedAt  ISO datetime (server-time wins for conflict checks)
//   lastSavedBy  email or "Guest"
//   log          array of { at, by, summary, fields[] } — capped at 100
//
// "loadedVersion" is the lastSavedAt value at the moment the entry was loaded
// from the server. On save we re-fetch and compare; if the server version is
// newer, we treat it as a conflict and ask the user how to proceed.

const MAX_LOG_ENTRIES = 100;

// ============================================================
// BACKUP / RESTORE — hourly localStorage snapshot of everything
// ============================================================
// Snapshot shape: { at, label, entries, tasks, targets }
// Stored at LS_BACKUP_KEY as a sorted array (newest first), capped at MAX_BACKUPS.
const LS_BACKUP_KEY = "apml-backup-history";
const BACKUP_INTERVAL_MS = 60 * 60 * 1000;  // 1 hour
const MAX_BACKUPS = 72;  // ~3 days of hourly snapshots

const readBackups = () => {
  try { return JSON.parse(localStorage.getItem(LS_BACKUP_KEY) || "[]"); }
  catch { return []; }
};
const writeBackups = (list) => {
  const trimmed = list.slice().sort((a,b) => b.at.localeCompare(a.at)).slice(0, MAX_BACKUPS);
  try { localStorage.setItem(LS_BACKUP_KEY, JSON.stringify(trimmed)); } catch (e) {
    const halved = trimmed.slice(0, Math.floor(trimmed.length * 0.75));
    try { localStorage.setItem(LS_BACKUP_KEY, JSON.stringify(halved)); } catch {}
  }
};
const makeBackup = (entries, tasks, targets, label = "Auto") => {
  const list = readBackups();
  const at = new Date().toISOString();
  const snap = { at, label, entries: entries || [], tasks: tasks || [], targets: targets || {} };
  list.push(snap);
  writeBackups(list);
  return snap;
};

const compareEntryFields = (oldE, newE) => {
  // Returns a short summary of which top-level field groups changed.
  const changed = [];
  const oldPC = oldE?.pc || {}, newPC = newE?.pc || {};
  const oldFO = oldE?.fo || {}, newFO = newE?.fo || {};
  const fieldDiffs = [];
  const compareObj = (o, n, prefix) => {
    const keys = new Set([...Object.keys(o), ...Object.keys(n)]);
    keys.forEach(k => {
      const a = o[k], b = n[k];
      if (Array.isArray(a) || Array.isArray(b)) {
        if (JSON.stringify(a||[]) !== JSON.stringify(b||[])) fieldDiffs.push(prefix + "." + k);
      } else if ((a ?? "") !== (b ?? "")) {
        fieldDiffs.push(prefix + "." + k);
      }
    });
  };
  compareObj(oldPC, newPC, "pc");
  compareObj(oldFO, newFO, "fo");
  if ((oldE?.meta?.submittedBy || "") !== (newE?.meta?.submittedBy || "")) fieldDiffs.push("meta.submittedBy");
  if ((oldE?.meta?.meetingTime || "") !== (newE?.meta?.meetingTime || "")) fieldDiffs.push("meta.meetingTime");
  return fieldDiffs;
};

const buildAuditEntry = (oldE, newE, user) => {
  const fields = compareEntryFields(oldE, newE);
  const at = new Date().toISOString();
  const by = (user?.email && !user.guest) ? user.email : (user?.name || "Guest");
  let summary = "";
  if (!oldE || !oldE.lastSavedAt) summary = "Created entry";
  else if (fields.length === 0) summary = "Re-saved with no changes";
  else if (fields.length <= 3) summary = "Updated " + fields.join(", ");
  else summary = `Updated ${fields.length} fields`;
  return { at, by, summary, fields };
};

const stampSave = (entry, user, oldEntry) => {
  const audit = buildAuditEntry(oldEntry, entry, user);
  const log = [...(entry.log || oldEntry?.log || []), audit].slice(-MAX_LOG_ENTRIES);
  return { ...entry, lastSavedAt: audit.at, lastSavedBy: audit.by, log };
};

// Format helper for log timestamps
const fmtLogTime = (iso) => {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    return d.toLocaleString("en-GB", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
  } catch { return iso; }
};

// v9 — fields that sensibly carry over from yesterday when no entry exists
// for the selected date. These are values that change weekly or monthly,
// not daily. Daily metrics (revenue, samples, calls, etc.) stay blank.
const PC_CARRY_OVER_FIELDS = [
  "dev_plans_count", "dev_plans_notes",          // updated weekly
  "followers_instagram", "followers_facebook",   // updated weekly
  "followers_linkedin", "followers_google_reviews",
  "sm_spend_mtd", "sm_conversions_mtd",          // MTD totals
  "avg_rating",                                  // changes slowly
];
const FO_CARRY_OVER_FIELDS = [
  "reg_status_notes",   // ongoing status text
];
// Repeating arrays that don't carry over — reset to empty each day.
// (call_feedback, reg_by_staff, fo_conversions_by_staff, meta_ads_campaigns,
//  reports_not_delivered all reset.)

const prefilledEntry = (date, prevEntry) => {
  const e = emptyEntry(date);
  if (!prevEntry) return e;
  PC_CARRY_OVER_FIELDS.forEach(k => {
    if (prevEntry.pc && prevEntry.pc[k] !== undefined && prevEntry.pc[k] !== "") {
      e.pc[k] = prevEntry.pc[k];
    }
  });
  FO_CARRY_OVER_FIELDS.forEach(k => {
    if (prevEntry.fo && prevEntry.fo[k] !== undefined && prevEntry.fo[k] !== "") {
      e.fo[k] = prevEntry.fo[k];
    }
  });
  // Mark in meta so the user knows these were pre-filled (visual hint optional)
  e.meta = { ...e.meta, prefilledFrom: prevEntry.date };
  return e;
};

// v9 — find the most recent saved entry before the given date.
// Used to source carry-over fields. Returns null if none exists.
const findMostRecentPrior = (entries, beforeISO) => {
  if (!entries || !beforeISO) return null;
  const candidates = entries
    .filter(e => e && e.date && e.date < beforeISO)
    .sort((a, b) => b.date.localeCompare(a.date));
  return candidates[0] || null;
};

// ============================================================
// API LAYER — Google Sheets via Apps Script + localStorage fallback
// ============================================================
const LS_URL_KEY = "apml-gs-url";
const LS_PREFIX = "apml-data-";

const API = {
  url: localStorage.getItem(LS_URL_KEY) || "",
  setUrl(url) { this.url = url; localStorage.setItem(LS_URL_KEY, url || ""); },
  isOnline() { return !!this.url; },

  async _post(action, payload) {
    if (!this.url) {
      // ----- LOCAL MODE: localStorage fallback -----
      return this._local(action, payload);
    }
    try {
      const res = await fetch(this.url, {
        method: "POST",
        // text/plain avoids CORS preflight on Apps Script
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, ...payload }),
        redirect: "follow",
      });
      const text = await res.text();
      try {
        const json = JSON.parse(text);
        if (json.error) throw new Error(json.error);
        return json;
      } catch (e) {
        throw new Error("Invalid response: " + text.slice(0, 200));
      }
    } catch (e) {
      console.error("API error", action, e);
      // On network failure, fall back to localStorage cache
      return this._local(action, payload, /*fallback=*/true);
    }
  },

  _local(action, payload, fallback = false) {
    // localStorage emulation of the same API
    const get = (k) => { try { return JSON.parse(localStorage.getItem(LS_PREFIX + k) || "null"); } catch { return null; } };
    const set = (k, v) => localStorage.setItem(LS_PREFIX + k, JSON.stringify(v));
    const result = { _local: true, _fallback: fallback };

    switch (action) {
      case "getEntry": {
        const entry = get("entry:" + payload.date);
        return { ...result, entry };
      }
      case "saveEntry": {
        set("entry:" + payload.entry.date, payload.entry);
        // Maintain index
        const idx = get("entry-index") || [];
        if (!idx.includes(payload.entry.date)) {
          idx.push(payload.entry.date);
          set("entry-index", idx);
        }
        return { ...result, ok: true };
      }
      case "listEntries": {
        const idx = get("entry-index") || [];
        const entries = idx.map(d => get("entry:" + d)).filter(Boolean)
          .sort((a, b) => b.date.localeCompare(a.date));
        return { ...result, entries };
      }
      case "getTargets": {
        return { ...result, targets: get("targets") || DEFAULT_TARGETS };
      }
      case "saveTargets": {
        set("targets", payload.targets);
        return { ...result, ok: true };
      }
      case "getTasks": {
        return { ...result, tasks: get("tasks") || [] };
      }
      case "saveTask": {
        const tasks = get("tasks") || [];
        const i = tasks.findIndex(t => t.id === payload.task.id);
        if (i >= 0) tasks[i] = payload.task; else tasks.push(payload.task);
        set("tasks", tasks);
        return { ...result, ok: true };
      }
      case "deleteTask": {
        const tasks = (get("tasks") || []).filter(t => t.id !== payload.id);
        set("tasks", tasks);
        return { ...result, ok: true };
      }
      default: return { ...result, error: "Unknown action: " + action };
    }
  },

  getEntry(date) { return this._post("getEntry", { date }); },
  saveEntry(entry) { return this._post("saveEntry", { entry }); },
  listEntries() { return this._post("listEntries", {}); },
  getTargets() { return this._post("getTargets", {}); },
  saveTargets(targets) { return this._post("saveTargets", { targets }); },
  getTasks() { return this._post("getTasks", {}); },
  saveTask(task) { return this._post("saveTask", { task }); },
  deleteTask(id) { return this._post("deleteTask", { id }); },
};

      <PCEssentials pc={pc} update={update} loadedPc={loadedPc} onSave={onSave} saveStatus={saveStatus} totalRev={totalRev} totalSmp={totalSmp} conv={conv} setMode={setModeAndPersist} />
    ) : (
      <PCAllSections pc={pc} update={update} loadedPc={loadedPc} onSave={onSave} saveStatus={saveStatus}
        totalRev={totalRev} totalSmp={totalSmp} conv={conv} comp={comp} entry={entry} targets={targets}
        B2C_LABELS={B2C_LABELS} addFB={addFB} updFB={updFB} delFB={delFB}
        addMeta={addMeta} updMeta={updMeta} delMeta={delMeta} />
    )}
  </div>;
}

// ============================================================
// MODE TOGGLE — Essentials vs All Sections
// ============================================================
// Pill-style switch shown above any form. Essentials is the default
// for new users; All Sections is power mode. Stored per-form.
function ModeToggle({ mode, setMode, comp }) {
  return <div className="flex items-center justify-between gap-3 mb-4 flex-wrap">
    <div role="tablist" aria-label="Form mode" style={{
      display: "inline-flex", padding: 3, gap: 2, borderRadius: 999,

    }}>
      {[
        { id: "essentials", label: "Essentials", icon: "Zap" },
        { id: "all",        label: "All sections", icon: "Layers" },
      ].map(t => (
        <button
          key={t.id}
          role="tab"
          aria-selected={mode === t.id}
          onClick={() => setMode(t.id)}
          style={{
            padding: "8px 14px", borderRadius: 999, border: "none", cursor: "pointer",
            background: mode === t.id ? BRAND.navy : "transparent",
            color: mode === t.id ? "#fff" : BRAND.text,
            fontSize: 12, fontWeight: 800, fontFamily: FU,
            display: "inline-flex", alignItems: "center", gap: 6,
            transition: "background .15s ease, color .15s ease",
            minHeight: 36,
          }}
        >
          <Icon name={t.icon} size={14} />
          <span>{t.label}</span>
        </button>
      ))}
    </div>
    {comp && (
      <div className="text-[11px]" style={{ color: BRAND.textMuted, fontFamily: FU }}>
        <strong style={{ color: comp.pct >= 80 ? BRAND.success : comp.pct >= 50 ? BRAND.gold : BRAND.danger }}>{comp.pct}%</strong> complete · {comp.filled}/{comp.total}
      </div>
    )}
  </div>;
}

// FRONT OFFICE FORM
// ============================================================
function FOForm({ entry, setEntry, targets, isDirty, saveStatus, onSave, autoSaveEnabled, loadedEntry }) {
  const fo = entry.fo;
  const loadedFo = loadedEntry?.fo || null;
  const update = (f, v) => setEntry({ ...entry, fo: { ...fo, [f]: v } });
  const ansRate = safeNum(fo.calls_received) > 0 ? (safeNum(fo.calls_answered) / safeNum(fo.calls_received)) * 100 : 0;
  const sameDayConv = safeNum(fo.calls_answered) > 0 ? (safeNum(fo.call_conversions) / safeNum(fo.calls_answered)) * 100 : 0;
  const totDel = safeNum(fo.reports_delivered_email) + safeNum(fo.reports_delivered_whatsapp) + safeNum(fo.reports_delivered_inperson);
  const delRate = safeNum(fo.reports_due) > 0 ? (totDel / safeNum(fo.reports_due)) * 100 : 0;
  const ndCount = (fo.reports_not_delivered || []).length;

  const addRpt = () => update("reports_not_delivered", [...(fo.reports_not_delivered || []), { id: uid(), patient: "", reportType: "", reason: "", action: "" }]);
  const updRpt = (id, f, v) => update("reports_not_delivered", fo.reports_not_delivered.map(x => x.id === id ? { ...x, [f]: v } : x));
  const delRpt = (id) => update("reports_not_delivered", fo.reports_not_delivered.filter(x => x.id !== id));
  // v7: staff registrations
  const addStaffRow = () => update("reg_by_staff", [...(fo.reg_by_staff || []), emptyStaffRegRow()]);
  const updStaffRow = (id, f, v) => update("reg_by_staff", (fo.reg_by_staff || []).map(x => x.id === id ? { ...x, [f]: v } : x));
  const delStaffRow = (id) => update("reg_by_staff", (fo.reg_by_staff || []).filter(x => x.id !== id));
  // v8 — FO conversion-by-staff rows
  const addConvRow = () => update("fo_conversions_by_staff", [...(fo.fo_conversions_by_staff || []), emptyFOConvRow()]);
  const updConvRow = (id, f, v) => update("fo_conversions_by_staff", (fo.fo_conversions_by_staff || []).map(x => x.id === id ? { ...x, [f]: v } : x));
  const delConvRow = (id) => update("fo_conversions_by_staff", (fo.fo_conversions_by_staff || []).filter(x => x.id !== id));
  const comp = completeness(fo, FO_REQUIRED_FIELDS);

  // v9 — Essentials mode for FO too. Stored separately from PC.
  const [mode, setMode] = useState(() => localStorage.getItem("apml-form-mode-fo") || "essentials");
  const setModeAndPersist = (m) => { setMode(m); localStorage.setItem("apml-form-mode-fo", m); };

  return <div>
    <SaveBar entry={entry} isDirty={isDirty} saveStatus={saveStatus} onSave={onSave} autoSaveEnabled={autoSaveEnabled} />
    {entry?.meta?.prefilledFrom && (
      <div className="rounded-lg p-3 mb-3 flex items-start gap-2 border" style={{ background: BRAND.tealLight, borderColor: BRAND.teal }}>
        <Icon name="Sparkles" size={16} color={BRAND.tealDark} />
        <div className="flex-1">
          <div className="text-xs font-bold" style={{ color: BRAND.tealDark, fontFamily: FU }}>
            Pre-filled from {fmtDateShort(entry.meta.prefilledFrom)}
          </div>
          <div className="text-[11px] mt-0.5" style={{ color: BRAND.text, fontFamily: FU, lineHeight: 1.4 }}>
            Status notes carried forward. Daily numbers start blank.
          </div>
        </div>
      </div>
    )}
    <ModeToggle mode={mode} setMode={setModeAndPersist} comp={comp} />

    {mode === "essentials" ? (
      <FOEssentials fo={fo} update={update} ansRate={ansRate} sameDayConv={sameDayConv} totDel={totDel} delRate={delRate} setMode={setModeAndPersist} />
    ) : (
      <FOAllSections fo={fo} update={update} loadedFo={loadedFo} onSave={onSave} saveStatus={saveStatus}
        ansRate={ansRate} sameDayConv={sameDayConv} totDel={totDel} delRate={delRate} ndCount={ndCount}
        comp={comp} entry={entry} targets={targets}
        addRpt={addRpt} updRpt={updRpt} delRpt={delRpt}
        addStaffRow={addStaffRow} updStaffRow={updStaffRow} delStaffRow={delStaffRow}
        addConvRow={addConvRow} updConvRow={updConvRow} delConvRow={delConvRow} />
    )}
  </div>;
}

  const taskStatus = (t) => {
    if (t.status === "Closed") return "Closed";
    if (t.dueDate && t.dueDate < today && t.status !== "Closed") return "Overdue";
    return t.status || "Open";
  };

  const filtered = useMemo(() => {
    let list = [...tasks];
    if (filter === "Open") list = list.filter(t => t.status !== "Closed");
    else if (filter === "Closed") list = list.filter(t => t.status === "Closed");
    else if (filter === "Overdue") list = list.filter(t => taskStatus(t) === "Overdue");
    if (ownerFilter !== "All") list = list.filter(t => t.owner === ownerFilter || t.owner === "Both");
    return list.sort((a, b) => {
      if (a.status === "Closed" && b.status !== "Closed") return 1;
      if (a.status !== "Closed" && b.status === "Closed") return -1;
      const p = { High: 0, Medium: 1, Low: 2 };
      return (p[a.priority] || 1) - (p[b.priority] || 1);
    });
  }, [tasks, filter, ownerFilter]);

  const counts = useMemo(() => ({
    All: tasks.length,
    Open: tasks.filter(t => t.status !== "Closed").length,
    Closed: tasks.filter(t => t.status === "Closed").length,
    Overdue: tasks.filter(t => taskStatus(t) === "Overdue").length,
  }), [tasks]);

  const persist = async (updatedTasks) => {
    setTasks(updatedTasks);
  };

  const handleAdd = async () => {
    if (!newTask.title.trim()) return;
    const task = { ...newTask, id: uid(), createdDate: today, status: "Open", followups: [] };
    const updated = [...tasks, task];
    setTasks(updated);
    await API.saveTask(task);
    setNewTask({ title: "", description: "", owner: "Patient Coordinator", priority: "Medium", dueDate: "", raisedBy: "" });
    setShowAdd(false);
  };

  const updateTask = async (id, changes) => {
    const updated = tasks.map(t => t.id === id ? { ...t, ...changes } : t);
    setTasks(updated);
    const target = updated.find(t => t.id === id);
    if (target) await API.saveTask(target);
  };

  const startEdit = (t) => {
    setEditingId(t.id);
    setEditDraft({
      title: t.title || "",
      description: t.description || "",
      owner: t.owner || "Patient Coordinator",
      priority: t.priority || "Medium",
      dueDate: t.dueDate || "",
      raisedBy: t.raisedBy || "",
    });
  };
  const cancelEdit = () => { setEditingId(null); setEditDraft({}); };
  const saveEdit = async (id) => {
    if (!editDraft.title?.trim()) return;
    await updateTask(id, { ...editDraft });
    cancelEdit();
  };

  const saveStatusNote = async (id) => {
    const note = (statusNoteDraft[id] || "").trim();
    if (!note) return;
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    await updateTask(id, { statusNote: note, statusNoteAt: today });
    setStatusNoteDraft({ ...statusNoteDraft, [id]: "" });
  };
  const clearStatusNote = async (id) => {
    await updateTask(id, { statusNote: "", statusNoteAt: "" });
  };

  const setStatus = (id, status) => {
    const changes = { status };
    if (status === "Closed") changes.closedDate = today;
    updateTask(id, changes);
  };

  const removeTask = async (id) => {
    if (!window.confirm("Delete this task permanently?")) return;
    setTasks(tasks.filter(t => t.id !== id));
    await API.deleteTask(id);
  };

  const addFollowup = (taskId) => {
    const text = (followupDraft[taskId] || "").trim();
    if (!text) return;
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const newFU = { id: uid(), date: today, note: text };
    const updated = { ...task, followups: [...(task.followups || []), newFU] };
    updateTask(taskId, { followups: updated.followups });
    setFollowupDraft({ ...followupDraft, [taskId]: "" });
  };

  return <div>
    <div className="grid grid-cols-4 gap-2 mb-5">
      {[["All", counts.All, BRAND.navy], ["Open", counts.Open, BRAND.gold], ["Overdue", counts.Overdue, BRAND.danger], ["Closed", counts.Closed, BRAND.success]].map(([label, count, color]) => (
        <button key={label} onClick={() => setFilter(label)} className="rounded-xl p-3 border transition-all"
          style={{ background: filter === label ? color : "white", borderColor: filter === label ? color : BRAND.border, color: filter === label ? "white" : BRAND.text }}>
          <div className="text-xl font-bold" style={{ fontFamily: FD }}>{count}</div>
          <div className="text-[10px] font-bold uppercase tracking-wider" style={{ fontFamily: FU }}>{label}</div>
        </button>
      ))}
    </div>

    <div className="flex flex-col sm:flex-row gap-2 mb-4">
      <div className="flex-1">
        <SelectInput value={ownerFilter} onChange={setOwnerFilter} options={["All", ...OWNERS]} placeholder="Filter by owner" />
      </div>
      <Button onClick={() => setShowAdd(!showAdd)} variant="gold" icon={showAdd ? "XCircle" : "Plus"}>
        {showAdd ? "Cancel" : "Add Task"}
      </Button>
    </div>

    {showAdd && (
      <div className="rounded-xl border p-4 mb-4" style={{ background: BRAND.goldLight, borderColor: BRAND.gold }}>
        <h3 className="text-base font-bold mb-3" style={{ color: BRAND.navy, fontFamily: FU }}>New Pending Task</h3>
        <Field label="Task Title" required><TextInput value={newTask.title} onChange={(v) => setNewTask({ ...newTask, title: v })} placeholder="e.g. Follow up with insurance on rejected claim" /></Field>
        <Field label="Description"><TextArea value={newTask.description} onChange={(v) => setNewTask({ ...newTask, description: v })} rows={2} /></Field>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <Field label="Owner"><SelectInput value={newTask.owner} onChange={(v) => setNewTask({ ...newTask, owner: v })} options={OWNERS} /></Field>
          <Field label="Priority"><SelectInput value={newTask.priority} onChange={(v) => setNewTask({ ...newTask, priority: v })} options={PRIORITIES} /></Field>
          <Field label="Due Date"><TextInput type="date" value={newTask.dueDate} onChange={(v) => setNewTask({ ...newTask, dueDate: v })} /></Field>
          <Field label="Raised By"><TextInput value={newTask.raisedBy} onChange={(v) => setNewTask({ ...newTask, raisedBy: v })} /></Field>
        </div>
        <div className="flex gap-2 mt-2">
          <Button onClick={handleAdd} variant="primary" icon="Check">Save Task</Button>
          <Button onClick={() => setShowAdd(false)} variant="ghost">Cancel</Button>
        </div>
      </div>
    )}

    {filtered.length === 0 && (
      <div className="text-center py-12 px-4 rounded-xl border-2 border-dashed" style={{ borderColor: BRAND.border, background: "white" }}>
        <Icon name="ClipboardList" size={32} color={BRAND.textMuted} style={{ margin: "0 auto 12px" }} />
        <p className="text-sm font-semibold" style={{ color: BRAND.textMuted, fontFamily: FU }}>No tasks match the current filter.</p>
      </div>
    )}

    {filtered.map((t) => {
      const status = taskStatus(t);
      const expanded = expandedId === t.id;
      const isEditing = editingId === t.id;
      const isOverdue = status === "Overdue";
      return <div key={t.id} className="rounded-xl border mb-3 overflow-hidden" style={{
        background: "white", borderColor: isOverdue ? BRAND.danger : BRAND.border,
        borderLeftWidth: 4, borderLeftColor: t.priority === "High" ? BRAND.danger : t.priority === "Medium" ? BRAND.gold : BRAND.textMuted,
      }}>
        <div className="p-4">
          {isEditing ? (
            <div>
              <Field label="Task Title" required><TextInput value={editDraft.title} onChange={(v) => setEditDraft({ ...editDraft, title: v })} /></Field>
              <Field label="Description"><TextArea value={editDraft.description} onChange={(v) => setEditDraft({ ...editDraft, description: v })} rows={2} /></Field>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <Field label="Owner"><SelectInput value={editDraft.owner} onChange={(v) => setEditDraft({ ...editDraft, owner: v })} options={OWNERS} /></Field>
                <Field label="Priority"><SelectInput value={editDraft.priority} onChange={(v) => setEditDraft({ ...editDraft, priority: v })} options={PRIORITIES} /></Field>
                <Field label="Due Date"><TextInput type="date" value={editDraft.dueDate} onChange={(v) => setEditDraft({ ...editDraft, dueDate: v })} /></Field>
                <Field label="Raised By"><TextInput value={editDraft.raisedBy} onChange={(v) => setEditDraft({ ...editDraft, raisedBy: v })} /></Field>
              </div>
              <div className="flex gap-2 mt-2">
                <Button onClick={() => saveEdit(t.id)} variant="primary" icon="Save" size="sm">Save Changes</Button>
                <Button onClick={cancelEdit} variant="ghost" size="sm">Cancel</Button>
              </div>
            </div>
          ) : (
            <>
              <div className="flex items-start justify-between gap-3 mb-2">
                <h4 className="flex-1 font-bold text-sm" style={{ color: BRAND.navy, fontFamily: FU, lineHeight: 1.4 }}>{t.title}</h4>
                <div className="flex flex-col items-end gap-1 flex-shrink-0">
                  <StatusBadge status={status} /><StatusBadge status={t.priority} />
                </div>
              </div>
              {t.description && <p className="text-xs mb-2" style={{ color: BRAND.textMuted, fontFamily: FU, lineHeight: 1.5 }}>{t.description}</p>}
              {t.statusNote && (
                <div className="rounded-lg p-2.5 mb-3" style={{ background: BRAND.tealLight, borderLeft: `3px solid ${BRAND.teal}` }}>
                  <div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{ color: BRAND.tealDark, fontFamily: FU }}>
                    Current Status {t.statusNoteAt ? `· updated ${fmtDateShort(t.statusNoteAt)}` : ""}
                  </div>
                  <div className="text-xs" style={{ color: BRAND.text, fontFamily: FU, lineHeight: 1.5 }}>{t.statusNote}</div>
                </div>
              )}
              <div className="flex flex-wrap gap-x-4 gap-y-1 text-[11px] mb-3" style={{ color: BRAND.textMuted, fontFamily: FU }}>
                <span><strong>Owner:</strong> {t.owner}</span>
                {t.dueDate && <span style={{ color: isOverdue ? BRAND.danger : BRAND.textMuted }}><strong>Due:</strong> {fmtDateShort(t.dueDate)}</span>}
                <span><strong>Raised:</strong> {fmtDateShort(t.createdDate)}{t.raisedBy ? ` • ${t.raisedBy}` : ""}</span>
                {t.followups?.length > 0 && <span><strong>{t.followups.length}</strong> follow-up{t.followups.length > 1 ? "s" : ""}</span>}
              </div>
              <div className="flex gap-2 flex-wrap">
                <Button onClick={() => setExpandedId(expanded ? null : t.id)} variant="secondary" size="sm" icon={expanded ? "ChevronDown" : "ChevronRight"}>
                  {expanded ? "Hide" : "Update / Notes"}
                </Button>
                <Button onClick={() => startEdit(t)} variant="ghost" size="sm" icon="Edit3">Edit</Button>
                {t.status !== "Closed" && (
                  <select value={t.status || "Open"} onChange={(e) => updateTask(t.id, { status: e.target.value, ...(e.target.value === "Closed" ? { closedDate: today } : {}) })}
                    className="px-3 py-1.5 text-xs rounded-lg border focus:outline-none"
                    style={{ borderColor: BRAND.border, fontFamily: FU, background: "white", color: BRAND.text, fontWeight: 700 }}>
                    {TASK_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                )}
                {t.status === "Closed" && <Button onClick={() => updateTask(t.id, { status: "Open" })} variant="ghost" size="sm" icon="RefreshCw">Reopen</Button>}
                <Button onClick={() => removeTask(t.id)} variant="danger" size="sm" icon="Trash2">Delete</Button>
              </div>
            </>
          )}
        </div>
        {expanded && !isEditing && (
          <div className="border-t px-4 py-3" style={{ borderColor: BRAND.border, background: BRAND.surface }}>
            {/* Status Note section */}
            <div className="text-xs font-bold uppercase tracking-wide mb-2" style={{ color: BRAND.teal, fontFamily: FU }}>Update Status Note</div>
            <p className="text-[11px] mb-2" style={{ color: BRAND.textMuted, fontFamily: FU }}>This is the single live status visible on the task card. Replaces the previous note.</p>
            <div className="flex gap-2 mb-3">
              <input type="text" value={statusNoteDraft[t.id] || ""}
                onChange={(e) => setStatusNoteDraft({ ...statusNoteDraft, [t.id]: e.target.value })}
                onKeyDown={(e) => { if (e.key === "Enter") saveStatusNote(t.id); }}
                placeholder={t.statusNote ? "Replace status note..." : "e.g. Awaiting insurance approval, ETA Friday"}
                className="flex-1 px-3 py-2 text-xs rounded-lg border focus:outline-none"
                style={{ borderColor: BRAND.border, fontFamily: FU, background: "white" }} />
              <Button onClick={() => saveStatusNote(t.id)} variant="teal" size="sm" icon="Save">Save</Button>
              {t.statusNote && <Button onClick={() => clearStatusNote(t.id)} variant="ghost" size="sm" icon="X">Clear</Button>}
            </div>
            {/* Follow-up Log */}
            <div className="text-xs font-bold uppercase tracking-wide mb-2 pt-2 border-t" style={{ color: BRAND.navy, fontFamily: FU, borderColor: BRAND.border }}>Follow-up Log <span style={{ color: BRAND.textMuted, fontWeight: 600, marginLeft: 6 }}>(timestamped history)</span></div>
            {(t.followups || []).length === 0 && <p className="text-xs italic mb-2" style={{ color: BRAND.textMuted, fontFamily: FU }}>No follow-ups recorded yet.</p>}
            {(t.followups || []).map((f) => (
              <div key={f.id} className="rounded-lg border p-2.5 mb-2" style={{ background: "white", borderColor: BRAND.border }}>
                <div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{ color: BRAND.teal, fontFamily: FU }}>{fmtDate(f.date)}</div>
                <div className="text-xs" style={{ color: BRAND.text, fontFamily: FU }}>{f.note}</div>
              </div>
            ))}
            <div className="flex gap-2 mt-2">
              <input type="text" value={followupDraft[t.id] || ""} onChange={(e) => setFollowupDraft({ ...followupDraft, [t.id]: e.target.value })}
                onKeyDown={(e) => { if (e.key === "Enter") addFollowup(t.id); }} placeholder="Add a follow-up note (kept in history)..."
                className="flex-1 px-3 py-2 text-xs rounded-lg border focus:outline-none"
                style={{ borderColor: BRAND.border, fontFamily: FU, background: "white" }} />
              <Button onClick={() => addFollowup(t.id)} variant="primary" size="sm" icon="Plus">Add</Button>
            </div>
          </div>
        )}
      </div>;
    })}
  </div>;
}

function HistoryView({ entries, onSelect }) {
  if (entries.length === 0) {
    return <div className="text-center py-12 px-4 rounded-xl border-2 border-dashed" style={{ borderColor: BRAND.border, background: "white" }}>
      <Icon name="History" size={32} color={BRAND.textMuted} style={{ margin: "0 auto 12px" }} />
      <p className="text-sm font-semibold mb-1" style={{ color: BRAND.textMuted, fontFamily: FU }}>No saved entries yet.</p>
      <p className="text-xs" style={{ color: BRAND.textMuted, fontFamily: FU }}>Daily entries will appear here once saved.</p>
    </div>;
  }
  return <div>
    <p className="text-xs mb-4" style={{ color: BRAND.textMuted, fontFamily: FU }}>Tap an entry to view or edit. Newest first.</p>
    {entries.map((e) => {
      const totRev = safeNum(e.pc?.revenue_walkin) + safeNum(e.pc?.revenue_home) + safeNum(e.pc?.revenue_marketing);
      const totDel = safeNum(e.fo?.reports_delivered_email) + safeNum(e.fo?.reports_delivered_whatsapp) + safeNum(e.fo?.reports_delivered_inperson);
      return <button key={e.date} onClick={() => onSelect(e.date)}
        className="w-full rounded-xl border p-4 mb-3 text-left transition-all hover:shadow-md"
        style={{ background: "white", borderColor: BRAND.border }}>
        <div className="flex items-center justify-between mb-2">
          <div className="text-base font-bold" style={{ color: BRAND.navy, fontFamily: FD }}>{fmtDate(e.date)}</div>
          <Icon name="ChevronRight" size={16} color={BRAND.textMuted} />
        </div>
        <div className="grid grid-cols-3 gap-2 text-[11px]" style={{ fontFamily: FU }}>
          <div><div className="font-bold uppercase tracking-wider" style={{ color: BRAND.textMuted, fontSize: "9px" }}>Revenue</div>
            <div style={{ color: BRAND.gold, fontWeight: 600 }}>{fmtAED(totRev)}</div></div>
          <div><div className="font-bold uppercase tracking-wider" style={{ color: BRAND.textMuted, fontSize: "9px" }}>Patients</div>
            <div style={{ color: BRAND.navy, fontWeight: 600 }}>{fmtNum(e.pc?.patients_total)}</div></div>
          <div><div className="font-bold uppercase tracking-wider" style={{ color: BRAND.textMuted, fontSize: "9px" }}>Reports</div>
            <div style={{ color: BRAND.teal, fontWeight: 600 }}>{fmtNum(totDel)}</div></div>
        </div>
      </button>;
    })}
  </div>;
}
