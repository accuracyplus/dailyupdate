<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: 'Manrope', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #F1F4F8;
  }
  @supports (padding: max(0px)) {
    body { padding-bottom: env(safe-area-inset-bottom); }
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  #splash {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #FAFBFC; z-index: 9999; flex-direction: column; gap: 12px;
    font-family: 'Manrope', sans-serif;
  }
  #splash .ring {
    width: 32px; height: 32px;
    border: 3px solid #E2E8F0; border-top-color: #0D9488;
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  #splash .label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: #64748B;
  }
  @keyframes spin { to { transform: rotate(360deg); } }


  /* APML B2C Tracker visual redesign */
  :root{
    --apml-red:#C0272D; --apml-red-dark:#7A1E25; --apml-maroon:#5B151B;
    --apml-ink:#220F11; --apml-muted:#7B5B5E; --apml-soft:#FFF5F6;
    --apml-glass:rgba(255,255,255,.50); --apml-border:rgba(255,255,255,.64);
    --apml-shadow:0 18px 55px rgba(144,29,35,.13),0 6px 18px rgba(0,0,0,.05);
    --apml-grad:linear-gradient(135deg,#ff6b74 0%,#d6383e 42%,#8b1a1e 100%);
  }
  body{
    color:var(--apml-ink);
    background:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.96) 0%, rgba(255,255,255,.70) 25%, transparent 56%),
      radial-gradient(circle at 90% 16%, rgba(255,102,114,.20) 0%, transparent 28%),
      radial-gradient(circle at 78% 78%, rgba(192,39,45,.15) 0%, transparent 30%),
      linear-gradient(135deg,#fff7f7 0%,#fde9ea 38%,#f8d7da 100%) !important;
    background-attachment:fixed;
  }
  body::before, body::after{content:'';position:fixed;pointer-events:none;border-radius:50%;z-index:0}

  body::after{width:520px;height:520px;background:radial-gradient(circle,rgba(255,110,120,.18) 0%,transparent 70%);bottom:-120px;left:40px}
  .apml-shell{min-height:100vh;position:relative;z-index:1;font-family:'Manrope',system-ui,-apple-system,sans-serif}
  .apml-sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:linear-gradient(180deg,rgba(78,17,24,.96) 0%,rgba(113,23,31,.93) 48%,rgba(176,39,48,.88) 100%);border-right:1px solid rgba(255,255,255,.16);box-shadow:8px 0 30px rgba(0,0,0,.10);z-index:40;display:flex;flex-direction:column}
  .apml-logo{padding:22px 22px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
  .apml-logo-mark{display:flex;align-items:center;gap:10px;color:#fff}

  .apml-logo-text{display:flex;flex-direction:column;line-height:1.05;letter-spacing:.05em;text-transform:uppercase;font-size:12px;font-weight:800}
  .apml-logo-sub{font-size:8px;font-weight:700;letter-spacing:.22em;opacity:.75;margin-top:3px}
  .apml-nav-section{padding:20px 18px 6px;font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.58);text-transform:uppercase;font-weight:800}
  .apml-nav-btn{display:flex;align-items:center;gap:10px;margin:4px 10px;padding:12px 14px;border-radius:12px;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.82);font-size:14px;font-weight:700;text-align:left;cursor:pointer;transition:all .16s;width:calc(100% - 20px)}
  .apml-nav-btn:hover,.apml-nav-btn.active{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.17);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 10px 24px rgba(0,0,0,.10)}
  .apml-nav-btn.active{position:relative}.apml-nav-btn.active:before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:4px;height:24px;background:#fff;border-radius:0 6px 6px 0}
  .apml-nav-badge{margin-left:auto;min-width:20px;height:20px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:#fff;color:var(--apml-red-dark)}
  .apml-sidebar-foot{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:rgba(255,255,255,.65)}
  .apml-main{margin-left:260px;min-height:100vh;padding:26px 34px 34px;position:relative;z-index:1}
  .apml-topbar{height:62px;margin:-26px -34px 26px;padding:0 34px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(255,255,255,.40);backdrop-filter:saturate(170%) blur(22px);-webkit-backdrop-filter:saturate(170%) blur(22px);border-bottom:1px solid rgba(255,255,255,.62);box-shadow:0 8px 26px rgba(146,36,42,.08);position:sticky;top:0;z-index:30}
  .apml-crumb{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#A58688;font-weight:800}.apml-page-title{font-size:17px;font-weight:900;color:var(--apml-ink);letter-spacing:-.02em;margin-top:1px}.apml-status{display:flex;align-items:center;gap:10px;font-size:12px;font-weight:800;color:var(--apml-muted)}
  .apml-dot{width:8px;height:8px;border-radius:50%;background:#059669;box-shadow:0 0 0 3px rgba(5,150,105,.12)}
  .apml-content{max-width:1180px;margin:0 auto}.apml-filter-card{background:rgba(255,255,255,.48);backdrop-filter:saturate(170%) blur(22px);-webkit-backdrop-filter:saturate(170%) blur(22px);border:1px solid rgba(255,255,255,.64);border-radius:28px;padding:14px 18px;margin-bottom:22px;box-shadow:0 8px 26px rgba(146,36,42,.08)}
  .apml-role-toggle{display:flex;gap:8px;flex-wrap:wrap}.apml-role-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:999px;border:1px solid rgba(139,26,30,.14);background:rgba(255,255,255,.72);color:var(--apml-muted);font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 6px 14px rgba(146,36,42,.05);transition:all .16s}.apml-role-btn.active{background:var(--apml-grad);color:#fff;border-color:transparent;box-shadow:0 12px 26px rgba(192,39,45,.28)}
  .apml-date-input{background:rgba(255,255,255,.78)!important;border:1.5px solid rgba(139,26,30,.18)!important;box-shadow:0 8px 18px rgba(146,36,42,.06),inset 0 1px 0 rgba(255,255,255,.45);border-radius:999px!important;padding:10px 14px!important;color:var(--apml-ink)!important}

  /* ============================================================
     Visibility + premium glassmorphism enhancement
     CSS-only update: preserves all React state, API, autosave,
     Google Sheets/localStorage, task, history, target and settings logic.
  ============================================================ */
  :root{
    --glass-hi:rgba(255,255,255,.72);
    --glass-mid:rgba(255,255,255,.56);
    --glass-low:rgba(255,255,255,.38);
    --glass-stroke:rgba(255,255,255,.82);
    --glass-stroke-red:rgba(139,26,30,.20);
    --glass-inner:inset 0 1px 0 rgba(255,255,255,.82), inset 0 -1px 0 rgba(139,26,30,.035);
    --depth-1:0 10px 26px rgba(94,25,31,.10),0 2px 8px rgba(0,0,0,.045);
    --depth-2:0 18px 52px rgba(94,25,31,.15),0 7px 18px rgba(0,0,0,.055);
    --depth-3:0 26px 80px rgba(94,25,31,.20),0 12px 30px rgba(0,0,0,.075);
    --focus-ring:0 0 0 4px rgba(192,39,45,.16),0 12px 28px rgba(192,39,45,.10);
  }

  body{
    background:
      radial-gradient(circle at 8% 12%, rgba(255,255,255,.98) 0%, rgba(255,255,255,.72) 26%, transparent 52%),
      radial-gradient(circle at 70% 4%, rgba(255,255,255,.42) 0%, transparent 28%),
      radial-gradient(circle at 92% 18%, rgba(255,104,116,.22) 0%, transparent 31%),
      radial-gradient(circle at 74% 84%, rgba(192,39,45,.18) 0%, transparent 34%),
      linear-gradient(135deg,#fffafa 0%,#fdebed 42%,#f7d3d7 100%) !important;
  }

  .apml-sidebar{
    border-right:1px solid rgba(255,255,255,.26)!important;
    box-shadow:14px 0 40px rgba(72,11,18,.18), inset -1px 0 0 rgba(255,255,255,.10)!important;
  }
  .apml-sidebar::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 42%,rgba(255,255,255,.06));
  }
  .apml-logo,.apml-sidebar-foot{position:relative;z-index:1}
  .apml-nav-btn{position:relative;z-index:1;text-shadow:0 1px 1px rgba(0,0,0,.12)}
  .apml-nav-btn:hover,.apml-nav-btn.active{
    outline:1px solid rgba(255,255,255,.22);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.24),0 14px 28px rgba(0,0,0,.16)!important;
  }

  .apml-topbar{
    background:linear-gradient(135deg,rgba(255,255,255,.74),rgba(255,255,255,.42))!important;
    border-bottom:1px solid var(--glass-stroke)!important;
    box-shadow:var(--depth-1),var(--glass-inner)!important;
  }

  .apml-filter-card,
  .apml-content > div:not(.apml-filter-card),
  .rounded-xl,
  .rounded-lg,
  .border,
  [class*="rounded-xl"],
  [class*="rounded-lg"]{
    box-shadow:var(--depth-1),var(--glass-inner);
  }

  .apml-filter-card,
  .bg-white,
  [style*='background: white'],
  [style*='background: "white"'],

  .rounded-lg.border{
    background:linear-gradient(145deg,rgba(255,255,255,.76),rgba(255,255,255,.48))!important;
    backdrop-filter:saturate(185%) blur(24px)!important;
    -webkit-backdrop-filter:saturate(185%) blur(24px)!important;
    border:1px solid var(--glass-stroke)!important;
    outline:1px solid rgba(139,26,30,.06);
  }

  .rounded-xl.border:hover,
  .rounded-lg.border:hover,
  .apml-filter-card:hover{
    box-shadow:var(--depth-2),var(--glass-inner)!important;

  /* KPI/stat tiles and task count cards */
  .grid > button.rounded-xl,
  .grid > div.rounded-xl,
  .grid > div.rounded-lg{
    position:relative;
    overflow:hidden;
  }
  .grid > button.rounded-xl::before,
  .grid > div.rounded-xl::before,
  .grid > div.rounded-lg::before{
    content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;
    background:linear-gradient(135deg,rgba(255,255,255,.52),transparent 44%,rgba(192,39,45,.045));
  }

  /* Section headers */
  button.w-full.flex.items-center,
  .apml-role-btn,

  /* Buttons */
  button:not(.apml-nav-btn):not(.apml-role-btn){

    transform:translateY(-1px);

  /* Improve contrast of muted text on glass */
  .text-xs,.text-sm,label{letter-spacing:.01em}
  [style*='color: rgb(100, 116, 139)'],
  [style*='color: #64748B'],
  [style*='color: BRAND.textMuted']{color:#7B5B5E!important}

  /* Stronger separation for nested feedback/report/task cards */
  .p-4.mb-3,
  .p-2\.5.mb-2,

    background:linear-gradient(145deg,rgba(255,255,255,.78),rgba(255,247,248,.56))!important;
    border:1px solid rgba(139,26,30,.12)!important;
    box-shadow:0 10px 24px rgba(94,25,31,.08),inset 0 1px 0 rgba(255,255,255,.72)!important;
  }

  /* Badges and status labels remain legible */
  span[class*="rounded-full"]{
    border:1px solid rgba(255,255,255,.62);
    box-shadow:0 4px 10px rgba(94,25,31,.07),inset 0 1px 0 rgba(255,255,255,.45);
  }

  /* Footer refinement */
  .apml-footer{
    background:linear-gradient(135deg,rgba(255,255,255,.64),rgba(255,255,255,.34))!important;

  }

  /* ============================================================
     Per-view colour theme system
     Each view sets data-view on .apml-shell which switches accent vars.
     Cards stay neutral; the shell, sidebar gradient, topbar accent,
     page title underline, and primary buttons pick up --view-accent.
  ============================================================ */
  .apml-shell{
    --view-accent: #7A1E25;
    --view-accent-soft: #FBE6E8;
    --view-accent-strong: #4E1118;
    --view-name: "Daily Update";
    --view-grad-from: #4E1118;
    --view-grad-mid: #71171F;
    --view-grad-to: #B02730;
  }
  .apml-shell[data-view="briefing"]{
    --view-accent:#1E3A5F; --view-accent-soft:#E0EAF5; --view-accent-strong:#0E2547; --view-name:"GM Briefing";
    --view-grad-from:#0E2547; --view-grad-mid:#1E3A5F; --view-grad-to:#3B5A85;
  }
  .apml-shell[data-view="today"]{
    --view-accent:#7A1E25; --view-accent-soft:#FBE6E8; --view-accent-strong:#4E1118; --view-name:"Daily Update";
    --view-grad-from:#4E1118; --view-grad-mid:#71171F; --view-grad-to:#B02730;
  }
  .apml-shell[data-view="leadTracker"]{
    --view-accent:#0F766E; --view-accent-soft:#CCFBF1; --view-accent-strong:#134E4A; --view-name:"Live Data";
    --view-grad-from:#134E4A; --view-grad-mid:#0F766E; --view-grad-to:#14B8A6;
  }
  .apml-shell[data-view="tasks"]{
    --view-accent:#C2410C; --view-accent-soft:#FFEDD5; --view-accent-strong:#7C2D12; --view-name:"Tasks";
    --view-grad-from:#7C2D12; --view-grad-mid:#C2410C; --view-grad-to:#F59E0B;
  }
  .apml-shell[data-view="history"]{
    --view-accent:#475569; --view-accent-soft:#E2E8F0; --view-accent-strong:#1E293B; --view-name:"History";
    --view-grad-from:#1E293B; --view-grad-mid:#475569; --view-grad-to:#64748B;
  }
  .apml-shell[data-view="targets"]{
    --view-accent:#6B21A8; --view-accent-soft:#F3E8FF; --view-accent-strong:#4C1D95; --view-name:"Targets";
    --view-grad-from:#4C1D95; --view-grad-mid:#6B21A8; --view-grad-to:#9333EA;
  }
  .apml-shell[data-view="settings"]{
    --view-accent:#374151; --view-accent-soft:#E5E7EB; --view-accent-strong:#111827; --view-name:"Settings";
    --view-grad-from:#111827; --view-grad-mid:#374151; --view-grad-to:#6B7280;
  }

  /* Sidebar gradient follows the active view */
  .apml-shell .apml-sidebar{
    background:linear-gradient(180deg, var(--view-grad-from) 0%, var(--view-grad-mid) 48%, var(--view-grad-to) 100%) !important;
    transition: background .35s ease;

  /* ---- Full-page background tint per view ---- */
  /* The shell paints a fixed-position layer behind everything that picks up
     the view's accent. Children of the shell (sidebar, main, footer) keep
     their own positioning and z-index — we do NOT override them. */
  .apml-shell::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.92) 0%, rgba(255,255,255,.62) 26%, transparent 56%),
      radial-gradient(circle at 88% 12%, var(--page-tint-1) 0%, transparent 34%),
      radial-gradient(circle at 78% 86%, var(--page-tint-2) 0%, transparent 38%),
      linear-gradient(135deg, var(--page-bg-from) 0%, var(--page-bg-mid) 42%, var(--page-bg-to) 100%);
    transition: background .4s ease;
  }
  /* Hide the body-level pink overlays only when shell is themed,
     so the per-view tint shows clean. Sidebar and main keep their own
     positioning and z-index from the base stylesheet. */
  body.themed-bg::before, body.themed-bg::after{ display: none !important; }

<body>
  <div id="splash">
    <div class="ring"></div>
    <div class="label">Loading APML Daily Update</div>
  </div>
  <div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// ============================================================
// LUCIDE ICON WRAPPER
// ============================================================
function Icon({ name, size = 20, color, className, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = '';
    const node = lucide[name];
    if (!node) return;
    const svg = lucide.createElement(node);
    svg.setAttribute('width', size);
    svg.setAttribute('height', size);
    if (color) svg.setAttribute('stroke', color);
    ref.current.appendChild(svg);
  }, [name, size, color]);
  return <span ref={ref} className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color, ...(style || {}) }} />;
}

// ============================================================
// BRAND
// ============================================================
const BRAND = {
  navy: "#7A1E25", navyDark: "#4E1118",
  teal: "#C0272D", tealDark: "#8B1A1E",
  gold: "#F6C7CB", goldDark: "#8B1A1E",
  navyLight: "#FBE6E8", tealLight: "#FDECEE", goldLight: "#FFF1F2",
  surface: "rgba(255,255,255,0.54)", surfaceAlt: "#F9E3E5", border: "rgba(255,255,255,0.62)",
  text: "#220F11", textMuted: "#7B5B5E",
  danger: "#B91C1C", dangerLight: "#FEE2E2",
  success: "#059669", successLight: "#DCFCE7",
};
const FD = "'Cormorant Garamond', Georgia, serif";
const FU = "'Manrope', system-ui, -apple-system, sans-serif";

// ============================================================
// CONSTANTS
// ============================================================
const SOURCES = ["Google Search", "Google Maps", "WhatsApp", "Friend / Family Referral", "Doctor Referral", "Insurance Company", "Social Media (Instagram)", "Social Media (Facebook)", "Social Media (TikTok)", "Social Media (LinkedIn)", "Marketing Staff Visit", "Walk-in / Saw Branch", "Repeat Patient", "Other"];
const SATIS = ["Satisfied", "Partially Satisfied", "Not Satisfied"];
const SERVICES = ["Walk-in Lab Test", "Home Collection", "NIPT / Genetic Test", "Health Package", "Insurance Test", "Corporate Test", "Other"];
const NON_DELIVERY = ["Patient contact unreachable", "Pending payment", "Sample re-test required", "Lab processing delay", "Doctor verification pending", "Wrong contact details", "Patient requested collection in person", "Other"];
const OWNERS = ["Patient Coordinator", "Front Office", "Both"];
const PRIORITIES = ["High", "Medium", "Low"];
const DEFAULT_TARGETS = {
  pc_revenue: 0, pc_patient_count: 0, pc_conversion: 0,
  pc_review_count: 0, pc_review_rating: 0, pc_active_plans: 0,
  pc_sm_posts: 0, pc_sm_leads: 0, pc_sm_spend: 0,
  fo_reg_count: 0, fo_call_answer: 0, fo_followup_count: 0,
  fo_tat_routine: 0, fo_delivery_ontime: 0,
};

// Source labels for the daily B2C card (configurable in Settings).
// Default labels reflect APML's actual operating sources.
const DEFAULT_B2C_LABELS = {
  src_core: "Core Lab",
  src_hc:   "Home Collection",
  src_main: "Covid",
  src_co:   "Business Development",
};
// Old defaults from earlier versions — used for transparent migration so that
// users who never customised their labels see the new names automatically.
const LEGACY_B2C_LABELS = {
  src_core: "APML Core",
  src_hc:   "APML HC",
  src_main: "APML Main",
  src_co:   "C/O Afzel",
};
const LS_B2C_LABELS = "apml-b2c-labels";
const labelsEqual = (a, b) => a && b && a.src_core===b.src_core && a.src_hc===b.src_hc && a.src_main===b.src_main && a.src_co===b.src_co;
const getB2CLabels = () => {
  try {
    const stored = JSON.parse(localStorage.getItem(LS_B2C_LABELS) || "null");
    if (stored && labelsEqual(stored, LEGACY_B2C_LABELS)) {
      // User never customised; upgrade silently to the new defaults.
      localStorage.setItem(LS_B2C_LABELS, JSON.stringify(DEFAULT_B2C_LABELS));
      return { ...DEFAULT_B2C_LABELS };
    }
    return { ...DEFAULT_B2C_LABELS, ...(stored || {}) };
  } catch { return DEFAULT_B2C_LABELS; }
};
const setB2CLabels = (l) => localStorage.setItem(LS_B2C_LABELS, JSON.stringify(l));

// ============================================================
// HELPERS
// ============================================================
const todayISO = () => { const d = new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); };
const yesterdayISO = () => { const d = new Date(); d.setDate(d.getDate()-1); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); };
const fmtDate = (iso) => iso ? new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const fmtDateShort = (iso) => iso ? new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short"}) : "—";
const fmtAED = (n) => "AED " + (Number(n)||0).toLocaleString("en-AE",{maximumFractionDigits:0});
const fmtNum = (n) => (Number(n)||0).toLocaleString("en-AE",{maximumFractionDigits:0});
const fmtPct = (n) => (Number(n)||0).toFixed(1) + "%";
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
const safeNum = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };

// ============================================================
// ANALYTICS HELPERS — for GM Briefing & alerts
// ============================================================
const monthKey = (iso) => iso ? iso.slice(0,7) : "";
const daysInMonth = (iso) => { const d = new Date(iso+"T00:00:00"); return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate(); };
const dayOfMonth = (iso) => Number(iso.slice(8,10));

// Sum a single entry across PC + FO into a normalised "row" used for trend & MTD math.
const rowFromEntry = (e) => {
  if (!e) return null;
  const pc = e.pc || {}; const fo = e.fo || {};
  const totRev = safeNum(pc.revenue_walkin) + safeNum(pc.revenue_home) + safeNum(pc.revenue_marketing) + safeNum(pc.revenue_apml_main);
  const totSamples = safeNum(pc.samples_walkin) + safeNum(pc.samples_home) + safeNum(pc.samples_marketing) + safeNum(pc.samples_apml_main);
  const totDel = safeNum(fo.reports_delivered_email) + safeNum(fo.reports_delivered_whatsapp) + safeNum(fo.reports_delivered_inperson);
  const ansRate = safeNum(fo.calls_received) > 0 ? (safeNum(fo.calls_answered)/safeNum(fo.calls_received))*100 : 0;
  const delRate = safeNum(fo.reports_due) > 0 ? (totDel/safeNum(fo.reports_due))*100 : 0;
  const conv = safeNum(pc.enquiries_received) > 0 ? (safeNum(pc.enquiries_converted)/safeNum(pc.enquiries_received))*100 : 0;
  return {
    date: e.date,
    revenue: totRev,
    samples: totSamples,
    revBySource: {
      core: safeNum(pc.revenue_walkin),
      hc:   safeNum(pc.revenue_home),
      main: safeNum(pc.revenue_apml_main),
      co:   safeNum(pc.revenue_marketing),
    },
    samplesBySource: {
      core: safeNum(pc.samples_walkin),
      hc:   safeNum(pc.samples_home),
      main: safeNum(pc.samples_apml_main),
      co:   safeNum(pc.samples_marketing),
    },
    patients: safeNum(pc.patients_total),
    patientsNew: safeNum(pc.patients_new),
    enquiries: safeNum(pc.enquiries_received),
    converted: safeNum(pc.enquiries_converted),
    conversion: conv,
    registrations: safeNum(fo.reg_total),
    callsRcv: safeNum(fo.calls_received),
    callsAns: safeNum(fo.calls_answered),
    callsMissed: safeNum(fo.calls_missed),
    answerRate: ansRate,
    reportsDue: safeNum(fo.reports_due),
    reportsDelivered: totDel,
    deliveryRate: delRate,
    undelivered: (fo.reports_not_delivered || []).length,
    complaints: safeNum(pc.complaints_received),
    complaintsResolved: safeNum(pc.complaints_resolved),
    smLeads: safeNum(pc.sm_leads),
    smPosts: safeNum(pc.sm_posts),
    feedback: pc.call_feedback || [],
    undeliveredItems: fo.reports_not_delivered || [],
    sources: (pc.call_feedback || []).map(f => f.source).filter(Boolean),
    satisfaction: (pc.call_feedback || []).map(f => f.satisfied).filter(Boolean),
    pcRemarks: pc.remarks || "",
    foRemarks: fo.remarks || "",
    statusNotes: fo.reg_status_notes || "",
  };
};

// Aggregate all entries within a given month (YYYY-MM) into MTD totals.
const mtdAggregate = (entries, mKey) => {
  const monthEntries = (entries || []).filter(e => (e?.date || "").startsWith(mKey));
  const rows = monthEntries.map(rowFromEntry).filter(Boolean);
  const sum = (k) => rows.reduce((a, r) => a + (r[k] || 0), 0);
  const sumSrc = (which, key) => rows.reduce((a, r) => a + ((r[which] && r[which][key]) || 0), 0);
  const sourceCounts = {};
  const reasonCounts = {};
  let satisfied = 0, satisTotal = 0;
  rows.forEach(r => {
    r.feedback.forEach(f => {
      if (f.source) sourceCounts[f.source] = (sourceCounts[f.source] || 0) + 1;
      if (f.satisfied) {
        satisTotal++;
        if (f.satisfied === "Satisfied") satisfied++;
      }
    });
    r.undeliveredItems.forEach(u => {
      if (u.reason) reasonCounts[u.reason] = (reasonCounts[u.reason] || 0) + 1;
    });
  });
  const topSources = Object.entries(sourceCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topReasons = Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const totRcv = sum("callsRcv");
  const totalRevenue = sum("revenue");
  const totalSamples = sum("samples");
  const daysReported = rows.length;
  return {
    daysReported,
    revenue: totalRevenue,
    samples: totalSamples,
    revBySource: {
      core: sumSrc("revBySource","core"),
      hc:   sumSrc("revBySource","hc"),
      main: sumSrc("revBySource","main"),
      co:   sumSrc("revBySource","co"),
    },
    samplesBySource: {
      core: sumSrc("samplesBySource","core"),
      hc:   sumSrc("samplesBySource","hc"),
      main: sumSrc("samplesBySource","main"),
      co:   sumSrc("samplesBySource","co"),
    },
    avgDailyRevenue: daysReported > 0 ? totalRevenue / daysReported : 0,
    avgDailySamples: daysReported > 0 ? totalSamples / daysReported : 0,
    arpa: totalSamples > 0 ? totalRevenue / totalSamples : 0,
    patients: sum("patients"),
    enquiries: sum("enquiries"),
    converted: sum("converted"),
    registrations: sum("registrations"),
    reportsDue: sum("reportsDue"),
    reportsDelivered: sum("reportsDelivered"),
    callsRcv: totRcv,
    callsAns: sum("callsAns"),
    answerRate: totRcv > 0 ? (sum("callsAns")/totRcv)*100 : 0,
    deliveryRate: sum("reportsDue") > 0 ? (sum("reportsDelivered")/sum("reportsDue"))*100 : 0,
    conversionRate: sum("enquiries") > 0 ? (sum("converted")/sum("enquiries"))*100 : 0,
    smLeads: sum("smLeads"),
    smPosts: sum("smPosts"),
    complaints: sum("complaints"),
    satisfactionRate: satisTotal > 0 ? (satisfied/satisTotal)*100 : 0,
    satisfactionN: satisTotal,
    topSources,
    topReasons,
  };
};

// Expected month-end "landing": linear projection from average daily run-rate.
const expectedLanding = (avgDaily, iso) => avgDaily * daysInMonth(iso);

// Find the entry from the prior calendar day in the saved list.
const priorEntry = (entries, iso) => {
  if (!entries || !iso) return null;
  const d = new Date(iso+"T00:00:00"); d.setDate(d.getDate()-1);
  const prev = d.toISOString().slice(0,10);
  return entries.find(e => e.date === prev) || null;
};

// Δ helper. Returns {abs, pct, dir: 'up'|'down'|'flat'}.
const delta = (cur, prev) => {
  const c = safeNum(cur), p = safeNum(prev);
  const abs = c - p;
  const pct = p !== 0 ? (abs/p)*100 : (c > 0 ? 100 : 0);
  return { abs, pct, dir: abs > 0 ? "up" : abs < 0 ? "down" : "flat" };
};

// MTD pace: how much of the month is gone vs how much of the target is hit.
const pace = (achieved, target, iso) => {
  const t = safeNum(target);
  if (t <= 0) return null;
  const dim = daysInMonth(iso);
  const dom = dayOfMonth(iso);
  const expected = (dom/dim)*t;
  const onPace = safeNum(achieved) >= expected * 0.95;
  return {
    pctAchieved: (safeNum(achieved)/t)*100,
    pctMonth: (dom/dim)*100,
    expected,
    onPace,
    gap: expected - safeNum(achieved),
  };
};

// Build alerts from today's entry, MTD aggregate, targets, and tasks.
const buildAlerts = (todayEntry, mtd, targets, tasks, iso) => {
  const alerts = [];
  const r = rowFromEntry(todayEntry);
  if (!r) return alerts;

  // Call answer rate below target
  if (r.callsRcv > 0 && safeNum(targets.fo_call_answer) > 0 && r.answerRate < safeNum(targets.fo_call_answer)) {
    alerts.push({ level: "high", icon: "PhoneOff", title: "Call answer rate below target",
      detail: `${r.answerRate.toFixed(1)}% today vs ${targets.fo_call_answer}% target. ${r.callsMissed} missed calls.` });
  }
  // Report delivery rate below 90%
  if (r.reportsDue > 0 && r.deliveryRate < 90) {
    alerts.push({ level: r.deliveryRate < 75 ? "high" : "medium", icon: "FileWarning", title: "Report delivery shortfall",
      detail: `${r.deliveryRate.toFixed(1)}% delivered (${r.reportsDelivered} of ${r.reportsDue}). ${r.undelivered} flagged with reasons.` });
  }
  // Many undelivered reports
  if (r.undelivered >= 5) {
    alerts.push({ level: "medium", icon: "AlertTriangle", title: `${r.undelivered} undelivered reports today`,
      detail: "Review reasons and assign follow-up actions." });
  }
  // Registration errors
  if (safeNum((todayEntry.fo || {}).reg_errors) >= 3) {
    alerts.push({ level: "medium", icon: "AlertOctagon", title: "Registration errors elevated",
      detail: `${(todayEntry.fo || {}).reg_errors} errors / insurance rejections logged.` });
  }
  // Unresolved complaints
  if (r.complaints > r.complaintsResolved) {
    alerts.push({ level: "medium", icon: "MessageSquare", title: "Unresolved complaints",
      detail: `${r.complaints} received, ${r.complaintsResolved} resolved.` });
  }
  // MTD revenue pace check
  if (safeNum(targets.pc_revenue) > 0) {
    const p = pace(mtd.revenue, targets.pc_revenue, iso);
    if (p && !p.onPace && p.gap > 0) {
      alerts.push({ level: "high", icon: "TrendingDown", title: "MTD revenue behind pace",
        detail: `${fmtAED(mtd.revenue)} achieved (${p.pctAchieved.toFixed(1)}%) vs ${p.pctMonth.toFixed(0)}% of month elapsed. Gap to expected: ${fmtAED(Math.max(0,p.gap))}.` });
    }
  }
  // Overdue high-priority tasks
  const overdueHigh = (tasks || []).filter(t => t.status !== "Closed" && t.priority === "High" && t.dueDate && t.dueDate < iso);
  if (overdueHigh.length > 0) {
    alerts.push({ level: "high", icon: "ClipboardX", title: `${overdueHigh.length} overdue High-priority task${overdueHigh.length>1?"s":""}`,
      detail: overdueHigh.slice(0,3).map(t => `• ${t.title}`).join("\n") });
  }
  return alerts;
};

// Field-completeness for forms (for the meter at the top).
const PC_REQUIRED_FIELDS = ["revenue_walkin","revenue_home","revenue_marketing","patients_total","patients_new","patients_repeat","enquiries_received","enquiries_converted","sm_posts","sm_engagement","sm_leads","new_reviews","avg_rating"];
const FO_REQUIRED_FIELDS = ["reg_total","reg_walkin","reg_appt","reg_insurance","reg_cash","calls_received","calls_answered","calls_missed","calls_outbound","reports_due","reports_delivered_email","reports_delivered_whatsapp"];
const completeness = (obj, fields) => {
  const filled = fields.filter(f => String(obj[f] ?? "").trim() !== "").length;
  return { filled, total: fields.length, pct: Math.round((filled/fields.length)*100) };
};

// ============================================================
// TOAST + MODAL — for save feedback and overwrite prompts
// ============================================================
const ToastContext = React.createContext({ push: () => {} });
function ToastHost({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = (t) => {
    const id = uid();
    const toast = { id, level: t.level || "info", title: t.title || "", detail: t.detail || "", ttl: t.ttl ?? 4500 };
    setToasts(prev => [...prev, toast]);
    if (toast.ttl > 0) setTimeout(() => setToasts(prev => prev.filter(x => x.id !== id)), toast.ttl);
  };
  const dismiss = (id) => setToasts(prev => prev.filter(t => t.id !== id));
  return <ToastContext.Provider value={{ push }}>
    {children}
    <div style={{ position: "fixed", bottom: 16, right: 16, zIndex: 9000, display: "flex", flexDirection: "column", gap: 8, maxWidth: 380 }}>
      {toasts.map(t => {
        const tone = t.level === "error" ? { bg: "#FEE2E2", fg: "#991B1B", border: "#DC2626" }
                   : t.level === "warn"  ? { bg: "#FEF3C7", fg: "#92400E", border: "#D97706" }
                   : t.level === "success" ? { bg: "#DCFCE7", fg: "#14532D", border: "#16A34A" }
                   :                          { bg: "#FFFFFF", fg: "#1F2937", border: "#9CA3AF" };
        return <div key={t.id} onClick={() => dismiss(t.id)} style={{
          background: tone.bg, color: tone.fg, border: `1px solid ${tone.border}`, borderRadius: 12, padding: "10px 14px",
          fontFamily: FU, fontSize: 12, boxShadow: "0 18px 40px rgba(0,0,0,.16)", cursor: "pointer", animation: "slideIn .2s ease"
        }}>
          <div style={{ fontWeight: 800, marginBottom: t.detail ? 2 : 0 }}>{t.title}</div>
          {t.detail && <div style={{ opacity: .85, lineHeight: 1.5 }}>{t.detail}</div>}
        </div>;
      })}
    </div>
  </ToastContext.Provider>;
}
function useToast() { return React.useContext(ToastContext); }

// Modal for overwrite confirmation
function ConfirmModal({ open, title, body, confirmLabel = "OK", cancelLabel = "Cancel", confirmVariant = "primary", onConfirm, onCancel, extras }) {
  if (!open) return null;
  return <div style={{
    position: "fixed", inset: 0, background: "rgba(0,0,0,.45)", zIndex: 9100,
    display: "flex", alignItems: "center", justifyContent: "center", padding: 16
  }}>
    <div style={{
      background: "#fff", borderRadius: 18, maxWidth: 480, width: "100%", boxShadow: "0 30px 60px rgba(0,0,0,.30)",
      padding: 22, fontFamily: FU
    }}>
      <h3 style={{ margin: 0, fontSize: 16, fontWeight: 800, color: BRAND.navy, fontFamily: FD }}>{title}</h3>
      <div style={{ marginTop: 8, fontSize: 13, color: BRAND.text, lineHeight: 1.55 }}>{body}</div>
      {extras}
      <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 18, flexWrap: "wrap" }}>
        <Button onClick={onCancel} variant="ghost">{cancelLabel}</Button>
        <Button onClick={onConfirm} variant={confirmVariant}>{confirmLabel}</Button>
      </div>
    </div>
  </div>;
}

// ============================================================
// TOAST + MODAL END
// ============================================================

// ============================================================
// WELCOME CARD — shown the first time a user lands inside the app
// ============================================================
const LS_WELCOMED = "apml-welcomed-v1";

function WelcomeCard({ user, role, onDismiss, onGoTo }) {
  const roleObj = ROLE_OPTIONS.find(r => r.id === role);
  return <div className="rounded-xl border-2 mb-4 p-4 sm:p-5"
    style={{ borderColor: BRAND.navy, background: "linear-gradient(135deg, rgba(255,255,255,.92), rgba(224,234,245,.78))" }}>
    <div className="flex items-start gap-3 mb-3">
      <div style={{ width: 38, height: 38, borderRadius: 12, background: BRAND.navy, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
        <Icon name="Sparkles" size={18} />
      </div>
      <div className="flex-1 min-w-0">
        <div className="text-base font-bold mb-0.5" style={{ color: BRAND.navy, fontFamily: FD }}>
          Welcome{user?.name && !user.guest ? `, ${user.name.split(" ")[0]}` : ""} — signed in as {roleObj?.label || "—"}
        </div>
        <p className="text-xs" style={{ color: BRAND.text, fontFamily: FU, lineHeight: 1.55 }}>
          The whole tool runs in your browser; data syncs to Google Sheets when configured. Three things to know:
        </p>
      </div>
      <button onClick={onDismiss} aria-label="Dismiss" style={{ background: "none", border: "none", cursor: "pointer", color: BRAND.textMuted, padding: 4 }}>
        <Icon name="X" size={18} />
      </button>
    </div>
    <ol className="text-xs" style={{ color: BRAND.text, fontFamily: FU, lineHeight: 1.7, paddingLeft: 24, listStyle: "decimal" }}>
      <li><strong>Daily Update</strong> is where you enter yesterday's lab numbers. Click <strong>Save</strong> (or press Ctrl/⌘+S) — entries do <em>not</em> auto-save unless you turn that on in Settings.</li>
      <li><strong>B2C Card</strong> generates the WhatsApp summary you share each morning. Pick a date, then tap <strong>Share to WhatsApp</strong> or <strong>Download PNG</strong>.</li>
      <li><strong>GM Briefing</strong> is the executive view — KPIs, MTD pace, alerts and overdue tasks at a glance.</li>
    </ol>
    <div className="flex gap-2 flex-wrap mt-3 pt-3 border-t" style={{ borderColor: BRAND.border }}>
      <Button onClick={() => { onGoTo(roleObj?.defaultView || "today"); onDismiss(); }} variant="primary" size="sm" icon="ArrowRight">
        {roleObj?.defaultView === "briefing" ? "Open GM Briefing" : "Start daily update"}
      </Button>
      <Button onClick={() => { onGoTo("settings"); onDismiss(); }} variant="ghost" size="sm" icon="Settings">Configure backend</Button>
      <Button onClick={onDismiss} variant="ghost" size="sm">Got it</Button>
    </div>
  </div>;
}

function SaveFAB({ isDirty, saveStatus, onSave }) {
  // Only show the FAB when there's something to save or a save is in flight,
  // so it doesn't add visual noise on a clean form.
  if (!isDirty && saveStatus !== "saving" && saveStatus !== "saved" && saveStatus !== "error") return null;
  const label =
    saveStatus === "saving" ? "Saving…" :
    saveStatus === "saved"  ? "Saved" :
    saveStatus === "error"  ? "Retry save" :
                              "Save changes";
  const bg =
    saveStatus === "saved"  ? BRAND.success :

// Every saved entry / task carries:
//   lastSavedAt  ISO datetime (server-time wins for conflict checks)
//   lastSavedBy  email or "Guest"
//   log          array of { at, by, summary, fields[] } — capped at 100
//
// "loadedVersion" is the lastSavedAt value at the moment the entry was loaded
// from the server. On save we re-fetch and compare; if the server version is
// newer, we treat it as a conflict and ask the user how to proceed.

const MAX_LOG_ENTRIES = 100;

const compareEntryFields = (oldE, newE) => {
  // Returns a short summary of which top-level field groups changed.
  const changed = [];
  const oldPC = oldE?.pc || {}, newPC = newE?.pc || {};
  const oldFO = oldE?.fo || {}, newFO = newE?.fo || {};
  const fieldDiffs = [];
  const compareObj = (o, n, prefix) => {
    const keys = new Set([...Object.keys(o), ...Object.keys(n)]);
    keys.forEach(k => {
      const a = o[k], b = n[k];
      if (Array.isArray(a) || Array.isArray(b)) {
        if (JSON.stringify(a||[]) !== JSON.stringify(b||[])) fieldDiffs.push(prefix + "." + k);
      } else if ((a ?? "") !== (b ?? "")) {
        fieldDiffs.push(prefix + "." + k);
      }
    });
  };
  compareObj(oldPC, newPC, "pc");
  compareObj(oldFO, newFO, "fo");
  if ((oldE?.meta?.submittedBy || "") !== (newE?.meta?.submittedBy || "")) fieldDiffs.push("meta.submittedBy");
  if ((oldE?.meta?.meetingTime || "") !== (newE?.meta?.meetingTime || "")) fieldDiffs.push("meta.meetingTime");
  return fieldDiffs;
};

const buildAuditEntry = (oldE, newE, user) => {
  const fields = compareEntryFields(oldE, newE);
  const at = new Date().toISOString();
  const by = (user?.email && !user.guest) ? user.email : (user?.name || "Guest");
  let summary = "";
  if (!oldE || !oldE.lastSavedAt) summary = "Created entry";
  else if (fields.length === 0) summary = "Re-saved with no changes";
  else if (fields.length <= 3) summary = "Updated " + fields.join(", ");
  else summary = `Updated ${fields.length} fields`;
  return { at, by, summary, fields };
};

const stampSave = (entry, user, oldEntry) => {
  const audit = buildAuditEntry(oldEntry, entry, user);
  const log = [...(entry.log || oldEntry?.log || []), audit].slice(-MAX_LOG_ENTRIES);
  return { ...entry, lastSavedAt: audit.at, lastSavedBy: audit.by, log };
};

// Format helper for log timestamps
const fmtLogTime = (iso) => {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    return d.toLocaleString("en-GB", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
  } catch { return iso; }
};

// ============================================================
// API LAYER — Google Sheets via Apps Script + localStorage fallback
// ============================================================
const LS_URL_KEY = "apml-gs-url";
const LS_PREFIX = "apml-data-";

const API = {
  url: localStorage.getItem(LS_URL_KEY) || "",
  setUrl(url) { this.url = url; localStorage.setItem(LS_URL_KEY, url || ""); },
  isOnline() { return !!this.url; },

  async _post(action, payload) {
    if (!this.url) {
      // ----- LOCAL MODE: localStorage fallback -----
      return this._local(action, payload);
    }
    try {
      const res = await fetch(this.url, {
        method: "POST",
        // text/plain avoids CORS preflight on Apps Script
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action, ...payload }),
        redirect: "follow",
      });
      const text = await res.text();
      try {
        const json = JSON.parse(text);
        if (json.error) throw new Error(json.error);
        return json;
      } catch (e) {
        throw new Error("Invalid response: " + text.slice(0, 200));
      }
    } catch (e) {
      console.error("API error", action, e);
      // On network failure, fall back to localStorage cache
      return this._local(action, payload, /*fallback=*/true);
    }
  },

  _local(action, payload, fallback = false) {
    // localStorage emulation of the same API
    const get = (k) => { try { return JSON.parse(localStorage.getItem(LS_PREFIX + k) || "null"); } catch { return null; } };
    const set = (k, v) => localStorage.setItem(LS_PREFIX + k, JSON.stringify(v));
    const result = { _local: true, _fallback: fallback };

    switch (action) {
      case "getEntry": {
        const entry = get("entry:" + payload.date);
        return { ...result, entry };
      }
      case "saveEntry": {
        set("entry:" + payload.entry.date, payload.entry);
        // Maintain index
        const idx = get("entry-index") || [];
        if (!idx.includes(payload.entry.date)) {
          idx.push(payload.entry.date);
          set("entry-index", idx);
        }
        return { ...result, ok: true };
      }
      case "listEntries": {
        const idx = get("entry-index") || [];
        const entries = idx.map(d => get("entry:" + d)).filter(Boolean)
          .sort((a, b) => b.date.localeCompare(a.date));
        return { ...result, entries };
      }
      case "getTargets": {
        return { ...result, targets: get("targets") || DEFAULT_TARGETS };
      }
      case "saveTargets": {
        set("targets", payload.targets);
        return { ...result, ok: true };
      }
      case "getTasks": {
        return { ...result, tasks: get("tasks") || [] };
      }
      case "saveTask": {
        const tasks = get("tasks") || [];
        const i = tasks.findIndex(t => t.id === payload.task.id);
        if (i >= 0) tasks[i] = payload.task; else tasks.push(payload.task);
        set("tasks", tasks);
        return { ...result, ok: true };
      }
      case "deleteTask": {
        const tasks = (get("tasks") || []).filter(t => t.id !== payload.id);
        set("tasks", tasks);
        return { ...result, ok: true };
      }
      default: return { ...result, error: "Unknown action: " + action };
    }
  },

  getEntry(date) { return this._post("getEntry", { date }); },
  saveEntry(entry) { return this._post("saveEntry", { entry }); },
  listEntries() { return this._post("listEntries", {}); },
  getTargets() { return this._post("getTargets", {}); },
  saveTargets(targets) { return this._post("saveTargets", { targets }); },
  getTasks() { return this._post("getTasks", {}); },
  saveTask(task) { return this._post("saveTask", { task }); },
  deleteTask(id) { return this._post("deleteTask", { id }); },
};

// TASKS VIEW (with persistent follow-ups)
// ============================================================
function TasksView({ tasks, setTasks, refresh }) {
  const [filter, setFilter] = useState("All");
  const [ownerFilter, setOwnerFilter] = useState("All");
  const [showAdd, setShowAdd] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState({});
  const [statusNoteDraft, setStatusNoteDraft] = useState({});
  const [newTask, setNewTask] = useState({ title: "", description: "", owner: "Patient Coordinator", priority: "Medium", dueDate: "", raisedBy: "" });
  const [followupDraft, setFollowupDraft] = useState({});
  const today = todayISO();

  const TASK_STATUSES = ["Open", "In Progress", "Blocked", "Awaiting Info", "Closed"];

  const taskStatus = (t) => {
    if (t.status === "Closed") return "Closed";
    if (t.dueDate && t.dueDate < today && t.status !== "Closed") return "Overdue";
    return t.status || "Open";
  };

  const filtered = useMemo(() => {
    let list = [...tasks];
    if (filter === "Open") list = list.filter(t => t.status !== "Closed");
    else if (filter === "Closed") list = list.filter(t => t.status === "Closed");
    else if (filter === "Overdue") list = list.filter(t => taskStatus(t) === "Overdue");
    if (ownerFilter !== "All") list = list.filter(t => t.owner === ownerFilter || t.owner === "Both");
    return list.sort((a, b) => {
      if (a.status === "Closed" && b.status !== "Closed") return 1;
      if (a.status !== "Closed" && b.status === "Closed") return -1;
      const p = { High: 0, Medium: 1, Low: 2 };
      return (p[a.priority] || 1) - (p[b.priority] || 1);
    });
  }, [tasks, filter, ownerFilter]);

  const counts = useMemo(() => ({
    All: tasks.length,
    Open: tasks.filter(t => t.status !== "Closed").length,
    Closed: tasks.filter(t => t.status === "Closed").length,
    Overdue: tasks.filter(t => taskStatus(t) === "Overdue").length,
  }), [tasks]);

  const persist = async (updatedTasks) => {
    setTasks(updatedTasks);
  };

  const handleAdd = async () => {
    if (!newTask.title.trim()) return;
    const task = { ...newTask, id: uid(), createdDate: today, status: "Open", followups: [] };
    const updated = [...tasks, task];
    setTasks(updated);
    await API.saveTask(task);
    setNewTask({ title: "", description: "", owner: "Patient Coordinator", priority: "Medium", dueDate: "", raisedBy: "" });
    setShowAdd(false);
  };

  const updateTask = async (id, changes) => {
    const updated = tasks.map(t => t.id === id ? { ...t, ...changes } : t);
    setTasks(updated);
    const target = updated.find(t => t.id === id);
    if (target) await API.saveTask(target);
  };

  const startEdit = (t) => {
    setEditingId(t.id);
    setEditDraft({
      title: t.title || "",
      description: t.description || "",
      owner: t.owner || "Patient Coordinator",
      priority: t.priority || "Medium",
      dueDate: t.dueDate || "",
      raisedBy: t.raisedBy || "",
    });
  };
  const cancelEdit = () => { setEditingId(null); setEditDraft({}); };
  const saveEdit = async (id) => {
    if (!editDraft.title?.trim()) return;
    await updateTask(id, { ...editDraft });
    cancelEdit();
  };

  const saveStatusNote = async (id) => {
    const note = (statusNoteDraft[id] || "").trim();
    if (!note) return;
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    await updateTask(id, { statusNote: note, statusNoteAt: today });
    setStatusNoteDraft({ ...statusNoteDraft, [id]: "" });
  };
  const clearStatusNote = async (id) => {
    await updateTask(id, { statusNote: "", statusNoteAt: "" });
  };

  const setStatus = (id, status) => {
    const changes = { status };
    if (status === "Closed") changes.closedDate = today;
    updateTask(id, changes);
  };

  const removeTask = async (id) => {
    if (!window.confirm("Delete this task permanently?")) return;
    setTasks(tasks.filter(t => t.id !== id));
    await API.deleteTask(id);
  };

  const addFollowup = (taskId) => {
    const text = (followupDraft[taskId] || "").trim();
    if (!text) return;
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    const newFU = { id: uid(), date: today, note: text };
    const updated = { ...task, followups: [...(task.followups || []), newFU] };
    updateTask(taskId, { followups: updated.followups });
    setFollowupDraft({ ...followupDraft, [taskId]: "" });
  };

  return <div>
    <div className="grid grid-cols-4 gap-2 mb-5">
      {[["All", counts.All, BRAND.navy], ["Open", counts.Open, BRAND.gold], ["Overdue", counts.Overdue, BRAND.danger], ["Closed", counts.Closed, BRAND.success]].map(([label, count, color]) => (
        <button key={label} onClick={() => setFilter(label)} className="rounded-xl p-3 border transition-all"
          style={{ background: filter === label ? color : "white", borderColor: filter === label ? color : BRAND.border, color: filter === label ? "white" : BRAND.text }}>
          <div className="text-xl font-bold" style={{ fontFamily: FD }}>{count}</div>
          <div className="text-[10px] font-bold uppercase tracking-wider" style={{ fontFamily: FU }}>{label}</div>
        </button>
      ))}
    </div>

    <div className="flex flex-col sm:flex-row gap-2 mb-4">
      <div className="flex-1">
        <SelectInput value={ownerFilter} onChange={setOwnerFilter} options={["All", ...OWNERS]} placeholder="Filter by owner" />
      </div>
      <Button onClick={() => setShowAdd(!showAdd)} variant="gold" icon={showAdd ? "XCircle" : "Plus"}>
        {showAdd ? "Cancel" : "Add Task"}
      </Button>
    </div>

    {showAdd && (
      <div className="rounded-xl border p-4 mb-4" style={{ background: BRAND.goldLight, borderColor: BRAND.gold }}>
        <h3 className="text-base font-bold mb-3" style={{ color: BRAND.navy, fontFamily: FU }}>New Pending Task</h3>
        <Field label="Task Title" required><TextInput value={newTask.title} onChange={(v) => setNewTask({ ...newTask, title: v })} placeholder="e.g. Follow up with insurance on rejected claim" /></Field>
        <Field label="Description"><TextArea value={newTask.description} onChange={(v) => setNewTask({ ...newTask, description: v })} rows={2} /></Field>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <Field label="Owner"><SelectInput value={newTask.owner} onChange={(v) => setNewTask({ ...newTask, owner: v })} options={OWNERS} /></Field>
          <Field label="Priority"><SelectInput value={newTask.priority} onChange={(v) => setNewTask({ ...newTask, priority: v })} options={PRIORITIES} /></Field>
          <Field label="Due Date"><TextInput type="date" value={newTask.dueDate} onChange={(v) => setNewTask({ ...newTask, dueDate: v })} /></Field>
          <Field label="Raised By"><TextInput value={newTask.raisedBy} onChange={(v) => setNewTask({ ...newTask, raisedBy: v })} /></Field>
        </div>
        <div className="flex gap-2 mt-2">
          <Button onClick={handleAdd} variant="primary" icon="Check">Save Task</Button>
          <Button onClick={() => setShowAdd(false)} variant="ghost">Cancel</Button>
        </div>
      </div>
    )}

    {filtered.length === 0 && (
      <div className="text-center py-12 px-4 rounded-xl border-2 border-dashed" style={{ borderColor: BRAND.border, background: "white" }}>
        <Icon name="ClipboardList" size={32} color={BRAND.textMuted} style={{ margin: "0 auto 12px" }} />

    {filtered.map((t) => {
      const status = taskStatus(t);
      const expanded = expandedId === t.id;
      const isEditing = editingId === t.id;
      const isOverdue = status === "Overdue";
      return <div key={t.id} className="rounded-xl border mb-3 overflow-hidden" style={{
        background: "white", borderColor: isOverdue ? BRAND.danger : BRAND.border,
        borderLeftWidth: 4, borderLeftColor: t.priority === "High" ? BRAND.danger : t.priority === "Medium" ? BRAND.gold : BRAND.textMuted,
      }}>
        <div className="p-4">
          {isEditing ? (
            <div>
              <Field label="Task Title" required><TextInput value={editDraft.title} onChange={(v) => setEditDraft({ ...editDraft, title: v })} /></Field>
              <Field label="Description"><TextArea value={editDraft.description} onChange={(v) => setEditDraft({ ...editDraft, description: v })} rows={2} /></Field>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <Field label="Owner"><SelectInput value={editDraft.owner} onChange={(v) => setEditDraft({ ...editDraft, owner: v })} options={OWNERS} /></Field>
                <Field label="Priority"><SelectInput value={editDraft.priority} onChange={(v) => setEditDraft({ ...editDraft, priority: v })} options={PRIORITIES} /></Field>
                <Field label="Due Date"><TextInput type="date" value={editDraft.dueDate} onChange={(v) => setEditDraft({ ...editDraft, dueDate: v })} /></Field>
                <Field label="Raised By"><TextInput value={editDraft.raisedBy} onChange={(v) => setEditDraft({ ...editDraft, raisedBy: v })} /></Field>
              </div>
              <div className="flex gap-2 mt-2">
                <Button onClick={() => saveEdit(t.id)} variant="primary" icon="Save" size="sm">Save Changes</Button>
                <Button onClick={cancelEdit} variant="ghost" size="sm">Cancel</Button>
              </div>
            </div>
          ) : (
            <>
              <div className="flex items-start justify-between gap-3 mb-2">
                <h4 className="flex-1 font-bold text-sm" style={{ color: BRAND.navy, fontFamily: FU, lineHeight: 1.4 }}>{t.title}</h4>
                <div className="flex flex-col items-end gap-1 flex-shrink-0">
                  <StatusBadge status={status} /><StatusBadge status={t.priority} />
                </div>
              </div>
              {t.description && <p className="text-xs mb-2" style={{ color: BRAND.textMuted, fontFamily: FU, lineHeight: 1.5 }}>{t.description}</p>}
              {t.statusNote && (
                <div className="rounded-lg p-2.5 mb-3" style={{ background: BRAND.tealLight, borderLeft: `3px solid ${BRAND.teal}` }}>
                  <div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{ color: BRAND.tealDark, fontFamily: FU }}>
                    Current Status {t.statusNoteAt ? `· updated ${fmtDateShort(t.statusNoteAt)}` : ""}

              <div className="flex flex-wrap gap-x-4 gap-y-1 text-[11px] mb-3" style={{ color: BRAND.textMuted, fontFamily: FU }}>
                <span><strong>Owner:</strong> {t.owner}</span>
                {t.dueDate && <span style={{ color: isOverdue ? BRAND.danger : BRAND.textMuted }}><strong>Due:</strong> {fmtDateShort(t.dueDate)}</span>}
                <span><strong>Raised:</strong> {fmtDateShort(t.createdDate)}{t.raisedBy ? ` • ${t.raisedBy}` : ""}</span>
                {t.followups?.length > 0 && <span><strong>{t.followups.length}</strong> follow-up{t.followups.length > 1 ? "s" : ""}</span>}
              </div>
              <div className="flex gap-2 flex-wrap">
                <Button onClick={() => setExpandedId(expanded ? null : t.id)} variant="secondary" size="sm" icon={expanded ? "ChevronDown" : "ChevronRight"}>
                  {expanded ? "Hide" : "Update / Notes"}
                </Button>
                <Button onClick={() => startEdit(t)} variant="ghost" size="sm" icon="Edit3">Edit</Button>
                {t.status !== "Closed" && (
                  <select value={t.status || "Open"} onChange={(e) => updateTask(t.id, { status: e.target.value, ...(e.target.value === "Closed" ? { closedDate: today } : {}) })}
                    className="px-3 py-1.5 text-xs rounded-lg border focus:outline-none"
                    style={{ borderColor: BRAND.border, fontFamily: FU, background: "white", color: BRAND.text, fontWeight: 700 }}>

              </div>

          )}
        </div>
        {expanded && !isEditing && (
          <div className="border-t px-4 py-3" style={{ borderColor: BRAND.border, background: BRAND.surface }}>
            {/* Status Note section */}

                style={{ borderColor: BRAND.border, fontFamily: FU, background: "white" }} />

              {t.statusNote && <Button onClick={() => clearStatusNote(t.id)} variant="ghost" size="sm" icon="X">Clear</Button>}

            <div className="text-xs font-bold uppercase tracking-wide mb-2 pt-2 border-t" style={{ color: BRAND.navy, fontFamily: FU, borderColor: BRAND.border }}>Follow-up Log <span style={{ color: BRAND.textMuted, fontWeight: 600, marginLeft: 6 }}>(timestamped history)</span></div>
            {(t.followups || []).length === 0 && <p className="text-xs italic mb-2" style={{ color: BRAND.textMuted, fontFamily: FU }}>No follow-ups recorded yet.</p>}
            {(t.followups || []).map((f) => (

                <div className="text-[10px] font-bold uppercase tracking-wider mb-1" style={{ color: BRAND.teal, fontFamily: FU }}>{fmtDate(f.date)}</div>

  </div>;
}

function SettingsView({ onUrlChange, autoSaveEnabled, setAutoSaveEnabled }) {
  const [url, setUrl] = useState(API.url);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  // Google sign-in admin config
  const [gClientId, setGClientId] = useState(getGoogleClientId());
  const [gSavedMsg, setGSavedMsg] = useState("");

  // B2C source label customization
  const [labels, setLabels] = useState(() => getB2CLabels());
  const [labelMsg, setLabelMsg] = useState("");
  const saveLabels = () => {
    setB2CLabels(labels);
    setLabelMsg("Labels saved. They'll appear in the Daily Update and B2C Card.");
    setTimeout(() => setLabelMsg(""), 3000);
  };
  const resetLabels = () => { setLabels(DEFAULT_B2C_LABELS); setB2CLabels(DEFAULT_B2C_LABELS); setLabelMsg("Reset to defaults."); setTimeout(() => setLabelMsg(""), 2500); };

  const saveGoogle = () => {
    setGoogleClientId(gClientId.trim());
    setGSavedMsg("Saved. Sign-in will use this on next login.");
    setTimeout(() => setGSavedMsg(""), 3000);
  };
  const clearGoogle = () => {
    if (!window.confirm("Disable Gmail sign-in? Users will only be able to use Guest mode until a Client ID is reconfigured.")) return;
    setGoogleClientId(""); setGClientId("");
    setGSavedMsg("Cleared.");
    setTimeout(() => setGSavedMsg(""), 2500);
  };

  const save = () => {
    API.setUrl(url.trim());
    onUrlChange();
  };

  const test = async () => {
    if (!url.trim()) return;
    setTesting(true); setTestResult(null);
    const oldUrl = API.url;
    API.setUrl(url.trim());
    try {
      const r = await API.getTargets();
      if (r._fallback) setTestResult({ ok: false, msg: "Could not reach the URL. Check that the deployment is active and access is set to 'Anyone'." });
      else setTestResult({ ok: true, msg: "Connection successful. Backend is responding." });
    } catch (e) {
      setTestResult({ ok: false, msg: e.message });
    } finally {
      API.setUrl(oldUrl);
      setTesting(false);
    }
  };

  const disconnect = () => {
    if (!window.confirm("Disconnect from Google Sheets? Local data will be used until you reconnect.")) return;
    setUrl("");
    API.setUrl("");
    onUrlChange();
  };

  return <div>
    <SectionCard title="Storage Backend" icon="Database" accent="navy">
      <div className="mb-4 p-3 rounded-lg" style={{ background: API.url ? BRAND.successLight : BRAND.goldLight }}>
        <div className="flex items-center gap-2 mb-1">
          <Icon name={API.url ? "CheckCircle2" : "AlertTriangle"} size={16} color={API.url ? BRAND.success : BRAND.goldDark} />
          <span className="text-xs font-bold uppercase tracking-wider" style={{ color: API.url ? BRAND.success : BRAND.goldDark, fontFamily: FU }}>
            {API.url ? "Online — Google Sheets" : "Offline — Local Storage"}
          </span>
        </div>
        <p className="text-xs" style={{ color: API.url ? BRAND.success : BRAND.goldDark, fontFamily: FU }}>
          {API.url ? "Data is being saved to your Google Sheet." : "Data is saved only on this device. Configure Google Sheets below to sync across devices."}
        </p>
      </div>
      <Field label="Google Apps Script Web App URL" hint="Deploy the Apps Script as a Web App with access set to 'Anyone' and paste the URL here.">
        <TextArea value={url} onChange={setUrl} rows={3} placeholder="https://script.google.com/macros/s/AKfycb.../exec" />
      </Field>
      <div className="flex gap-2 flex-wrap">
        <Button onClick={test} variant="secondary" icon="Activity" disabled={!url.trim() || testing}>
          {testing ? "Testing..." : "Test Connection"}
        </Button>
        <Button onClick={save} variant="primary" icon="Save" disabled={!url.trim()}>Save & Connect</Button>
        {API.url && <Button onClick={disconnect} variant="danger" icon="XCircle">Disconnect</Button>}
      </div>
      {testResult && (
        <div className="mt-3 p-3 rounded-lg text-xs" style={{ background: testResult.ok ? BRAND.successLight : BRAND.dangerLight, color: testResult.ok ? BRAND.success : BRAND.danger, fontFamily: FU }}>
          <strong>{testResult.ok ? "✓ Success" : "✗ Failed"}:</strong> {testResult.msg}
        </div>
      )}
    </SectionCard>

    <SectionCard title="Save Behaviour" icon="Save" accent="teal">
      <p className="text-xs mb-4" style={{ color: BRAND.textMuted, fontFamily: FU }}>
        By default, daily entries require an explicit <strong>Save</strong>. The app warns you if someone else saved the same entry while you were editing, so changes aren't lost.
      </p>
      <label className="flex items-center gap-3 p-3 rounded-lg cursor-pointer" style={{ background: autoSaveEnabled ? BRAND.tealLight : "white", border: `1px solid ${autoSaveEnabled ? BRAND.teal : BRAND.border}` }}>
        <input type="checkbox" checked={autoSaveEnabled} onChange={(e) => setAutoSaveEnabled(e.target.checked)} style={{ accentColor: BRAND.teal, width: 18, height: 18 }} />
        <div className="flex-1">
          <div className="text-sm font-bold" style={{ color: BRAND.text, fontFamily: FU }}>Enable auto-save</div>
          <div className="text-[11px]" style={{ color: BRAND.textMuted, fontFamily: FU }}>
            Saves debounced 2.5 seconds after each edit. Conflict detection still applies.
          </div>
        </div>
      </label>
    </SectionCard>

    <SectionCard title="Sign-in (Gmail)" icon="LogIn" accent="navy">
      <div className="mb-4 p-3 rounded-lg" style={{ background: gClientId ? BRAND.successLight : BRAND.goldLight }}>
        <div className="flex items-center gap-2 mb-1">
          <Icon name={gClientId ? "CheckCircle2" : "AlertTriangle"} size={16} color={gClientId ? BRAND.success : BRAND.goldDark} />
          <span className="text-xs font-bold uppercase tracking-wider" style={{ color: gClientId ? BRAND.success : BRAND.goldDark, fontFamily: FU }}>
            {gClientId ? "Gmail sign-in enabled" : "Gmail sign-in not configured"}
          </span>
        </div>
        <p className="text-xs" style={{ color: gClientId ? BRAND.success : BRAND.goldDark, fontFamily: FU }}>
          {gClientId ? "Users can sign in with Google before choosing a role." : "Without a Client ID, users can only continue as Guest. Configure below to enable Gmail login."}
        </p>
      </div>
      <Field label="Google OAuth Client ID" hint="Create one at console.cloud.google.com → APIs & Services → Credentials → Create OAuth Client ID (Application type: Web). Add this site's origin to 'Authorised JavaScript origins'.">
        <TextInput value={gClientId} onChange={setGClientId} placeholder="123456789-abcdefg.apps.googleusercontent.com" />
      </Field>
      <div className="flex gap-2 flex-wrap">
        <Button onClick={saveGoogle} variant="primary" icon="Save" disabled={!gClientId.trim()}>Save Client ID</Button>
        {gClientId && <Button onClick={clearGoogle} variant="danger" icon="XCircle">Clear</Button>}
      </div>
      {gSavedMsg && <div className="text-[11px] mt-2 font-bold" style={{ color: BRAND.success, fontFamily: FU }}>{gSavedMsg}</div>}
    </SectionCard>

    <SectionCard title="B2C Source Labels" icon="Tag" accent="gold">
      <p className="text-xs mb-3" style={{ color: BRAND.textMuted, fontFamily: FU }}>
        These four labels appear on the Daily Update form and on the WhatsApp B2C card. Defaults match the morning briefing format.
      </p>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <Field label="Source 1 (was 'Walk-in Revenue')"><TextInput value={labels.src_core} onChange={(v) => setLabels({ ...labels, src_core: v })} /></Field>
        <Field label="Source 2 (was 'Home Collection')"><TextInput value={labels.src_hc} onChange={(v) => setLabels({ ...labels, src_hc: v })} /></Field>
        <Field label="Source 3 (new)"><TextInput value={labels.src_main} onChange={(v) => setLabels({ ...labels, src_main: v })} /></Field>
        <Field label="Source 4 (was 'Marketing Staff Revenue')"><TextInput value={labels.src_co} onChange={(v) => setLabels({ ...labels, src_co: v })} /></Field>
      </div>
      <div className="flex gap-2 mt-2">
        <Button onClick={saveLabels} variant="primary" icon="Save">Save Labels</Button>
        <Button onClick={resetLabels} variant="ghost" icon="RotateCcw">Reset to defaults</Button>
      </div>
      {labelMsg && <div className="text-[11px] mt-2 font-bold" style={{ color: BRAND.success, fontFamily: FU }}>{labelMsg}</div>}
    </SectionCard>

    <SectionCard title="Setup Instructions" icon="FileText" accent="gold">
      <ol className="text-xs space-y-3 pl-4 list-decimal" style={{ color: BRAND.text, fontFamily: FU, lineHeight: 1.6 }}>
        <li>Open <a href="https://sheets.google.com" target="_blank" style={{ color: BRAND.teal, textDecoration: "underline" }}>Google Sheets</a> and create a new spreadsheet titled "APML Daily GM Update".</li>
        <li>From the menu, choose <strong>Extensions → Apps Script</strong>.</li>
        <li>Delete the default code and paste the contents of the <code>apml_backend.gs</code> file provided.</li>
        <li>Click <strong>Save</strong>, then <strong>Deploy → New deployment</strong>.</li>
        <li>Choose type <strong>Web app</strong>. Set <em>Execute as: Me</em> and <em>Who has access: Anyone</em>.</li>
        <li>Click <strong>Deploy</strong>, copy the Web App URL, and paste it into the field above.</li>
        <li>Click <strong>Test Connection</strong>, then <strong>Save & Connect</strong>.</li>
      </ol>
    </SectionCard>
  </div>;
}

// AUTH — Google Identity Services (client-side, optional)
// Falls back to "guest" mode if no Client ID is configured.
// ============================================================
const LS_USER     = "apml-user";
const LS_ROLE     = "apml-role";
const LS_GOOGLE_CLIENT = "apml-google-client-id";

function decodeJwt(token) {
  try {
    const payload = token.split(".")[1];
    return JSON.parse(decodeURIComponent(atob(payload.replace(/-/g,"+").replace(/_/g,"/")).split("").map(c => "%" + c.charCodeAt(0).toString(16).padStart(2,"0")).join("")));
  } catch { return null; }
}
const getUser = () => { try { return JSON.parse(localStorage.getItem(LS_USER) || "null"); } catch { return null; } };
const setUser = (u) => u ? localStorage.setItem(LS_USER, JSON.stringify(u)) : localStorage.removeItem(LS_USER);
const getRole = () => localStorage.getItem(LS_ROLE) || "";
const setRoleLS = (r) => r ? localStorage.setItem(LS_ROLE, r) : localStorage.removeItem(LS_ROLE);
const getGoogleClientId = () => localStorage.getItem(LS_GOOGLE_CLIENT) || "";
const setGoogleClientId = (id) => id ? localStorage.setItem(LS_GOOGLE_CLIENT, id) : localStorage.removeItem(LS_GOOGLE_CLIENT);

function LoginScreen({ onSignedIn }) {
  const [role, setRole] = useState(getRole() || "");
  const [user, setLocalUser] = useState(getUser());
  const [clientId] = useState(getGoogleClientId());
  const [error, setError] = useState("");
  const btnRef = useRef(null);
  const initialized = useRef(false);

  useEffect(() => {
    if (initialized.current || !clientId || !window.google?.accounts?.id || !btnRef.current) return;
    try {
      window.google.accounts.id.initialize({
        client_id: clientId,
        callback: (resp) => {
          const payload = decodeJwt(resp.credential);
          if (!payload?.email) { setError("Could not read Google profile."); return; }
          const u = { email: payload.email, name: payload.name || payload.email, picture: payload.picture || "", at: Date.now() };
          setUser(u); setLocalUser(u);
        },
      });
      window.google.accounts.id.renderButton(btnRef.current, { type:"standard", theme:"outline", size:"large", shape:"rectangular", width: 280 });
      initialized.current = true;
    } catch (e) { setError("Google sign-in init failed: " + e.message); }
  }, [clientId, btnRef.current]);

  // Poll briefly until GSI script loads (it's deferred)
  useEffect(() => {
    if (!clientId) return;
    const t = setInterval(() => {
      if (window.google?.accounts?.id && !initialized.current && btnRef.current) {
        try {
          window.google.accounts.id.initialize({
            client_id: clientId,
            callback: (resp) => {
              const payload = decodeJwt(resp.credential);
              if (!payload?.email) return;
              const u = { email: payload.email, name: payload.name || payload.email, picture: payload.picture || "", at: Date.now() };
              setUser(u); setLocalUser(u);
            },
          });
          window.google.accounts.id.renderButton(btnRef.current, { type:"standard", theme:"outline", size:"large", shape:"rectangular", width: 280 });
          initialized.current = true;
        } catch {}
      }
    }, 400);
    return () => clearInterval(t);
  }, [clientId]);

  const continueAsGuest = () => {
    const u = { email: "guest@local", name: "Guest", picture: "", guest: true, at: Date.now() };
    setUser(u); setLocalUser(u);
  };

  const proceed = () => {
    if (!role) { setError("Please select a role to continue."); return; }
    if (!user) { setError("Please sign in or continue as guest."); return; }
    setRoleLS(role);
    onSignedIn({ user, role });
  };

  const signOutGoogle = () => { setUser(null); setLocalUser(null); initialized.current = false; };

  const roleObj = ROLE_OPTIONS.find(r => r.id === role);

  return <div className="login-shell">
    <div className="login-card">
      <div className="login-logo">
        <div className="ap">ap</div>
        <div>
          <div className="name">Accuracy Plus Medical Lab</div>
          <div className="sub">APML Daily Tracker</div>
        </div>
      </div>

      <div style={{ fontSize:13, fontWeight:700, color:"#220F11", marginBottom:8, fontFamily: FU }}>1. Sign in</div>
      {!user ? (
        <>
          {clientId ? (
            <div ref={btnRef} style={{ minHeight:44, display:"flex", justifyContent:"center" }}></div>
          ) : (
            <div className="rounded-lg border p-3 mb-2" style={{ background: BRAND.goldLight, borderColor: BRAND.gold, fontSize:11, color: BRAND.goldDark, fontFamily: FU }}>
              <strong>Google sign-in not configured.</strong> An admin can paste the Google OAuth Client ID under Settings → Sign-in to enable Gmail login. Until then, use Guest mode.
            </div>
          )}
          <button onClick={continueAsGuest}
            style={{ marginTop:10, width:"100%", padding:"10px 14px", borderRadius:12, border:"1px solid rgba(139,26,30,.18)",
                     background:"#fff", color:"#220F11", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily: FU }}>
            Continue as Guest
          </button>
        </>
      ) : (
        <div className="flex items-center gap-3 p-3 rounded-lg" style={{ background: BRAND.successLight }}>
          {user.picture ? <img src={user.picture} alt="" style={{ width:36, height:36, borderRadius:"50%" }} /> : <div style={{ width:36, height:36, borderRadius:"50%", background: BRAND.success, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800 }}>{(user.name||"?")[0]}</div>}
          <div className="flex-1 min-w-0">
            <div className="text-xs font-bold" style={{ color: BRAND.success, fontFamily: FU }}>{user.guest ? "Guest mode" : "Signed in"}</div>
            <div className="text-sm" style={{ color: BRAND.text, fontFamily: FU }}>{user.name}</div>
            {!user.guest && <div className="text-[10px]" style={{ color: BRAND.textMuted, fontFamily: FU }}>{user.email}</div>}
          </div>
          <button onClick={signOutGoogle} style={{ fontSize:11, color: BRAND.danger, background:"none", border:"none", cursor:"pointer", fontFamily: FU, fontWeight:700 }}>Switch</button>
        </div>
      )}

      <div style={{ fontSize:13, fontWeight:700, color:"#220F11", marginBottom:8, marginTop:18, fontFamily: FU }}>2. Choose your role</div>
      <div className="role-grid">
        {ROLE_OPTIONS.map(r => (
          <button key={r.id} onClick={() => { setRole(r.id); setError(""); }} className={`role-btn ${role===r.id?"active":""}`}>
            <Icon name={r.icon} size={22} />
            <div className="lbl">{r.label}</div>
          </button>
        ))}
      </div>

      {error && <div className="text-xs mt-3 p-2 rounded-lg" style={{ background: BRAND.dangerLight, color: BRAND.danger, fontFamily: FU }}>{error}</div>}

      <button onClick={proceed} disabled={!role || !user}
        style={{ marginTop:18, width:"100%", padding:"12px 16px", borderRadius:14, border:"none",
                 background: (role && user) ? "#7A1E25" : "#E5D6D8", color:"#fff", fontWeight:800, fontSize:14, cursor:(role && user)?"pointer":"not-allowed", fontFamily: FU,
                 boxShadow: (role && user) ? "0 12px 26px rgba(122,30,37,.28)" : "none" }}>
        Continue {roleObj ? `as ${roleObj.label}` : ""}
      </button>

      <div style={{ marginTop:14, fontSize:10, textAlign:"center", color:"#7B5B5E", letterSpacing:".08em", textTransform:"uppercase", fontWeight:700, fontFamily: FU }}>
        APML — Precision with Purpose
      </div>
    </div>
  </div>;
}
