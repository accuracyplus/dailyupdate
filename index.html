// DAILY B2C CARD — matches Sinu's WhatsApp screenshot exactly
// Auto-computed from saved entries; capturable as PNG; shareable.
// ============================================================
function buildB2CCardData(allEntries, iso) {
  const today = allEntries.find(e => e.date === iso) || null;
  const r = rowFromEntry(today);
  const mtd = mtdAggregate(allEntries, monthKey(iso));
  const labels = getB2CLabels();
  const rows = [
    { key: "core", label: labels.src_core, samples: r?.samplesBySource.core || 0, amount: r?.revBySource.core || 0 },
    { key: "hc",   label: labels.src_hc,   samples: r?.samplesBySource.hc   || 0, amount: r?.revBySource.hc   || 0 },
    { key: "main", label: labels.src_main, samples: r?.samplesBySource.main || 0, amount: r?.revBySource.main || 0 },
    { key: "co",   label: labels.src_co,   samples: r?.samplesBySource.co   || 0, amount: r?.revBySource.co   || 0 },
  ];
  const totalSamples = rows.reduce((a, x) => a + x.samples, 0);
  const totalAmount = rows.reduce((a, x) => a + x.amount, 0);
  const expected = expectedLanding(mtd.avgDailyRevenue, iso);
  return {
    date: iso, rows, totalSamples, totalAmount,
    avgSamples: mtd.avgDailySamples,
    avgRevenue: mtd.avgDailyRevenue,
    arpa: mtd.arpa,
    salesMTD: mtd.revenue,
    expectedLanding: expected,
    daysReported: mtd.daysReported,
  };
}

function buildB2CCardText(d) {
  const dt = new Date(d.date+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  const fmt = (n) => Number(n||0).toLocaleString("en-AE",{minimumFractionDigits:2,maximumFractionDigits:2});
  const lines = [];
  lines.push(`*B2C — ${dt}*`);
  lines.push(``);
  lines.push("```");
  lines.push(`B2C            Samples   Net Amount`);
  lines.push(`─────────────────────────────────────`);
  d.rows.forEach(r => {
    const lbl = (r.label || "").padEnd(13).slice(0,13);
    const smp = String(r.samples || "").padStart(8);
    const amt = fmt(r.amount).padStart(13);
    lines.push(`${lbl} ${smp}   ${amt}`);
  });
  lines.push(`─────────────────────────────────────`);
  lines.push(`Total          ${String(d.totalSamples).padStart(8)}   ${fmt(d.totalAmount).padStart(13)}`);
  lines.push(`Avg Samples    ${String(d.avgSamples.toFixed(2)).padStart(8)}`);
  lines.push(`Avg Revenue    ${" ".repeat(8)}   ${fmt(d.avgRevenue).padStart(13)}`);
  lines.push(`ARPA           ${" ".repeat(8)}   ${fmt(d.arpa).padStart(13)}`);
  lines.push(`Sales MTD      ${" ".repeat(8)}   ${fmt(d.salesMTD).padStart(13)}`);
  lines.push(`Exp Landing    ${" ".repeat(8)}   ${fmt(d.expectedLanding).padStart(13)}`);
  lines.push("```");
  return lines.join("\n");
}

function B2CCard({ data }) {
  const fmt = (n) => Number(n||0).toLocaleString("en-AE",{minimumFractionDigits:2,maximumFractionDigits:2});
  const dt = new Date(data.date+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  return <div id="b2c-share-card" className="b2c-card-frame">
    <div className="b2c-card-title">B2C — {dt}</div>
    <table className="b2c-card-table">
      <thead><tr><th>B2C —</th><th>Samples</th><th>Net Amount</th></tr></thead>
      <tbody>
        {data.rows.map(r => (
          <tr key={r.key}>
            <td>{r.label}</td>
            <td className={r.samples ? "" : "empty"}>{r.samples || ""}</td>
            <td className={r.amount ? "" : "empty"}>{r.amount ? fmt(r.amount) : ""}</td>
          </tr>
        ))}
        <tr className="row-total"><td>Total</td><td>{data.totalSamples}</td><td>{fmt(data.totalAmount)}</td></tr>
        <tr><td>Average Samples</td><td>{data.avgSamples.toFixed(2)}</td><td></td></tr>
        <tr><td>Average Revenue</td><td></td><td>{fmt(data.avgRevenue)}</td></tr>
        <tr><td>ARPA</td><td></td><td>{fmt(data.arpa)}</td></tr>
        <tr className="row-mtd"><td>Sales MTD</td><td></td><td>{fmt(data.salesMTD)}</td></tr>
        <tr className="row-landing"><td>Expected Landing</td><td></td><td>{fmt(data.expectedLanding)}</td></tr>
      </tbody>
    </table>
  </div>;
}

function B2CCardView({ allEntries, selectedDate }) {
  const [iso, setIso] = useState(selectedDate);
  const [busy, setBusy] = useState("");
  const [msg, setMsg] = useState("");
  const data = useMemo(() => buildB2CCardData(allEntries, iso), [allEntries, iso]);
  const text = useMemo(() => buildB2CCardText(data), [data]);

  const captureCanvas = async () => {
    if (typeof html2canvas !== "function") throw new Error("Capture library not loaded yet — refresh the page and try again.");
    const node = document.getElementById("b2c-share-card");
    if (!node) throw new Error("Card element not found.");
    return await html2canvas(node, { scale: 2, backgroundColor: "#ffffff", logging: false, useCORS: true });
  };

  const downloadPNG = async () => {
    setBusy("download"); setMsg("Capturing…");
    try {
      const canvas = await captureCanvas();
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `APML_B2C_${iso}.png`;
      document.body.appendChild(a); a.click(); a.remove();
      setMsg("Downloaded as " + a.download);
    } catch (e) { setMsg("Could not capture: " + e.message); }
    finally { setBusy(""); setTimeout(()=>setMsg(""), 3500); }
  };

  const shareToWhatsApp = async () => {
    setBusy("share"); setMsg("Preparing share…");
    try {
      const canvas = await captureCanvas();
      // Try Web Share API with file (works on most modern mobile browsers)
      if (navigator.canShare && navigator.share) {
        const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
        const file = new File([blob], `APML_B2C_${iso}.png`, { type: "image/png" });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: `APML B2C ${iso}`, text });
          setMsg("Shared.");
          return;
        }
      }
      // Fallback: download PNG + open WhatsApp web with text
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = `APML_B2C_${iso}.png`;
      document.body.appendChild(a); a.click(); a.remove();
      window.open("https://wa.me/?text=" + encodeURIComponent(text), "_blank", "noopener");
      setMsg("Image downloaded and WhatsApp opened. Attach the saved image.");
    } catch (e) { setMsg("Could not share: " + e.message); }
    finally { setBusy(""); setTimeout(()=>setMsg(""), 5000); }
  };

  const copyText = async () => {
    try { await navigator.clipboard.writeText(text); setMsg("Text copied to clipboard."); }
    catch { setMsg("Long-press the text below to copy manually."); }
    setTimeout(()=>setMsg(""), 2500);
  };

  return <div>
    <div className="apml-filter-card">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div className="flex items-center gap-3 flex-wrap">
          <span className="text-xs font-bold uppercase tracking-wider" style={{ color: BRAND.textMuted, fontFamily: FU }}>Card date</span>
          <input type="date" value={iso} onChange={(e) => setIso(e.target.value)} max={todayISO()} className="apml-date-input text-xs sm:text-sm" style={{ fontFamily: FU }} />
          <span className="text-[11px]" style={{ color: BRAND.textMuted, fontFamily: FU }}>
            MTD basis: {data.daysReported} day{data.daysReported===1?"":"s"} reported
          </span>
        </div>
        <div className="flex gap-2 flex-wrap">
          <Button onClick={shareToWhatsApp} variant="teal" size="sm" icon="Send" disabled={!!busy}>{busy==="share"?"Working…":"Share to WhatsApp"}</Button>
          <Button onClick={downloadPNG} variant="primary" size="sm" icon="Download" disabled={!!busy}>{busy==="download"?"Working…":"Download PNG"}</Button>
          <Button onClick={copyText} variant="secondary" size="sm" icon="Copy">Copy Text</Button>
        </div>
      </div>
      {msg && <div className="text-[11px] mt-2 font-bold" style={{ color: BRAND.success, fontFamily: FU }}>{msg}</div>}
    </div>

    {data.daysReported === 0 && (
      <div className="rounded-xl border p-4 mb-4" style={{ background: BRAND.goldLight, borderColor: BRAND.gold }}>
        <div className="text-xs font-bold uppercase tracking-wider mb-1" style={{ color: BRAND.goldDark, fontFamily: FU }}>No saved entries this month</div>
        <div className="text-xs" style={{ color: BRAND.goldDark, fontFamily: FU }}>Average Samples, Average Revenue, ARPA, MTD and Expected Landing will be 0 until you save entries via Daily Update.</div>
      </div>
    )}

    <div className="mb-4"><B2CCard data={data} /></div>

    <SectionCard title="Plain Text (for WhatsApp)" icon="MessageSquare" accent="teal" defaultOpen={false}>
      <textarea readOnly value={text} rows={14} className="w-full px-3 py-2.5 text-xs rounded-lg border focus:outline-none"
        style={{ borderColor: BRAND.border, background: "white", color: BRAND.text, fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace", whiteSpace: "pre" }} />
    </SectionCard>
  </div>;
}

// BRIEFING ATOMS — sparkline, pace bar, alert card, KPI card
// ============================================================
function Sparkline({ values, color = BRAND.navy, height = 28, width = 90 }) {
  if (!values || values.length < 2) {
    return <div style={{ height, width, fontSize: 10, color: BRAND.textMuted, fontFamily: FU, display:"flex", alignItems:"center" }}>—</div>;
  }
  const max = Math.max(...values, 1);
  const min = Math.min(...values, 0);
  const span = max - min || 1;
  const step = width / (values.length - 1);
  const points = values.map((v, i) => `${i*step},${height - ((v - min)/span) * (height - 4) - 2}`).join(" ");
  return <svg width={width} height={height} style={{ display: "block" }}>
    <polyline points={points} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
    <circle cx={(values.length-1)*step} cy={height - ((values[values.length-1] - min)/span) * (height - 4) - 2} r="2.5" fill={color} />
  </svg>;
}

function PaceBar({ pct, monthPct, onPace }) {
  const fill = onPace ? BRAND.success : BRAND.danger;
  const clipped = Math.max(0, Math.min(100, pct));
  return <div style={{ position: "relative", height: 6, borderRadius: 999, background: "rgba(139,26,30,.10)", overflow: "hidden", marginTop: 6 }}>
    <div style={{ position:"absolute", left:0, top:0, height:"100%", width: clipped + "%", background: fill, borderRadius: 999, transition: "width .2s" }} />
    <div style={{ position:"absolute", left: Math.max(0, Math.min(100, monthPct)) + "%", top:-2, width: 2, height: 10, background: BRAND.text, opacity: .55 }} title="Month elapsed marker" />
  </div>;
}

function KPICard({ label, value, format = "num", delta, mtd, target, iso, accent = "navy", trend }) {
  const accentColor = accent === "teal" ? BRAND.teal : accent === "gold" ? BRAND.gold : BRAND.navy;
  const formatted = format === "aed" ? fmtAED(value) : format === "pct" ? fmtPct(value) : fmtNum(value);
  const p = (mtd != null && target) ? pace(mtd, target, iso) : null;
  const dArrow = delta?.dir === "up" ? "▲" : delta?.dir === "down" ? "▼" : "—";
  const dColor = delta?.dir === "up" ? BRAND.success : delta?.dir === "down" ? BRAND.danger : BRAND.textMuted;
  return <div className="rounded-xl p-4 border" style={{ background: "white", borderColor: BRAND.border }}>
    <div className="flex items-start justify-between gap-2 mb-1">
      <div className="text-[10px] font-bold uppercase tracking-wider" style={{ color: BRAND.textMuted, fontFamily: FU }}>{label}</div>
      {trend && trend.length > 1 && <Sparkline values={trend} color={accentColor} />}
    </div>
    <div className="text-2xl font-bold" style={{ color: accentColor, fontFamily: FD, lineHeight: 1.1 }}>{formatted}</div>
    {delta != null && <div className="text-[11px] mt-1 font-bold" style={{ color: dColor, fontFamily: FU }}>
      {dArrow} {format === "aed" ? fmtAED(Math.abs(delta.abs)) : format === "pct" ? Math.abs(delta.abs).toFixed(1)+"%" : fmtNum(Math.abs(delta.abs))}
      <span style={{ color: BRAND.textMuted, fontWeight: 600, marginLeft: 6 }}>vs prev day</span>
    </div>}
    {p && <div style={{ marginTop: 8 }}>
      <div className="text-[10px]" style={{ color: BRAND.textMuted, fontFamily: FU, display:"flex", justifyContent:"space-between" }}>
        <span>MTD: {format === "aed" ? fmtAED(mtd) : format === "pct" ? fmtPct(mtd) : fmtNum(mtd)}</span>
        <span style={{ color: p.onPace ? BRAND.success : BRAND.danger, fontWeight: 800 }}>{p.pctAchieved.toFixed(0)}% of target</span>
      </div>
      <PaceBar pct={p.pctAchieved} monthPct={p.pctMonth} onPace={p.onPace} />
      <div className="text-[10px] mt-1" style={{ color: BRAND.textMuted, fontFamily: FU }}>
        Month {p.pctMonth.toFixed(0)}% elapsed · {p.onPace ? "on pace" : `behind by ${format === "aed" ? fmtAED(Math.max(0,p.gap)) : fmtNum(Math.max(0,p.gap))}`}
      </div>
    </div>}
  </div>;
}

function AlertRow({ alert }) {
  const tone = alert.level === "high"
    ? { bg: BRAND.dangerLight, fg: BRAND.danger, border: BRAND.danger }
    : { bg: BRAND.goldLight, fg: BRAND.goldDark, border: BRAND.gold };
  return <div className="rounded-lg border p-3 mb-2 flex items-start gap-3" style={{ background: tone.bg, borderColor: tone.border }}>
    <div className="rounded-md p-1.5 flex-shrink-0" style={{ background: "white" }}>
      <Icon name={alert.icon} size={16} color={tone.fg} />
    </div>
    <div className="flex-1 min-w-0">
      <div className="text-xs font-bold mb-0.5" style={{ color: tone.fg, fontFamily: FU }}>{alert.title}</div>
      <div className="text-[11px] whitespace-pre-line" style={{ color: BRAND.text, fontFamily: FU, lineHeight: 1.5 }}>{alert.detail}</div>
    </div>
  </div>;
}

function buildBriefingText(args) {
  const { iso, today, prev, mtd, alerts, tasks, targets } = args;
  const r = rowFromEntry(today);
  const pr = rowFromEntry(prev);
  const dRev = delta(r?.revenue, pr?.revenue);
  const dPat = delta(r?.patients, pr?.patients);
  const arrow = (d) => d.dir === "up" ? "↑" : d.dir === "down" ? "↓" : "→";
  const lines = [];
  lines.push(`*APML — Daily GM Briefing*`);
  lines.push(`Date: ${fmtDate(iso)}`);
  if (today?.meta?.submittedBy) lines.push(`Submitted by: ${today.meta.submittedBy}`);
  lines.push(``);
  lines.push(`*Headline*`);
  lines.push(`• Revenue: ${fmtAED(r?.revenue || 0)} (${arrow(dRev)} ${fmtAED(Math.abs(dRev.abs))} vs prev day)`);
  lines.push(`• Patients: ${fmtNum(r?.patients || 0)} (${arrow(dPat)} ${fmtNum(Math.abs(dPat.abs))})`);
  lines.push(`• Conversion: ${fmtPct(r?.conversion || 0)} (${r?.converted || 0} of ${r?.enquiries || 0} enquiries)`);
  lines.push(`• Registrations: ${fmtNum(r?.registrations || 0)} | Call answer: ${fmtPct(r?.answerRate || 0)} | Reports delivered: ${r?.reportsDelivered || 0} of ${r?.reportsDue || 0} (${fmtPct(r?.deliveryRate || 0)})`);
  lines.push(``);
  lines.push(`*MTD vs Targets*`);
  if (safeNum(targets.pc_revenue) > 0) {
    const p = pace(mtd.revenue, targets.pc_revenue, iso);
    lines.push(`• Revenue MTD: ${fmtAED(mtd.revenue)} / ${fmtAED(targets.pc_revenue)} (${p ? p.pctAchieved.toFixed(0) : 0}% — ${p?.onPace ? "on pace" : "behind pace"})`);
  }
  if (safeNum(targets.pc_patient_count) > 0) {
    const p = pace(mtd.patients, targets.pc_patient_count, iso);
    lines.push(`• Patients MTD: ${fmtNum(mtd.patients)} / ${fmtNum(targets.pc_patient_count)} (${p ? p.pctAchieved.toFixed(0) : 0}%)`);
  }
  lines.push(`• Conversion MTD: ${fmtPct(mtd.conversionRate)} | Answer rate MTD: ${fmtPct(mtd.answerRate)} | Delivery rate MTD: ${fmtPct(mtd.deliveryRate)}`);
  lines.push(``);
  if (alerts.length > 0) {
    lines.push(`*Flags requiring GM attention (${alerts.length})*`);
    alerts.forEach(a => lines.push(`• [${a.level.toUpperCase()}] ${a.title} — ${a.detail.replace(/\n/g, " ")}`));
    lines.push(``);
  }
  const overdue = (tasks || []).filter(t => t.status !== "Closed" && t.dueDate && t.dueDate < iso);
  const dueToday = (tasks || []).filter(t => t.status !== "Closed" && t.dueDate === iso);
  if (overdue.length || dueToday.length) {
    lines.push(`*Tasks*`);
    if (overdue.length) lines.push(`• Overdue: ${overdue.length} (${overdue.filter(t=>t.priority==="High").length} High)`);
    if (dueToday.length) lines.push(`• Due today: ${dueToday.length}`);
    overdue.slice(0,5).forEach(t => lines.push(`  – ${t.title} [${t.priority}, ${t.owner}]`));
    lines.push(``);
  }
  if (mtd.topSources.length) {
    lines.push(`*Top patient sources MTD*`);
    mtd.topSources.forEach(([s,n]) => lines.push(`• ${s}: ${n}`));
    lines.push(``);
  }
  if (mtd.topReasons.length) {
    lines.push(`*Top undelivered reasons MTD*`);
    mtd.topReasons.forEach(([s,n]) => lines.push(`• ${s}: ${n}`));
    lines.push(``);
  }
  if (today?.pc?.remarks) { lines.push(`*PC notes*`); lines.push(today.pc.remarks); lines.push(``); }
  if (today?.fo?.remarks) { lines.push(`*FO notes*`); lines.push(today.fo.remarks); lines.push(``); }
  return lines.join("\n");
}

  const r = rowFromEntry(today) || rowFromEntry(emptyEntry(iso));

    const out = { revenue: [], patients: [], conversion: [], deliveryRate: [] };
    const d = new Date(iso+"T00:00:00");

const LEAD_TRACKER_SITE = "https://polite-sky-087fbee03.7.azurestaticapps.net/";
const DEFAULT_LEAD_API = "https://polite-sky-087fbee03.7.azurestaticapps.net/api";
const TRACKER_API_KEY = "apml-lead-tracker-api-base";
function cleanApiBase(v) {
  return String(v || DEFAULT_LEAD_API).trim().replace(/\/$/, "");
}
function trackerPath(base, path) {
  return cleanApiBase(base) + (path.startsWith("/") ? path : "/" + path);
}
async function trackerFetchJson(base, path) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 12000);
  try {
    const res = await fetch(trackerPath(base, path), { method: "GET", cache: "no-store", signal: controller.signal });
    if (!res.ok) throw new Error("HTTP " + res.status + " from " + path);
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}
function rowDate(v) {
  if (!v) return "";
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  const s = String(v);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  const d = new Date(s);
  return isNaN(d.getTime()) ? s.slice(0, 10) : d.toISOString().slice(0, 10);
}
function rowStatus(v) { return String(v || "").trim().toLowerCase(); }
function summarizeLeadTracker(leadsPayload, callbacksPayload, revenuePayload, date) {
  const leadsValues = leadsPayload?.values || leadsPayload?.data || [];
  const callbacksValues = callbacksPayload?.values || callbacksPayload?.data || [];
  const revenueValues = revenuePayload?.values || revenuePayload?.data || [];
  const leads = leadsValues.slice(3).filter(r => r && r[1]);
  const callbacks = callbacksValues.slice(6).filter(r => r && r[0]);
  const revenue = revenueValues.slice(3).filter(r => r && r[0]);
  const dayLeads = leads.filter(r => rowDate(r[1]) === date);
  const dayCallbacks = callbacks.filter(r => rowDate(r[7]) === date);
  const dayRevenue = revenue.filter(r => rowDate(r[0]) === date);
  const revenueTotal = dayRevenue.reduce((sum, r) => sum + safeNum(r[3]), 0);
  const converted = dayLeads.filter(r => rowStatus(r[7]) === "done").length;
  const expected = dayLeads.filter(r => rowStatus(r[7]) === "expected").length;
  const notDone = dayLeads.filter(r => rowStatus(r[7]) === "not done").length;
  const digitalSources = ["instagram", "facebook", "tiktok", "social", "website", "google"];
  const digitalLeads = dayLeads.filter(r => digitalSources.some(s => String(r[2] || "").toLowerCase().includes(s))).length;
  const topTests = Object.entries(dayRevenue.reduce((acc, r) => {
    const test = r[4] || r[2] || "Other";
    acc[test] = (acc[test] || 0) + 1;
    return acc;
  }, {})).sort((a,b)=>b[1]-a[1]).slice(0, 10);
  return {
    date,
    revenueTotal,
    patients: dayRevenue.length,
    avgBill: dayRevenue.length ? Math.round(revenueTotal / dayRevenue.length) : 0,
    highestBill: dayRevenue.reduce((m, r) => Math.max(m, safeNum(r[3])), 0),
    leads: dayLeads.length,
    converted,
    expected,
    notDone,
    conversionRate: dayLeads.length ? (converted / dayLeads.length) * 100 : 0,
    callbacks: dayCallbacks.length,
    digitalLeads,
    topTests,
    recentLeads: dayLeads.slice(-8).reverse().map(r => ({ name: r[3] || "—", contact: r[4] || "—", source: r[2] || "—", staff: r[5] || "—", status: r[7] || "—" })),
  };
}
async function loadLeadTrackerSummary(apiBase, date) {
  const [leads, callbacks, revenue] = await Promise.all([
    trackerFetchJson(apiBase, "/get-leads"),
    trackerFetchJson(apiBase, "/get-callbacks"),
    trackerFetchJson(apiBase, "/get-revenue"),
  ]);
  return summarizeLeadTracker(leads, callbacks, revenue, date);
}

        <SectionCard title="Mapped Import Fields" icon="RefreshCw" accent="gold">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs" style={{ color: BRAND.textMuted }}>
            <div className="tracker-statusline"><strong>Patient Coordinator:</strong><br/>Revenue, patients, enquiries, converted enquiries and digital leads.</div>
            <div className="tracker-statusline"><strong>Front Office:</strong><br/>Registrations, outbound callbacks and call conversions.</div>
          </div>
        </SectionCard>
        <SectionCard title="Top Tests from Revenue Data" icon="BarChart3" accent="teal" defaultOpen={summary.topTests.length > 0}>
          {summary.topTests.length ? <table className="tracker-table"><thead><tr><th>Test</th><th>Volume</th></tr></thead><tbody>{summary.topTests.map(([test,count]) => <tr key={test}><td>{test}</td><td>{count}</td></tr>)}</tbody></table> : <div className="tracker-statusline">No revenue test data found for this date.</div>}
        </SectionCard>
        <SectionCard title="Recent Leads" icon="Users" accent="navy" defaultOpen={summary.recentLeads.length > 0}>
          {summary.recentLeads.length ? <table className="tracker-table"><thead><tr><th>Name</th><th>Source</th><th>Staff</th><th>Status</th></tr></thead><tbody>{summary.recentLeads.map((l, i) => <tr key={i}><td>{l.name}</td><td>{l.source}</td><td>{l.staff}</td><td>{l.status}</td></tr>)}</tbody></table> : <div className="tracker-statusline">No leads found for this date.</div>}
        </SectionCard>
      </>}
    </div>
  </div>;
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  // ----- Auth + role -----
  const [authUser, setAuthUser] = useState(getUser());
  const [activeRoleId, setActiveRoleId] = useState(getRole());  // pc | fo | manager
  const isAuthed = !!authUser && !!activeRoleId;
  const roleObj = ROLE_OPTIONS.find(r => r.id === activeRoleId);

  // ----- App state (existing + dirty-tracking) -----
  const [view, setView] = useState("today");
  const [activeRole, setActiveRole] = useState("pc");  // PC vs FO form switch on Daily Update
  const [selectedDate, setSelectedDate] = useState(yesterdayISO());
  const [entry, setEntry] = useState(emptyEntry(yesterdayISO()));
  const [loadedEntry, setLoadedEntry] = useState(null);  // snapshot from server at load
  const [loadedVersion, setLoadedVersion] = useState(""); // entry.lastSavedAt as loaded
  const [targets, setTargets] = useState(DEFAULT_TARGETS);
  const [tasks, setTasks] = useState([]);
  const [allEntries, setAllEntries] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saveStatus, setSaveStatus] = useState("idle");  // idle | saving | saved | error | dirty
  const [online, setOnline] = useState(API.isOnline());
  const isMounted = useRef(false);
  const [trackerImportStatus, setTrackerImportStatus] = useState("");
  // Auto-pull defaults to TRUE per request 5; user can still disable.
  const [autoPullEnabled, setAutoPullEnabled] = useState(() => {
    const v = localStorage.getItem("apml-auto-pull");
    return v === null ? true : v === "1";
  });
  useEffect(() => { localStorage.setItem("apml-auto-pull", autoPullEnabled ? "1" : "0"); }, [autoPullEnabled]);
  // Auto-save is OFF by default in v5 — the user explicitly asked for a save button.
  // The toggle is still available in Settings → Save behaviour for those who prefer auto.
  const [autoSaveEnabled, setAutoSaveEnabled] = useState(() => localStorage.getItem("apml-auto-save") === "1");
  useEffect(() => { localStorage.setItem("apml-auto-save", autoSaveEnabled ? "1" : "0"); }, [autoSaveEnabled]);

  // First-run welcome card
  const [showWelcome, setShowWelcome] = useState(() => localStorage.getItem(LS_WELCOMED) !== "1");
  const dismissWelcome = () => { localStorage.setItem(LS_WELCOMED, "1"); setShowWelcome(false); };

  // Conflict prompt state
  const [conflict, setConflict] = useState(null); // { serverEntry, ourEntry } when a conflict is detected
  const toastRef = useRef({ push: () => {} });
  const toast = useToast();
  useEffect(() => { toastRef.current = toast; }, [toast]);

  // After auth, jump to role-appropriate view + form
  useEffect(() => {
    if (!isAuthed || !roleObj) return;
    setView(prev => prev === "today" || prev === "briefing" ? roleObj.defaultView : prev);
    setActiveRole(roleObj.activeRole);
  }, [isAuthed, activeRoleId]);

  const handleSignOut = () => {
    setUser(null); setRoleLS("");
    setAuthUser(null); setActiveRoleId("");
  };
  const handleSwitchRole = (newRoleId) => {
    setRoleLS(newRoleId);
    setActiveRoleId(newRoleId);
    const r = ROLE_OPTIONS.find(x => x.id === newRoleId);
    if (r) { setView(r.defaultView); setActiveRole(r.activeRole); }
  };

  const importLeadTrackerSummary = (summary) => {
    setEntry(prev => ({
      ...prev,
      pc: {
        ...prev.pc,
        revenue_walkin: String(Math.round(summary.revenueTotal || 0)),
        patients_total: String(summary.patients || 0),
        enquiries_received: String(summary.leads || 0),
        enquiries_converted: String(summary.converted || 0),
        sm_leads: String(summary.digitalLeads || 0),
        remarks: [prev.pc.remarks, `Imported from Lead Tracker for ${fmtDate(summary.date)}: ${fmtAED(summary.revenueTotal)}, ${summary.leads} leads, ${summary.converted} converted.`].filter(Boolean).join("\n")
      },
      fo: {
        ...prev.fo,
        reg_total: String(summary.patients || 0),
        calls_outbound: String(summary.callbacks || 0),
        call_conversions: String(summary.converted || 0),
      }
    }));
    setTrackerImportStatus("Lead Tracker figures imported into the Daily GM fields. Review and save will continue through the existing auto-save.");
    setView("today");
  };

  const pullLeadTrackerIntoDaily = async () => {
    setTrackerImportStatus("Pulling Lead Tracker figures…");
    try {
      const base = localStorage.getItem(TRACKER_API_KEY) || DEFAULT_LEAD_API;
      const summary = await loadLeadTrackerSummary(base, selectedDate);
      importLeadTrackerSummary(summary);
    } catch (e) {
      setTrackerImportStatus("Unable to pull Lead Tracker data. Open Live Data to check API URL/CORS details.");
    }
  };

  const loadAll = async () => {
    setLoading(true);
    try {
      const [t, ts, e] = await Promise.all([API.getTargets(), API.getTasks(), API.listEntries()]);
      setTargets({ ...DEFAULT_TARGETS, ...(t.targets || {}) });
      setTasks(ts.tasks || []);
      setAllEntries(e.entries || []);
      const cur = await API.getEntry(selectedDate);
      const loaded = cur.entry ? { ...emptyEntry(cur.entry.date), ...cur.entry } : emptyEntry(selectedDate);
      setEntry(loaded);
      setLoadedEntry(JSON.parse(JSON.stringify(loaded)));
      setLoadedVersion(loaded.lastSavedAt || "");
      setOnline(API.isOnline());
    } catch (err) { console.error(err); }
    finally { setLoading(false); isMounted.current = true; }
  };

  useEffect(() => { loadAll(); /* eslint-disable-next-line */ }, []);

  // Auto-pull Lead Tracker on first load (after data loaded) and every 5 minutes
  // while the toggle is on. Skips if user is currently editing the form.
  useEffect(() => {
    if (!isMounted.current || !autoPullEnabled || !isAuthed) return;
    // Initial pull shortly after mount
    const initial = setTimeout(() => { pullLeadTrackerIntoDaily(); }, 1200);
    // Periodic refresh every 5 minutes
    const periodic = setInterval(() => {
      if (saveStatus === "saving") return;  // don't disturb a save in progress
      pullLeadTrackerIntoDaily();
    }, 5 * 60 * 1000);
    return () => { clearTimeout(initial); clearInterval(periodic); };
    // eslint-disable-next-line
  }, [loading, autoPullEnabled, isAuthed]);

  // Hide splash after first load
  useEffect(() => { if (!loading) { const sp = document.getElementById("splash"); if (sp) sp.style.display = "none"; } }, [loading]);

  // Reload entry when date changes — capture loadedVersion for conflict detection
  useEffect(() => {
    if (!isMounted.current) return;
    (async () => {
      const r = await API.getEntry(selectedDate);
      const loaded = r.entry ? { ...emptyEntry(r.entry.date), ...r.entry } : emptyEntry(selectedDate);
      setEntry(loaded);
      setLoadedEntry(JSON.parse(JSON.stringify(loaded)));
      setLoadedVersion(loaded.lastSavedAt || "");
      setSaveStatus("idle");
    })();
  }, [selectedDate]);

  // Auto-pull Lead Tracker on date change when toggle is on
  useEffect(() => {
    if (!isMounted.current || !autoPullEnabled) return;
    const t = setTimeout(() => { pullLeadTrackerIntoDaily(); }, 600);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [selectedDate, autoPullEnabled]);

  // Track dirty state — compares current entry against the last loaded snapshot
  const isDirty = useMemo(() => {
    if (!loadedEntry) return false;
    // Strip metadata before compare; only user-editable changes mark dirty
    const stripMeta = (e) => { const { lastSavedAt, lastSavedBy, log, ...rest } = e || {}; return rest; };
    return JSON.stringify(stripMeta(entry)) !== JSON.stringify(stripMeta(loadedEntry));
  }, [entry, loadedEntry]);

  useEffect(() => {
    if (!isMounted.current || loading) return;
    if (isDirty && saveStatus !== "saving") setSaveStatus("dirty");
    else if (!isDirty && saveStatus === "dirty") setSaveStatus("idle");
  }, [isDirty, loading]);

  // Warn before leaving the page with unsaved changes
  useEffect(() => {
    const handler = (e) => {
      if (isDirty) { e.preventDefault(); e.returnValue = ""; }
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [isDirty]);

  // ---------- SAVE ENTRY (with conflict detection) ----------
  // 1. Re-fetches the latest version from the server
  // 2. If server's lastSavedAt > our loadedVersion AND it differs from us,
  //    raise a conflict prompt (unless `force` is true).
  // 3. Otherwise stamps audit metadata and writes to API.
  const saveEntry = async (opts = {}) => {
    const { force = false, silent = false } = opts;
    if (!isDirty && !force) {
      if (!silent) toastRef.current.push({ level: "info", title: "No changes to save" });
      return { ok: true, noop: true };
    }
    setSaveStatus("saving");
    try {
      // Fetch latest version from server to detect concurrent edits
      let serverEntry = null;
      try {
        const fresh = await API.getEntry(entry.date);
        serverEntry = fresh.entry || null;
      } catch {/* offline; we'll write locally */}

      const serverVersion = serverEntry?.lastSavedAt || "";
      const overwriteRisk = !!serverVersion && serverVersion !== loadedVersion;

      if (overwriteRisk && !force) {
        // Concurrent edit detected — surface a prompt rather than silently overwrite
        setConflict({ serverEntry, ourEntry: entry });
        setSaveStatus("dirty");
        toastRef.current.push({
          level: "warn",
          title: "Someone else saved this entry",
          detail: `Saved by ${serverEntry.lastSavedBy || "another user"} at ${fmtLogTime(serverVersion)}. Choose how to proceed.`,
          ttl: 7000,
        });
        return { ok: false, conflict: true };
      }

      // No conflict (or force=true) — stamp and save
      const baseEntry = force && serverEntry ? serverEntry : loadedEntry;
      const stamped = stampSave(entry, authUser, baseEntry);
      const r = await API.saveEntry(stamped);
      if (r.ok || r._local) {
        setEntry(stamped);
        setLoadedEntry(JSON.parse(JSON.stringify(stamped)));
        setLoadedVersion(stamped.lastSavedAt);
        setAllEntries(prev => {
          const others = prev.filter(e => e.date !== stamped.date);
          return [...others, stamped].sort((a, b) => b.date.localeCompare(a.date));
        });
        setSaveStatus("saved");
        if (!silent) toastRef.current.push({
          level: "success",
          title: r._local ? "Saved locally" : "Saved to Google Sheets",
          detail: r._local ? "Will sync when connection returns." : `By ${stamped.lastSavedBy} at ${fmtLogTime(stamped.lastSavedAt)}`,
        });
        setTimeout(() => setSaveStatus(s => s === "saved" ? "idle" : s), 2500);
        return { ok: true };
      } else {
        setSaveStatus("error");
        toastRef.current.push({ level: "error", title: "Save failed", detail: r.error || "Could not write to Sheets." });
        return { ok: false };
      }
    } catch (e) {
      setSaveStatus("error");
      toastRef.current.push({ level: "error", title: "Save failed", detail: e.message || String(e) });
      return { ok: false };
    }
  };

  // Conflict resolution actions
  const resolveConflict = async (mode) => {
    if (!conflict) return;
    if (mode === "overwrite") {
      setConflict(null);
      await saveEntry({ force: true });
    } else if (mode === "discard") {
      // Adopt the server version, lose local edits
      const adopted = { ...emptyEntry(conflict.serverEntry.date), ...conflict.serverEntry };
      setEntry(adopted);
      setLoadedEntry(JSON.parse(JSON.stringify(adopted)));
      setLoadedVersion(adopted.lastSavedAt || "");
      setConflict(null);
      setSaveStatus("idle");
      toastRef.current.push({ level: "info", title: "Loaded latest version", detail: "Your local changes were discarded." });
    } else {
      // cancel
      setConflict(null);
    }
  };

  // Optional auto-save (off by default in v5). Uses the same conflict-aware path.
  const autoSaveTimer = useRef(null);
  useEffect(() => {
    if (!isMounted.current || loading || !autoSaveEnabled || !isDirty) return;
    if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current = setTimeout(() => { saveEntry({ silent: true }); }, 2500);
    return () => { if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current); };
    // eslint-disable-next-line
  }, [entry, autoSaveEnabled]);

  const saveTargets = async () => {
    setSaveStatus("saving");
    const r = await API.saveTargets(targets);
    setSaveStatus(r.ok || r._local ? "saved" : "error");
    if (r.ok || r._local) toastRef.current.push({ level: "success", title: "Targets saved" });
    else toastRef.current.push({ level: "error", title: "Could not save targets" });
    setTimeout(() => setSaveStatus(s => s === "saved" ? "idle" : s), 2000);
  };

  const openTaskCount = tasks.filter(t => t.status !== "Closed").length;
  const overdueCount = tasks.filter(t => t.dueDate && t.dueDate < todayISO() && t.status !== "Closed").length;

  // Live alert count for the topbar — based on the currently selected date.
  const briefingAlertCount = useMemo(() => {
    if (!entry || !entry.date) return 0;
    const mtd = mtdAggregate(allEntries, monthKey(entry.date));
    return buildAlerts(entry, mtd, targets, tasks, entry.date).length;
  }, [entry, allEntries, targets, tasks]);

  const pageTitle = view === "today" ? (activeRole === "pc" ? "Patient Coordinator Update" : "Front Office Update") : view === "briefing" ? "GM Briefing" : view === "b2cCard" ? "Daily B2C Card" : view === "leadTracker" ? "Lead Tracker Live Data" : view === "tasks" ? "Pending Tasks" : view === "history" ? "History" : view === "targets" ? "Targets" : "Settings";
  const navItems = [
    { id: "briefing", label: "GM Briefing", icon: "LayoutDashboard" },
    { id: "today", label: "Daily Update", icon: "Activity" },
    { id: "b2cCard", label: "B2C Card", icon: "Image" },
    { id: "leadTracker", label: "Live Data", icon: "Database" },
    { id: "tasks", label: "Tasks", icon: "ClipboardList", badge: openTaskCount, alert: overdueCount },
    { id: "history", label: "History", icon: "History" },
    { id: "targets", label: "Targets", icon: "Target" },
    { id: "settings", label: "Settings", icon: "Settings" },
  ];

  // Activate per-view full-page background once shell is rendered
  useEffect(() => {
    document.body.classList.add("themed-bg");
    return () => document.body.classList.remove("themed-bg");
  }, []);

  // Bind Ctrl+S / ⌘+S to save when on a data-entry view
  useEffect(() => {
    const handler = (e) => {
      const isMac = /Mac|iPhone|iPad/i.test(navigator.platform || navigator.userAgent || "");
      const sKey = (isMac && e.metaKey && e.key.toLowerCase() === "s") || (!isMac && e.ctrlKey && e.key.toLowerCase() === "s");
      if (!sKey) return;
      // Only intercept when on the daily-update form
      if (view !== "today") return;
      e.preventDefault();
      saveEntry();
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
    // eslint-disable-next-line
  }, [view, entry, isDirty, loadedVersion]);

  // Show login screen until both signed in (or guest) AND a role chosen.
  if (!isAuthed) {
    return <LoginScreen onSignedIn={({ user, role }) => {
      setAuthUser(user); setActiveRoleId(role);
    }} />;
  }

  return <div className="apml-shell" data-view={view}>
    <aside className="apml-sidebar">
      <div className="apml-logo">
        <div className="apml-logo-mark">
          <div className="apml-logo-ap">ap</div>
          <div>
            <div className="apml-logo-text"><span>Accuracy Plus</span><span>Medical Laboratory</span></div>
            <div className="apml-logo-sub">APML Tracker</div>
          </div>
        </div>
      </div>
      <div className="apml-nav-section">Management</div>
      {navItems.slice(0,5).map((t) => {
        const active = view === t.id;
        return <button key={t.id} onClick={() => setView(t.id)} className={`apml-nav-btn ${active ? "active" : ""}`}>
          <Icon name={t.icon} size={17} />
          <span>{t.label}</span>
          {t.badge > 0 && <span className="apml-nav-badge">{t.badge}</span>}
        </button>;
      })}
      <div className="apml-nav-section">System</div>
      {navItems.slice(5).map((t) => {
        const active = view === t.id;
        return <button key={t.id} onClick={() => setView(t.id)} className={`apml-nav-btn ${active ? "active" : ""}`}>
          <Icon name={t.icon} size={17} />
          <span>{t.label}</span>
        </button>;
      })}
      <div className="apml-sidebar-foot">
        <div style={{fontWeight:800,color:'#fff'}}>APML Daily</div>
        <div style={{marginTop:4}}>GM briefing and B2C operational tracker</div>
        <span className="view-badge">{view === "today" ? "Daily Update" : view === "briefing" ? "GM Briefing" : view === "b2cCard" ? "B2C Card" : view === "leadTracker" ? "Live Data" : view === "tasks" ? "Tasks" : view === "history" ? "History" : view === "targets" ? "Targets" : "Settings"}</span>
      </div>
    </aside>

    <main className="apml-main">
      <div className="apml-topbar">
        <div>
          <div className="apml-crumb">APML Tracker</div>
          <div className="apml-page-title">{pageTitle}</div>
          <div className="apml-page-desc" style={{
            fontSize: 11, color: BRAND.textMuted, fontFamily: FU, fontWeight: 600,
            marginTop: 4, maxWidth: 640, lineHeight: 1.4
          }}>
            {view === "today" && activeRole === "pc" ? PAGE_DESCRIPTIONS.today_pc :
             view === "today" && activeRole === "fo" ? PAGE_DESCRIPTIONS.today_fo :
             PAGE_DESCRIPTIONS[view] || ""}
          </div>
        </div>
        <div className="apml-status">
          {/* User/role chip — visible at desktop only (mobile hides apml-status) */}
          {authUser && (
            <div className="inline-flex items-center gap-2 px-2.5 py-1 rounded-full"
              style={{ background: "rgba(255,255,255,.6)", border: "1px solid rgba(139,26,30,.14)", marginRight: 6 }}
              title={`${authUser.name} · ${roleObj?.label || ""}`}>
              {authUser.picture ? <img src={authUser.picture} alt="" style={{ width:18, height:18, borderRadius:"50%" }} /> : <Icon name="User" size={12} />}
              <span style={{ fontSize:11, fontWeight:800, color: "var(--view-accent)", fontFamily: FU }}>{roleObj?.label || "—"}</span>
              <select value={activeRoleId} onChange={(e) => handleSwitchRole(e.target.value)} style={{ fontSize: 10, border: "none", background: "transparent", color: BRAND.textMuted, fontWeight: 700, cursor: "pointer", fontFamily: FU }} title="Switch role">
                {ROLE_OPTIONS.map(r => <option key={r.id} value={r.id}>Switch: {r.label}</option>)}
              </select>
              <button onClick={handleSignOut}
                style={{ background:"rgba(220,38,38,.10)", border:"1px solid rgba(220,38,38,.32)", borderRadius:8, padding:"3px 8px",
                         cursor:"pointer", color: BRAND.danger, fontWeight:800, fontSize:10, fontFamily: FU,
                         display:"inline-flex", alignItems:"center", gap:4 }}
                title="Sign out and return to login screen">
                <Icon name="LogOut" size={12} />Sign out
              </button>
            </div>
          )}
          {briefingAlertCount > 0 && (
            <button onClick={() => setView("briefing")}
              className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full"
              style={{ background: BRAND.dangerLight, color: BRAND.danger, border: `1px solid ${BRAND.danger}`, fontWeight: 800, fontSize: 11, cursor: "pointer", marginRight: 4, fontFamily: FU }}
              title="Open GM Briefing">
              <Icon name="AlertTriangle" size={12} />
              <span>{briefingAlertCount} flag{briefingAlertCount>1?"s":""}</span>
            </button>
          )}
          <span className="apml-dot" style={{background: online ? '#059669' : '#94a3b8'}}></span>
          <span>{online ? "Synced" : "Local"}</span>
          <span>•</span>
          <span style={{ color: saveStatus === "dirty" ? BRAND.gold : saveStatus === "error" ? BRAND.danger : saveStatus === "saved" ? BRAND.success : "inherit", fontWeight: saveStatus === "dirty" || saveStatus === "error" ? 800 : 600 }}>{
            saveStatus === "saving" ? "Saving..." :
            saveStatus === "saved" ? "Saved" :
            saveStatus === "error" ? "Save failed" :
            saveStatus === "dirty" ? "Unsaved changes" :
            autoSaveEnabled ? "Auto-save on" : "Idle"
          }</span>
        </div>
      </div>

      <div className="apml-content">
        {showWelcome && (
          <WelcomeCard user={authUser} role={activeRoleId} onDismiss={dismissWelcome} onGoTo={(v) => setView(v)} />
        )}
        {view === "today" && (
          <div className="apml-filter-card">
            <div className="flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
              <div className="apml-role-toggle">
                {[{ id: "pc", label: "Patient Coordinator", short: "Patient Coord.", icon: "Megaphone" }, { id: "fo", label: "Front Office", short: "Front Office", icon: "Building2" }].map((r) => {
                  const active = activeRole === r.id;
                  return <button key={r.id} onClick={() => setActiveRole(r.id)} className={`apml-role-btn ${active ? "active" : ""}`}>
                    <Icon name={r.icon} size={14} />
                    <span className="hidden sm:inline">{r.label}</span>
                    <span className="sm:hidden">{r.short}</span>
                  </button>;
                })}
              </div>
              <div className="flex items-center gap-2 flex-shrink-0 flex-wrap">
                <span className="text-xs font-bold uppercase tracking-wider" style={{ color: BRAND.textMuted }}>Date</span>
                <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} max={todayISO()} className="apml-date-input text-xs sm:text-sm" style={{ fontFamily: FU }} />
                <Button onClick={pullLeadTrackerIntoDaily} variant="gold" size="sm" icon="RefreshCw">Pull Lead Tracker Data</Button>
                <label className="inline-flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wider cursor-pointer select-none" style={{ color: BRAND.textMuted, fontFamily: FU }} title="Automatically pull Lead Tracker data whenever the date changes">
                  <input type="checkbox" checked={autoPullEnabled} onChange={(e) => setAutoPullEnabled(e.target.checked)} style={{ accentColor: BRAND.teal }} />
                  Auto-pull
                </label>
              </div>
            </div>
            {trackerImportStatus && <div className="tracker-statusline">{trackerImportStatus}</div>}
            <div className="apml-meta-row">
              <input type="text" value={entry.meta.submittedBy} onChange={(e) => setEntry({ ...entry, meta: { ...entry.meta, submittedBy: e.target.value } })} placeholder="Submitted by..." className="px-3 py-2 text-xs focus:outline-none" style={{ fontFamily: FU }} />
              <input type="time" value={entry.meta.meetingTime} onChange={(e) => setEntry({ ...entry, meta: { ...entry.meta, meetingTime: e.target.value } })} className="px-3 py-2 text-xs focus:outline-none" style={{ fontFamily: FU }} />
            </div>
          </div>
        )}

        {view === "today" && activeRole === "pc" && <PCForm entry={entry} setEntry={setEntry} targets={targets} isDirty={isDirty} saveStatus={saveStatus} onSave={() => saveEntry()} autoSaveEnabled={autoSaveEnabled} />}
        {view === "today" && activeRole === "fo" && <FOForm entry={entry} setEntry={setEntry} targets={targets} isDirty={isDirty} saveStatus={saveStatus} onSave={() => saveEntry()} autoSaveEnabled={autoSaveEnabled} />}
        {view === "briefing" && <BriefingView allEntries={allEntries} selectedDate={selectedDate} targets={targets} tasks={tasks} setView={setView} setSelectedDate={setSelectedDate} />}
        {view === "b2cCard" && <B2CCardView allEntries={allEntries} selectedDate={selectedDate} />}
        {view === "leadTracker" && <LeadTrackerLiveData selectedDate={selectedDate} onImport={importLeadTrackerSummary} autoPull={autoPullEnabled} />}
        {view === "tasks" && <TasksView tasks={tasks} setTasks={setTasks} />}
        {view === "history" && <HistoryView entries={allEntries} onSelect={(d) => { setSelectedDate(d); setView("today"); }} />}
        {view === "targets" && <TargetsView targets={targets} setTargets={setTargets} onSave={saveTargets} />}
        {view === "settings" && <SettingsView onUrlChange={loadAll} autoSaveEnabled={autoSaveEnabled} setAutoSaveEnabled={setAutoSaveEnabled} />}
      </div>
    </main>

    <footer className="apml-footer">
      APML — Precision with Purpose · Daily GM Briefing Tool
    </footer>

    {/* Floating Save action — only on data-entry view */}
    {view === "today" && <SaveFAB isDirty={isDirty} saveStatus={saveStatus} onSave={() => saveEntry()} />}

    {/* Overwrite conflict prompt */}
    <ConfirmModal
      open={!!conflict}
      title="Save conflict — someone else changed this entry"
      body={conflict ? <>
        <p style={{ marginBottom: 10 }}>
          This entry was last saved by <strong>{conflict.serverEntry?.lastSavedBy || "another user"}</strong> on <strong>{fmtLogTime(conflict.serverEntry?.lastSavedAt)}</strong>, after you opened it.
        </p>
        <p style={{ marginBottom: 10 }}>How would you like to proceed?</p>
        <ul style={{ margin: 0, paddingLeft: 18, fontSize: 12, lineHeight: 1.6 }}>
          <li><strong>Overwrite:</strong> save your version, replacing theirs. Their save will remain in the change log.</li>
          <li><strong>Discard mine:</strong> keep their version, lose your unsaved edits.</li>
          <li><strong>Cancel:</strong> close this and decide later.</li>
        </ul>
      </> : null}
      cancelLabel="Cancel"
      confirmLabel="Overwrite their version"
      confirmVariant="danger"
      onCancel={() => resolveConflict("cancel")}
      onConfirm={() => resolveConflict("overwrite")}
      extras={conflict ? <div style={{ marginTop: 12 }}>
        <Button onClick={() => resolveConflict("discard")} variant="secondary" icon="RefreshCw">Discard mine, load latest</Button>
      </div> : null}
    />
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ToastHost><App /></ToastHost>);
</script>
</body>
</html>
